async function pullStateFromCloud() {
  if (!supa) return false;
  // Refuse to pull while the local state has unsynced changes — otherwise we'd overwrite
  // work that hasn't reached the cloud yet (the original "lost template" bug).
  // Only push-first when we have a known merge base. On a cold session start
  // lastPushedJson is null, which would make pushStateToCloud's 3-way merge
  // guard skip the merge — and a stale localStorage would then clobber cloud.
  // When there's no base, trust cloud over local: just pull and adopt.
  if (pendingLocalChanges) {
    // Local has edits the cloud doesn't know about yet. NEVER let a pull
    // overwrite them. If we have a merge base, try to push first so cloud
    // catches up; otherwise just skip the pull entirely — local wins.
    console.warn('pull blocked: local has unsaved changes' + (lastPushedJson ? '; pushing first' : '; no merge base, deferring pull'));
    if (lastPushedJson) {
      await pushStateToCloud();
      if (pendingLocalChanges) return false; // push still failed — preserve local
    } else {
      return false; // cold-start with dirty local — render local, let the next save() push it
    }
  }
  setSyncStatus('syncing');
  try {
    const { data, error } = await supa.from('app_state').select('data, updated_at').eq('id','main').maybeSingle();
    if (error) { console.warn('pull error', error); setSyncStatus('error'); return false; }
    if (data && data.updated_at) lastSeenCloudUpdatedAt = data.updated_at;
    if (data && data.data && Object.keys(data.data).length > 0) {
      if (data.data.__schemaVersion && data.data.__schemaVersion > SCHEMA_VERSION) {
        _showVersionReloadGate(data.data.__schemaVersion);
        return false;
      }
      // Merge remote into the migration pipeline so defaults get added
      const merged = data.data;
      // Keep these per-device — they're personal UI prefs, not shared collaboration data.
      // (Including activeBoardId so a teammate switching workspaces doesn't bounce you.)
      const localPrefs = {
        activeTab:        state?.activeTab,
        activeBoardId:    state?.activeBoardId,
        boardPos:         state?.boardPos,
        boardSize:        state?.boardSize,
        sectionSize:      state?.sectionSize,
        homeViewMode:     state?.homeViewMode,
        boardZoom:        state?.boardZoom,
        preferredLayout:  state?.preferredLayout,
        collapsedRows:    state?.collapsedRows,
        boardCollapsed:   state?.boardCollapsed,
        bgGuggenheim:     state?.bgGuggenheim,
      };
      Object.assign(merged, {
        activeTab:        localPrefs.activeTab        ?? merged.activeTab,
        activeBoardId:    localPrefs.activeBoardId    ?? merged.activeBoardId,
        boardPos:         localPrefs.boardPos         ?? merged.boardPos,
        boardSize:        localPrefs.boardSize        ?? merged.boardSize,
        sectionSize:      localPrefs.sectionSize      ?? merged.sectionSize,
        homeViewMode:     localPrefs.homeViewMode     ?? merged.homeViewMode,
        boardZoom:        localPrefs.boardZoom        ?? merged.boardZoom,
        preferredLayout:  localPrefs.preferredLayout  ?? merged.preferredLayout,
        collapsedRows:    localPrefs.collapsedRows    ?? merged.collapsedRows,
        boardCollapsed:   localPrefs.boardCollapsed   ?? merged.boardCollapsed,
        bgGuggenheim:     localPrefs.bgGuggenheim     ?? merged.bgGuggenheim,
      });
      state = merged;
      // Re-run the load-time migrations to fill in any new fields
      runStateMigrations(state);
      // Re-restore per-board fields (rows, titles, bgColor, brandImage, etc.) from the
      // active board's saved data so the top-level state reflects THIS user's active board,
      // not whoever last pushed.
      if(state.boards && state.activeBoardId && state.boards[state.activeBoardId]){
        restoreBoardFields(state, state.boards[state.activeBoardId].data || {});
      }
      // Update the merge base — the next push compares against cloud-as-of-now,
      // not against our outdated last push.
      try {
        const { boardPos, boardSize, sectionSize, activeTab, activeBoardId, homeViewMode, boardZoom, preferredLayout, collapsedRows, boardCollapsed, bgGuggenheim, ...shared } = data.data;
        lastPushedJson = JSON.stringify(shared);
        if (data.data.__rev) lastPushedRev = data.data.__rev;
      } catch(_){}
      setSyncStatus('synced');
      return true;
    }
    // Empty state from cloud is still a successful sync
    setSyncStatus('synced');
  } catch (e) { console.warn('pull threw', e); setSyncStatus('error'); }
  return false;
}

// Track whether the current local state has been confirmed pushed to the cloud.
// Set FALSE on every save, TRUE on a successful push. While TRUE, pulls are blocked
// (so cloud data can't overwrite unsaved local edits) and a banner stays visible.
// Initialized from localStorage by comparing current state against the last-pushed hash.
// Canonical JSON — keys sorted at every level, so Postgres JSONB round-trips don't
// flip the hash.
function canonicalJSON(v){
  if (v === null || typeof v !== 'object') return JSON.stringify(v);
  if (Array.isArray(v)) return '[' + v.map(canonicalJSON).join(',') + ']';
  const keys = Object.keys(v).sort();
  return '{' + keys.map(k => JSON.stringify(k) + ':' + canonicalJSON(v[k])).join(',') + '}';
}
// FNV-1a 32-bit — fast, deterministic, sufficient for change detection (not crypto).
function fnv1a(str){
  let h = 0x811c9dc5;
  for (let i = 0; i < str.length; i++){
    h ^= str.charCodeAt(i);
    h = Math.imul(h, 0x01000193) >>> 0;
  }
  return h.toString(16).padStart(8, '0');
}
function computeSharedHash(stateObj){
  // Strip per-device UI prefs so the hash matches what pushStateToCloud would send.
  const { boardPos, boardSize, sectionSize, activeTab, activeBoardId, homeViewMode, boardZoom, preferredLayout, collapsedRows, boardCollapsed, bgGuggenheim, __rev, ...shared } = stateObj || {};
  return fnv1a(canonicalJSON(shared));
}
let pendingLocalChanges = (function(){
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false; // no local state, nothing pending
    const lastHash = localStorage.getItem(STORAGE_KEY + '-pushed-hash');
    if (!lastHash) return true; // local data exists but has never been confirmed pushed
    const parsed = JSON.parse(raw);
    const currentHash = computeSharedHash(parsed);
    return currentHash !== lastHash;
  } catch(_) {
    // On any error, default to pending (safer — will trigger a push, no data loss)
    return true;
  }
})();

// Track our own pushes so realtime echoes don't trigger a re-render mid-edit.
// Using a revision token in the payload survives Postgres JSONB key reordering, which
// would defeat byte-for-byte JSON equality checks.
let lastPushedRev = null;
let lastSeenCloudUpdatedAt = null; // optimistic concurrency: cloud's updated_at when we last pulled/pushed
function genRev(){ return 'r_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 8); }

// ── AUDIT LOG ──────────────────────────────────────────────────────────────
// After every successful push, fire a row into app_state_log with who/when/what.
// Diff is a list of {path, before, after} for changed leaf values, capped so a
// brand-image change doesn't write a megabyte. Best-effort — log failures never
// block the user's edit.
function trimVal(v){
  if (typeof v === 'string' && v.length > 200) return v.slice(0, 200) + '…';
  return v;
}
function diffStates(before, after, maxEntries = 200){
  const out = [];
  function walk(a, b, path){
    if (out.length >= maxEntries) return;
    if (a === b) return;
    const aObj = a !== null && typeof a === 'object';
    const bObj = b !== null && typeof b === 'object';
    if (!aObj || !bObj){
      out.push({ path: path || '/', before: trimVal(a), after: trimVal(b) });
      return;
    }
    if (Array.isArray(a) !== Array.isArray(b)){
      out.push({ path: path || '/', before: Array.isArray(a) ? '[array]' : '[obj]', after: Array.isArray(b) ? '[array]' : '[obj]' });
      return;
    }
    const keys = new Set([...Object.keys(a), ...Object.keys(b)]);
    for (const k of keys){
      if (out.length >= maxEntries) break;
      const esc = String(k).replace(/~/g,'~0').replace(/\//g,'~1');
      walk(a[k], b[k], path + '/' + esc);
    }
  }
  walk(before, after, '');
  if (out.length >= maxEntries) out.push({ path: '__truncated__', before: null, after: null });
  return out;
}
// ── 3-WAY MERGE (Option A, 2026-05-14) ────────────────────────────────────
// Before each push, fetch the current cloud and reconcile our local changes
// against it instead of clobbering. Solves the symmetric-edit lost-update
// scenario (Jess adds board J, Kate adds board K simultaneously — both survive).
// Algorithm: standard 3-way merge with `lastPushedJson` as the common ancestor.
function _isObj(v){ return v !== null && typeof v === 'object' && !Array.isArray(v); }
function _eqJSON(a, b){
  try { return JSON.stringify(a) === JSON.stringify(b); } catch(_) { return false; }
}
function _hasIdKey(arr){
  if (!Array.isArray(arr) || arr.length === 0) return null;
  // Detect id-keyed arrays (rows, dashboard.tiles) and key-keyed arrays (userColumns).
  const first = arr[0];
  if (!first || typeof first !== 'object') return null;
  if ('id' in first) return 'id';
  if ('key' in first) return 'key';
  return null;
}
function mergeArray3(base, local, cloud){
  base  = Array.isArray(base)  ? base  : [];
  local = Array.isArray(local) ? local : [];
  cloud = Array.isArray(cloud) ? cloud : [];
  const idKey = _hasIdKey(local) || _hasIdKey(cloud) || _hasIdKey(base);
  if (!idKey){
    // Array of primitives (boardOrder, colOrder[k], hiddenCols[k]) — if local
    // diverged from base, prefer local. Otherwise take cloud.
    return _eqJSON(local, base) ? cloud : local;
  }
  const baseMap  = new Map(base.map(r  => [r[idKey], r]));
  const localMap = new Map(local.map(r => [r[idKey], r]));
  const cloudMap = new Map(cloud.map(r => [r[idKey], r]));
  // Whose ORDER wins? If local is identical to base, local didn't touch this list at
  // all — let cloud's view (including any reorder) through. Otherwise local's intent
  // wins as the most-recent edit. Byte-equal check is the simplest correct heuristic:
  // any local add/delete/edit/reorder marks "local has opinions about this array."
  const localReordered = !_eqJSON(local, base);
  const out = [];
  const seen = new Set();
  if (localReordered){
    // Walk local order; this preserves the user's most recent reorder + insert positions.
    for (const item of local){
      const id = item[idKey];
      seen.add(id);
      if (!cloudMap.has(id)){
        if (!baseMap.has(id)) { out.push(item); continue; }       // we added; they don't have it yet
        // Was in base but not in cloud → cloud deleted. If we didn't change it from base, drop. Else keep.
        if (_eqJSON(item, baseMap.get(id))) continue;
        out.push(item);
        continue;
      }
      // Exists in both — recurse on the row contents
      out.push(merge3(baseMap.get(id), item, cloudMap.get(id)));
    }
    // Append cloud-only items (they added, we don't have, OR we deleted but they edited)
    for (const item of cloud){
      const id = item[idKey];
      if (seen.has(id)) continue;
      if (baseMap.has(id) && !localMap.has(id)){
        // We deleted it. Symmetric to the cloud-deleted-but-we-edited branch above:
        // if cloud actively edited the row (vs. just having an unchanged copy), keep
        // their work. Don't lose data because of a stale deletion.
        if (_eqJSON(item, baseMap.get(id))) continue; // unchanged from base → deletion stands
        // else fall through: cloud's edit overrides the deletion
      }
      out.push(item);
    }
  } else {
    // Walk CLOUD order — cloud's reorder (if any) wins, since local didn't reorder.
    for (const item of cloud){
      const id = item[idKey];
      seen.add(id);
      if (!localMap.has(id)){
        // Local doesn't have it.
        if (!baseMap.has(id)) { out.push(item); continue; }       // cloud added; we don't have yet
        // Was in base but not in local → we deleted. If cloud edited, keep theirs; else drop.
        if (_eqJSON(item, baseMap.get(id))) continue;
        out.push(item);
        continue;
      }
      // Exists in both — recurse on the row contents
      out.push(merge3(baseMap.get(id), localMap.get(id), item));
    }
    // Append local-only items (we added, cloud doesn't have, OR cloud deleted but we edited)
    for (const item of local){
      const id = item[idKey];
      if (seen.has(id)) continue;
      if (baseMap.has(id) && !cloudMap.has(id)){
        if (_eqJSON(item, baseMap.get(id))) continue; // cloud deleted, we didn't change → respect
      }
      out.push(item);
    }
  }
  return out;
}
function merge3(base, local, cloud){
  // Primitives / mismatched types: if we changed it, take ours; else take theirs.
  if (!_isObj(local) || !_isObj(cloud)){
    if (Array.isArray(local) || Array.isArray(cloud)){
      return mergeArray3(base, local, cloud);
    }
    if (_eqJSON(local, base)) return cloud;
    return local;
  }
  const baseObj  = _isObj(base) ? base : {};
  const out = {};
  const keys = new Set([...Object.keys(baseObj), ...Object.keys(local), ...Object.keys(cloud)]);
  for (const k of keys){
    const inBase  = k in baseObj;
    const inLocal = k in local;
    const inCloud = k in cloud;
    if (inLocal && inCloud){
      out[k] = merge3(baseObj[k], local[k], cloud[k]);
    } else if (inLocal && !inCloud){
      // Local has it, cloud doesn't. Either we added (and they don't have yet) or they deleted.
      if (!inBase || !_eqJSON(local[k], baseObj[k])){
        // We added or edited → keep our version.
        out[k] = local[k];
      }
      // Else: it was in base, cloud removed it, we didn't touch it → respect deletion (don't include).
    } else if (!inLocal && inCloud){
      if (!inBase || !_eqJSON(cloud[k], baseObj[k])){
        // Cloud added or edited → take cloud's version.
        out[k] = cloud[k];
      }
      // Else: we deleted (was in base, gone from local) and cloud didn't touch → respect our deletion.
    }
    // Neither has it: nothing to add.
  }
  return out;
}

async function logAuditEntry(rev, prevRev, byteSize, diff){
  if (!supa) return;
  try {
    const user = window.__lgAuth?.user || null;
    await supa.from('app_state_log').insert({
      user_id: user?.id || null,
      user_email: user?.email || null,
      rev,
      prev_rev: prevRev,
      byte_size: byteSize,
      diff,
    });
  } catch (e) {
    // Log failures are non-fatal — surface in console only.
    console.warn('audit log insert failed', e);
  }
}

async function pushStateToCloud() {
  if (!supa || applyingRemote) return;
  if (window.__lgVersionOutdated) return;
  // Don't push UI-only prefs; everyone has their own canvas layout AND their own active workspace
  const { boardPos, boardSize, sectionSize, activeTab, activeBoardId, homeViewMode, boardZoom, preferredLayout, collapsedRows, boardCollapsed, bgGuggenheim, ...sharedState } = state;
  // Capture the previous push for the audit-log diff, before we mutate sharedState.
  let prevShared = null;
  if (lastPushedJson){
    try { prevShared = JSON.parse(lastPushedJson); } catch(_) { prevShared = null; }
  }
  const prevRev = lastPushedRev;
  // Stamp this push with a fresh rev so we can recognize the realtime echo as our own.
  const rev = genRev();
  sharedState.__rev = rev;
  sharedState.__schemaVersion = SCHEMA_VERSION;
  // Always keep an offline backup BEFORE attempting push, so a failed push + page reload
  // can still recover the user's work
  try { localStorage.setItem(STORAGE_KEY + '-backup', JSON.stringify({ at: Date.now(), data: state })); } catch(_) {}
  // ─── 3-WAY MERGE BEFORE PUSH ─────────────────────────────────────────────
  // Fetch current cloud. If it has advanced beyond what we last pushed (and we
  // have a known base), reconcile their changes with ours and push the merged
  // result. The realtime echo + audit-log diff will reflect the merged content.
  let payloadState = sharedState;
  let mergedHappened = false;
  // When the user is actively typing, we still fetch+merge so teammates' data is
  // preserved in the push payload, but we defer render() to avoid destroying the
  // live contentEditable cell DOM. The merged state lands in state{} and localStorage;
  // render fires on the next save/blur cycle.
  const isUserActivelyEditing = (function(){
    const ae = document.activeElement;
    if (!ae) return false;
    if (ae.isContentEditable) return true;
    if (ae.tagName === 'INPUT' || ae.tagName === 'TEXTAREA') return true;
    return false;
  })();
  try {
    const { data: cloudRow } = await supa.from('app_state').select('data, updated_at').eq('id', 'main').maybeSingle();
    if (cloudRow && cloudRow.data){
      if (cloudRow.data.__schemaVersion && cloudRow.data.__schemaVersion > SCHEMA_VERSION) {
        _showVersionReloadGate(cloudRow.data.__schemaVersion);
        return;
      }
      const cloudData = cloudRow.data;
      const cloudIsOurLastPush = lastPushedRev && cloudData.__rev === lastPushedRev;
      if (!cloudIsOurLastPush && prevShared){
        // Strip __rev from all three sides so it doesn't poison the merge.
        const { __rev: _a, ...cloudBare } = cloudData;
        const { __rev: _b, ...localBare } = sharedState;
        const { __rev: _c, ...baseBare  } = prevShared;
        const merged = merge3(baseBare, localBare, cloudBare);
        merged.__rev = rev;
        payloadState = merged;
        mergedHappened = true;
      } else if (!cloudIsOurLastPush && !prevShared){
        // Cold-start safety: we have no merge base (lastPushedJson is null —
        // e.g., fresh session load with stale localStorage from days ago).
        // Pushing local now would clobber whatever a teammate pushed while we
        // were offline. ABORT the push, adopt cloud as our base, and let the
        // pull path render cloud. The user's stale local state is preserved in
        // the `STORAGE_KEY + '-backup'` localStorage key if recovery is needed.
        const { __rev, ...cloudBare } = cloudData;
        lastPushedJson = JSON.stringify(cloudBare);
        if (__rev) lastPushedRev = __rev;
        if (cloudRow.updated_at) lastSeenCloudUpdatedAt = cloudRow.updated_at;
        // pendingLocalChanges stays true so the caller (pullStateFromCloud) can
        // adopt cloud into state. We just refuse to PUSH this round.
        console.warn('cold-start push aborted: no merge base, adopted cloud as canonical');
        return;
      }
      if (cloudRow.updated_at) lastSeenCloudUpdatedAt = cloudRow.updated_at;
    }
  } catch (e){
    // Network blip — fall through and push unmerged.
    console.warn('pre-push fetch failed, pushing unmerged', e);
  }
  try {
    const candidateJson = JSON.stringify(payloadState);
    const pushedAt = new Date().toISOString();
    const { error, data: pushResult } = await supa.from('app_state').upsert({
      id: 'main',
      data: payloadState,
      expected_rev: lastPushedRev,
    });
    if (error) {
      console.warn('push failed', error);
      window.__lgLastSyncError = (error.message || error.code || 'push failed');
      pendingLocalChanges = true;
      setSyncStatus('error');
      updateSyncBanner();
      return;
    }
    if (pushResult && pushResult.conflict) {
      // Server CAS rejected: another writer pushed first. Update our merge base
      // to their version so the next debounced push re-merges correctly.
      if (pushResult.cloudData) {
        const { __rev, ...cloudBare } = pushResult.cloudData;
        lastPushedJson = JSON.stringify(cloudBare);
        if (__rev) lastPushedRev = __rev;
      }
      if (pushResult.cloudUpdatedAt) lastSeenCloudUpdatedAt = pushResult.cloudUpdatedAt;
      pendingLocalChanges = true;
      setTimeout(debouncedCloudPush, 300);
      return;
    }
    lastPushedJson = candidateJson;
    lastPushedRev = rev;
    lastSeenCloudUpdatedAt = (pushResult && pushResult.updated_at) || pushedAt;
    // Persist the last-pushed snapshot's hash so a future page load can detect whether the
    // current localStorage matches what the cloud actually has.
    try { localStorage.setItem(STORAGE_KEY + '-pushed-hash', computeSharedHash(payloadState)); } catch(_) {}
    window.__lgLastSyncError = null;
    pendingLocalChanges = false;
    setSyncStatus('synced');
    updateSyncBanner();
    // If a 3-way merge actually changed the payload, adopt the merged result locally
    // (otherwise the user's view still wouldn't show the teammate edits we just pulled in).
    if (mergedHappened){
      applyingRemote = true;
      try {
        const { __rev, ...mergedBare } = payloadState;
        // Preserve our per-device UI prefs. The stripping list at the top of this
        // function pulls 9 fields out of `state`; this restore block has to put
        // ALL 9 back, or they get wiped every time a merge fires. (Old bug —
        // boardZoom, preferredLayout, and collapsedRows used to vanish post-merge.)
        Object.assign(mergedBare, {
          activeTab:        state.activeTab,
          activeBoardId:    state.activeBoardId,
          boardPos:         state.boardPos,
          boardSize:        state.boardSize,
          sectionSize:      state.sectionSize,
          homeViewMode:     state.homeViewMode,
          boardZoom:        state.boardZoom,
          preferredLayout:  state.preferredLayout,
          collapsedRows:    state.collapsedRows,
          boardCollapsed:   state.boardCollapsed,
          bgGuggenheim:     state.bgGuggenheim,
        });
        state = mergedBare;
        runStateMigrations(state);
        if (state.boards && state.activeBoardId && state.boards[state.activeBoardId]){
          restoreBoardFields(state, state.boards[state.activeBoardId].data || {});
        }
        try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(_) {}
        if (!isUserActivelyEditing) render();
        // If editing, state is already updated in memory; render fires on next save/blur.
      } finally {
        applyingRemote = false;
      }
    }
    // Fire-and-forget audit entry. Strip the __rev from both sides so the diff doesn't
    // log the rev token itself as a change every time.
    const { __rev: _a, ...afterForDiff } = payloadState;
    const { __rev: _b, ...beforeForDiff } = (prevShared || {});
    const diff = diffStates(prevShared ? beforeForDiff : null, afterForDiff);
    logAuditEntry(rev, prevRev, candidateJson.length, diff);
  } catch (e) {
    console.warn('push threw', e);
    window.__lgLastSyncError = (e && e.message) || String(e);
    pendingLocalChanges = true;
    setSyncStatus('error');
    updateSyncBanner();
  }
}

function updateSyncBanner(){}

function debouncedCloudPush(){
  if (!supa) return;
  clearTimeout(pushDebounceId);
  pushDebounceId = setTimeout(pushStateToCloud, 200);
}

// Flush any pending push immediately when the tab is hidden / closing.
// We MUST use a synchronous fetch with keepalive:true here — the browser kills
// regular async requests on unload, so the supa-js helper would silently drop them.
// (cachedAccessToken is declared earlier so the auth handler can write to it.)
function flushOnUnload(){
  clearTimeout(pushDebounceId);
  if (!supa || applyingRemote) return;
  if (!pendingLocalChanges) return; // nothing pending — skip
  if (!cachedAccessToken){
    // No token cached yet — best effort with the async path
    try { pushStateToCloud(); } catch(_){}
    return;
  }
  try {
    if (!APPS_SCRIPT_URL) return; // nothing to flush to
    const { boardPos, boardSize, sectionSize, activeTab, activeBoardId, homeViewMode, boardZoom, preferredLayout, collapsedRows, boardCollapsed, bgGuggenheim, ...sharedState } = state;
    const body = JSON.stringify({ op: 'push', data: sharedState });
    fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      keepalive: true,
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body,
    }).catch(() => {});
  } catch(_) { /* best effort */ }
}
window.addEventListener('pagehide', flushOnUnload);
window.addEventListener('beforeunload', flushOnUnload);
window.addEventListener('visibilitychange', () => {
  if(document.visibilityState === 'hidden') flushOnUnload();
});

// Catch-up after the device wakes up or the network comes back. Postgres CDC
// doesn't replay missed events, so if we slept through someone else's edit we'd
// silently stay stale until the next interaction. A pull-on-visible covers that.
async function catchUpFromCloud(){
  if (!supa || !appBooted) return;
  // pullStateFromCloud refuses if we have local edits in flight — it'll push first,
  // then pull. That's the right behavior.
  const ok = await pullStateFromCloud();
  if (ok) render();
}
window.addEventListener('online', () => setTimeout(catchUpFromCloud, 200));
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible') setTimeout(catchUpFromCloud, 200);
});

// ── ROW MULTI-SELECT ──────────────────────────────────────────────────────
// Per-device, not synced. Scoped to one tab at a time — switching tabs clears it.
// Cmd/Ctrl+click toggles. Shift+click selects a range from the last clicked row.
// Cmd/Ctrl+A selects all rows in the current tab. Escape clears.
const _selection = { tab: null, ids: new Set(), lastClickedId: null };
function clearSelection(){
  _selection.tab = null;
  _selection.ids.clear();
  _selection.lastClickedId = null;
  document.querySelectorAll('tr.row-selected').forEach(tr => tr.classList.remove('row-selected'));
  renderSelectionBar();
}
function setSelectionTab(tab){
  if (_selection.tab && _selection.tab !== tab) clearSelection();
  _selection.tab = tab;
}
function toggleRowSelection(tab, rowId, mode){
  setSelectionTab(tab);
  const arr = (state.rows[tab] || []).map(r => r.id);
  if (mode === 'range' && _selection.lastClickedId){
    const a = arr.indexOf(_selection.lastClickedId);
    const b = arr.indexOf(rowId);
    if (a >= 0 && b >= 0){
      const [lo, hi] = a < b ? [a, b] : [b, a];
      for (let i = lo; i <= hi; i++) _selection.ids.add(arr[i]);
    } else {
      _selection.ids.add(rowId);
    }
  } else if (mode === 'toggle'){
    if (_selection.ids.has(rowId)) _selection.ids.delete(rowId);
    else _selection.ids.add(rowId);
    _selection.lastClickedId = rowId;
  } else {
    _selection.ids.clear();
    _selection.ids.add(rowId);
    _selection.lastClickedId = rowId;
  }
  refreshSelectionDom();
  renderSelectionBar();
}
function selectAllInCurrentTab(){
  const tab = state.activeTab;
  if (!tab || tab === 'home' || !Array.isArray(state.rows[tab])) return;
  setSelectionTab(tab);
  state.rows[tab].forEach(r => _selection.ids.add(r.id));
  refreshSelectionDom();
  renderSelectionBar();
}
function refreshSelectionDom(){
  document.querySelectorAll('tr[data-row-id]').forEach(tr => {
    if (_selection.ids.has(tr.dataset.rowId) && tr.dataset.tab === _selection.tab) tr.classList.add('row-selected');
    else tr.classList.remove('row-selected');
  });
}
function renderSelectionBar(){
  let bar = document.getElementById('lgSelBar');
  const count = _selection.ids.size;
  if (count === 0){ if (bar) bar.remove(); return; }
  if (!bar){
    bar = document.createElement('div');
    bar.id = 'lgSelBar';
    bar.innerHTML = `
      <span class="lg-sel-count"></span>
      <button data-act="subrow">Make sub-rows</button>
      <button data-act="parentrow">Make parent rows</button>
      <button data-act="delete" class="lg-sel-danger">Delete</button>
      <button data-act="duplicate">Duplicate</button>
      <button data-act="move">Move to…</button>
      <button data-act="clear" class="lg-sel-ghost">Clear</button>
    `;
    document.body.appendChild(bar);
    bar.addEventListener('click', e => {
      const b = e.target.closest('button'); if (!b) return;
      const act = b.dataset.act;
      const tab = _selection.tab;
      const ids = [..._selection.ids];
      if (act === 'clear'){ clearSelection(); return; }
      if (!tab || !ids.length) return;
      if (act === 'subrow'){ bulkShiftIndent(tab, ids, +1); return; }
      if (act === 'parentrow'){ bulkShiftIndent(tab, ids, -1); return; }
      if (act === 'delete'){
        if (!confirm(`Delete ${ids.length} row${ids.length===1?'':'s'}?`)) return;
        state.rows[tab] = (state.rows[tab] || []).filter(r => !_selection.ids.has(r.id));
        clearSelection(); save(); render();
      } else if (act === 'duplicate'){
        const arr = state.rows[tab] || [];
        // Insert duplicates right after the last selected occurrence, preserving order
        const lastIdx = Math.max(...ids.map(id => arr.findIndex(r => r.id === id)));
        const dupes = arr.filter(r => _selection.ids.has(r.id)).map(r => ({ ...r, id: rid() }));
        arr.splice(lastIdx + 1, 0, ...dupes);
        clearSelection(); save(); render();
      } else if (act === 'move'){
        openMovePicker(b, tab, ids);
      }
    });
  }
  bar.querySelector('.lg-sel-count').textContent = `${count} row${count===1?'':'s'} selected`;
}
function openMovePicker(anchor, fromTab, ids){
  document.querySelectorAll('.lg-sel-pop').forEach(n => n.remove());
  const pop = document.createElement('div');
  pop.className = 'lg-sel-pop';
  const targets = Object.keys(state.rows || {}).filter(k => k !== fromTab && k !== 'home');
  if (!targets.length){ pop.innerHTML = '<div class="lg-sel-empty">No other lists to move to.</div>'; }
  else {
    pop.innerHTML = targets.map(k => `<button data-target="${k}">${escapeHtml(state.titles?.[k] || k)}</button>`).join('');
  }
  document.body.appendChild(pop);
  const r = anchor.getBoundingClientRect();
  pop.style.left = Math.max(8, r.left) + 'px';
  pop.style.top  = (r.top - pop.offsetHeight - 6) + 'px';
  pop.addEventListener('click', e => {
    const b = e.target.closest('button[data-target]'); if (!b) return;
    const toTab = b.dataset.target;
    ids.forEach(id => moveRowToTab(id, fromTab, toTab));
    pop.remove();
    clearSelection();
  });
  setTimeout(() => {
    const close = ev => { if (!pop.contains(ev.target)) { pop.remove(); document.removeEventListener('click', close, true); } };
    document.addEventListener('click', close, true);
  }, 0);
}
// Bulk indent / outdent for every currently-selected row. Shifts each row's
// indent by `delta` (clamped 0..8), so a flat selection becomes sub-rows of
// whatever sits above the topmost selected row, and an already-nested
// selection preserves its relative shape.
function bulkShiftIndent(tab, ids, delta){
  const arr = state.rows[tab] || [];
  const set = new Set(ids);
  let touched = false;
  arr.forEach(r => {
    if (!set.has(r.id)) return;
    const before = r.indent | 0;
    const after = Math.max(0, Math.min(8, before + delta));
    if (after !== before){ r.indent = after; touched = true; }
  });
  if (touched){ save(); render(); refreshSelectionDom(); }
}
// Right-click menu that appears when 2+ rows are selected and the user
// right-clicks on any of them. Mirrors the floating selection bar's actions.
function openSelectionContextMenu(x, y, tab){
  closeFloatingRowMenu();
  const ids = [..._selection.ids];
  if (!ids.length) return;
  const pop = document.createElement('div');
  pop.className = 'row-menu-pop floating-row-menu';
  pop.innerHTML = `
    <button data-act="subrow">Make sub-rows</button>
    <button data-act="parentrow">Make parent rows</button>
    <div class="sep"></div>
    <button data-act="duplicate">Duplicate ${ids.length} rows</button>
    <button data-act="move">Move to…</button>
    <div class="sep"></div>
    <button data-act="delete" class="danger">Delete ${ids.length} rows</button>
    <div class="sep"></div>
    <button data-act="clear">Clear selection</button>
  `;
  document.body.appendChild(pop);
  const popW = pop.offsetWidth, popH = pop.offsetHeight;
  let left = x, top = y;
  if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
  if (top + popH > window.innerHeight - 8) top = Math.max(8, top - popH);
  pop.style.left = Math.max(8, left) + 'px';
  pop.style.top = Math.max(8, top) + 'px';
  pop.addEventListener('click', e => {
    const b = e.target.closest('button'); if (!b) return;
    e.stopPropagation();
    const act = b.dataset.act;
    const arr = state.rows[tab] || [];
    closeFloatingRowMenu();
    if (act === 'subrow'){ bulkShiftIndent(tab, ids, +1); }
    else if (act === 'parentrow'){ bulkShiftIndent(tab, ids, -1); }
    else if (act === 'duplicate'){
      const lastIdx = Math.max(...ids.map(id => arr.findIndex(r => r.id === id)));
      const dupes = arr.filter(r => _selection.ids.has(r.id)).map(r => ({ ...r, id: rid() }));
      arr.splice(lastIdx + 1, 0, ...dupes);
      clearSelection(); save(); render();
    }
    else if (act === 'move'){
      const selBar = document.getElementById('lgSelBar');
      const anchor = selBar ? selBar.querySelector('[data-act="move"]') : null;
      openMovePicker(anchor || pop, tab, ids);
    }
    else if (act === 'delete'){
      if (!confirm(`Delete ${ids.length} row${ids.length===1?'':'s'}?`)) return;
      state.rows[tab] = arr.filter(r => !_selection.ids.has(r.id));
      clearSelection(); save(); render();
    }
    else if (act === 'clear'){ clearSelection(); }
  });
}
// Keyboard: Cmd/Ctrl+A select-all (in list view, not in inputs), Escape clears.
window.addEventListener('keydown', e => {
  const t = e.target;
  const inField = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
  if ((e.metaKey || e.ctrlKey) && (e.key === 'a' || e.key === 'A') && !inField){
    if (state.activeTab && state.activeTab !== 'home'){
      e.preventDefault();
      selectAllInCurrentTab();
    }
  } else if (e.key === 'Escape' && _selection.ids.size > 0 && !inField){
    clearSelection();
  }
});

// ── PARENT / CHILD ROW HIERARCHY ──────────────────────────────────────────
// A row is a "parent" of any contiguous rows below it whose indent is deeper.
// state.collapsedRows[rowId] = true hides those children at render time and
// makes the parent draggable as a group (children come along).
function getChildRowsContiguous(rows, parentIdx){
  const parentIndent = (rows[parentIdx]?.indent | 0);
  const children = [];
  for (let i = parentIdx + 1; i < rows.length; i++){
    if ((rows[i].indent | 0) > parentIndent) children.push(rows[i]);
    else break;
  }
  return children;
}
function visibleRowsAfterCollapse(rows){
  const collapsed = state.collapsedRows || {};
  const out = [];
  for (let i = 0; i < rows.length; i++){
    const r = rows[i];
    out.push(r);
    if (collapsed[r.id]){
      const myIndent = r.indent | 0;
      while (i + 1 < rows.length && (rows[i + 1].indent | 0) > myIndent) i++;

// ── SORT BY FIRST COLUMN ──────────────────────────────────────────────────
// View-time sort. state.sort[tab] = { col, dir: 'asc'|'desc' }. Click the first
// column header to cycle off → asc → desc → off. Doesn't mutate state.rows so
// manual reorder via drag still works the moment sort is cleared.
function applySortForRender(tab, rows){
  if (!Array.isArray(rows)) return rows;
  const sort = state.sort?.[tab];
  if (!sort || !sort.col || !sort.dir) return rows;
  const sorted = rows.slice();
  const key = sort.col;
  const dir = sort.dir === 'desc' ? -1 : 1;
  const txt = v => {
    if (v == null) return '';
    const s = String(v);
    if (!/<\/?[a-z]/i.test(s)) return s.toLowerCase();
    const tmp = document.createElement('div');
    tmp.innerHTML = s;
    return (tmp.textContent || '').toLowerCase();
  };
  sorted.sort((a, b) => {
    const av = txt(a[key]);
    const bv = txt(b[key]);
    // Empty strings sink to the bottom regardless of direction so they don't
    // crowd the top of asc-sorts.
    if (av === '' && bv !== '') return 1;
    if (bv === '' && av !== '') return -1;
    if (av < bv) return -1 * dir;
    if (av > bv) return  1 * dir;
    return 0;

}
function toggleSort(tab, col){

  let next;
  if (!cur || cur.col !== col) next = { col, dir: 'asc' };
  else if (cur.dir === 'asc') next = { col, dir: 'desc' };
  else next = null;
  if (next) state.sort[tab] = next;
  else delete state.sort[tab];
  save();
  render();
}

// ── TAB-TO-NEXT-CELL ──────────────────────────────────────────────────────
// Excel-style cell traversal. Tab goes to the next contenteditable in DOM order
// (across rows when needed), Shift+Tab goes backward. Cursor lands at end of
// the target cell's content.
function focusAdjacentCell(currentDiv, dir){
  if (!currentDiv) return;
  const all = Array.from(document.querySelectorAll('.cell-edit'));
  const idx = all.indexOf(currentDiv);
  if (idx < 0) return;
  const target = all[dir === 'prev' ? idx - 1 : idx + 1];
  if (!target) return;
  target.focus();
  // Place cursor at end so subsequent typing appends rather than overwriting.
  try {
    const range = document.createRange();
    range.selectNodeContents(target);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  } catch(_) {}
}

// Enter on a cell jumps to the same column on the next row (spreadsheet-style).
// Walks down through following <tr>s within the same table, falling back to any
// editable cell in that row if the same-column target isn't editable.
function focusCellBelow(currentDiv){
  if (!currentDiv) return;
  const td = currentDiv.closest('td');
  const tr = td && td.closest('tr');
  if (!td || !tr) return;
  const cellIndex = Array.from(tr.children).indexOf(td);
  let nextTr = tr.nextElementSibling;
  while (nextTr) {
    const targetTd = nextTr.children[cellIndex];
    let editable = targetTd && targetTd.querySelector && targetTd.querySelector('.cell-edit, [contenteditable="true"]');
    if (!editable) editable = nextTr.querySelector('.cell-edit, [contenteditable="true"]');
    if (editable) {
      editable.focus();
      try {
        const range = document.createRange();
        range.selectNodeContents(editable);
        range.collapse(false);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      } catch(_){}
      return;
    }
    nextTr = nextTr.nextElementSibling;
  }
}

// ── AUTO-UPDATE CHECK ────────────────────────────────────────────────────
// Every browser tab boots with a build stamp from <meta name="lg-build">. We
// re-fetch the page periodically and compare its stamp to ours. When they
// differ, a teammate has pushed a new deploy; show a non-blocking banner
// inviting them to reload. Eliminates the "ping Kate to refresh" step after
// every deploy.
const __lgBootBuild = (document.querySelector('meta[name="lg-build"]') || {}).content || '';

    const m = txt.match(/<meta[^>]+name=["']lg-build["'][^>]+content=["']([^"']+)["']/i);

    <button id="lgUpdateBtn" style="background:#fff;color:#0a6b96;border:none;padding:6px 14px;border-radius:6px;font:700 12px inherit;cursor:pointer">Reload now</button>
    <button id="lgUpdateDismiss" style="background:transparent;color:#fff;border:1px solid rgba(255,255,255,.55);padding:6px 10px;border-radius:6px;font:600 12px inherit;cursor:pointer">Later</button>

  bar.querySelector('#lgUpdateBtn').addEventListener('click', () => location.reload());

// Poll on a 2-minute interval, and immediately on visibility/online resume so

setInterval(checkForNewBuild, 2 * 60 * 1000);

// Generic leading-edge dedup: ignore repeat calls with the same key within `ms`.
// Used to make create-buttons safe against double-clicks even though save() debounces
// the network call — the click handlers themselves mutate state and would otherwise
// produce duplicate rows/boards/tiles.
const __lgClickGuard = new Map();

// Stash of the most recent payload we pushed, used to suppress our own echo.
let lastPushedJson = null;
let pendingRemoteState = null;

function applyRemoteState(remote){
  if (remote && remote.__schemaVersion && remote.__schemaVersion > SCHEMA_VERSION) {
    _showVersionReloadGate(remote.__schemaVersion);
    return;
  }
  // If we have unsaved local changes, refuse to apply the remote update — otherwise a
  // teammate's push would overwrite our in-flight edits (the "lost template" bug).
  if (pendingLocalChanges) {
    console.warn('skipping remote apply: local has pending changes');
    pendingRemoteState = remote;
    pushStateToCloud(); // try to flush our local first
    return;
  }
  // Belt-and-suspenders: even if upstream guards missed (focus briefly transitioned,
  // recent keystroke not yet reflected in pendingLocalChanges, etc.), refuse to apply
  // remote while the user is editing. The deferred apply runs on focusout 80ms later.
  if (isUserCurrentlyEditing()) {
    console.warn('skipping remote apply: user is editing');
    pendingRemoteState = remote;
    return;
  }
  // Cancel any in-flight debounced push — otherwise the timer fires after this apply
  // and re-pushes the merged-remote-as-ours, creating a false "your edit" record.
  clearTimeout(pushDebounceId);
  pushDebounceId = null;
  // preserve local UI prefs across the merge — including activeBoardId so a teammate's
  // push doesn't bounce us off our currently-open workspace
  const localPrefs = {
    activeTab:        state?.activeTab,
    activeBoardId:    state?.activeBoardId,
    boardPos:         state?.boardPos,
    boardSize:        state?.boardSize,
    sectionSize:      state?.sectionSize,
    homeViewMode:     state?.homeViewMode,
    boardZoom:        state?.boardZoom,
    preferredLayout:  state?.preferredLayout,
    collapsedRows:    state?.collapsedRows,
    boardCollapsed:   state?.boardCollapsed,
    bgGuggenheim:     state?.bgGuggenheim,
  };
  const merged = { ...remote, ...{
    activeTab:        localPrefs.activeTab        ?? remote.activeTab,
    activeBoardId:    localPrefs.activeBoardId    ?? remote.activeBoardId,
    boardPos:         localPrefs.boardPos         ?? remote.boardPos,
    boardSize:        localPrefs.boardSize        ?? remote.boardSize,
    sectionSize:      localPrefs.sectionSize      ?? remote.sectionSize,
    homeViewMode:     localPrefs.homeViewMode     ?? remote.homeViewMode,
    boardZoom:        localPrefs.boardZoom        ?? remote.boardZoom,
    preferredLayout:  localPrefs.preferredLayout  ?? remote.preferredLayout,
    collapsedRows:    localPrefs.collapsedRows    ?? remote.collapsedRows,
    boardCollapsed:   localPrefs.boardCollapsed   ?? remote.boardCollapsed,
    bgGuggenheim:     localPrefs.bgGuggenheim     ?? remote.bgGuggenheim,
  }};
  applyingRemote = true;
  try {
    state = merged;
    runStateMigrations(state);
    // Update the merge base so subsequent local pushes compare against this
    // newly-applied cloud state rather than our older snapshot.
    try {
      const { boardPos, boardSize, sectionSize, activeTab, activeBoardId, homeViewMode, boardZoom, preferredLayout, collapsedRows, boardCollapsed, bgGuggenheim, ...shared } = remote;
      lastPushedJson = JSON.stringify(shared);
      if (remote.__rev) lastPushedRev = remote.__rev;
    } catch(_){}
    // Re-restore per-board fields (rows, titles, bgColor, brandImage, etc.) from the
    // *local* active board's data — so a remote echo from someone on a different board
    // doesn't bleed their bg color / logo / lists into ours.
    if(state.boards && state.activeBoardId && state.boards[state.activeBoardId]){
      restoreBoardFields(state, state.boards[state.activeBoardId].data || {});
    }
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(_) {}
    render();
  } finally {

  }
}

// Tracks any in-progress UI interaction that a remote re-render would disrupt:
// open popovers, open row menus, drags in flight, modals, etc. Components that take
// focus-stealing actions push onto this counter; they pop on unwind. While > 0,
// realtime applies are deferred to the next focusout / state-change cycle.
let interactionDepth = 0;
function pushInteraction(){ interactionDepth++; }
function popInteraction(){ interactionDepth = Math.max(0, interactionDepth - 1); }

// Bumped on every contenteditable / input keystroke. If a keystroke landed within
// the last RECENT_TYPING_WINDOW_MS, treat the user as "still editing" even if
// focus briefly transitions — prevents the realtime apply / render from nuking
// the live cell DOM mid-typing.
let lastKeystrokeAt = 0;
const RECENT_TYPING_WINDOW_MS = 1500;
document.addEventListener('input', e => {
  const t = e.target;
  if (!t) return;
  if (t.isContentEditable || t.tagName === 'INPUT' || t.tagName === 'TEXTAREA') {
    lastKeystrokeAt = Date.now();
  }
}, true);
document.addEventListener('keydown', e => {
  const t = e.target;
  if (!t) return;
  if (t.isContentEditable || t.tagName === 'INPUT' || t.tagName === 'TEXTAREA') {
    lastKeystrokeAt = Date.now();
  }
}, true);

  // Recent typing — even if focus briefly moved, treat as still editing.

  // Any open popover/menu attached to body
  if (document.querySelector('.pop, .row-menu-pop.open, .floating-row-menu, .row-menu.open, .modal-bg.open, .tile-dialog-bg, .board-menu')) return true;
  // Any board card or row currently being dragged
  if (document.querySelector('.board-card.dragging, .tbl tbody tr.dragging, .tbl tbody tr.row-dragging, .tbl thead th.th-dragging')) return true;
  const el = document.activeElement;
  if (!el) return false;
  if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.tagName === 'SELECT') return true;
  if (el.isContentEditable) return true;
  return false;
}

function subscribeRealtime(){
  if (!supa) return;
  supa.channel('app_state_changes')
    .on('postgres_changes',
        { event: '*', schema: 'public', table: 'app_state', filter: 'id=eq.main' },
        payload => {
          if (!payload || !payload.new || !payload.new.data) return;
          const remote = payload.new.data;
          // Suppress our own echo. Postgres JSONB may reorder keys on roundtrip,
          // so don't trust full-JSON equality — match on the revision token we stamped
          // into the payload at push time, which round-trips intact.
          if (remote.__rev && remote.__rev === lastPushedRev) return;
          // If the user is typing right now, defer the apply until they blur
          if (isUserCurrentlyEditing()) {
            pendingRemoteState = remote;
            return;
          }
          applyRemoteState(remote);
        })
    .subscribe();

  // When the user finishes editing (blur), apply any deferred remote update
  document.addEventListener('focusout', () => {
    setTimeout(() => {
      if (pendingRemoteState && !isUserCurrentlyEditing()) {
        const r = pendingRemoteState;
        pendingRemoteState = null;
        applyRemoteState(r);
      }
    }, 80);
  });
}

    out[archKey] = { ...b, label: b.label + ' — archive', isArchive:true, columns: [...b.columns, ...AUDIT_COLS] };
  });
  return out;
})();

// Boards that show on Home / are draggable on the canvas (live ones only)
const LIVE_BOARDS = Object.keys(BASE_SCHEMAS);
// All board keys (live + archive)
const ALL_BOARDS = Object.keys(SCHEMAS);

// Resolve effective columns for a tab: schema columns + user-added, with widths overridden
// and ordered by state.colOrder[tab] if present.
function getColumns(tab){
  const base = SCHEMAS[tab].columns.map(c => ({...c}));
  const extras = (state.userColumns?.[tab] || []).map(c => ({...c, isUser:true}));
  const all = [...base, ...extras];
  const widths = state.colWidths?.[tab] || {};
  const order = state.colOrder?.[tab];
  let ordered;
  if(Array.isArray(order) && order.length){
    const byKey = Object.fromEntries(all.map(c => [c.key, c]));
    const seen = new Set();
    const out = [];
    order.forEach(k => { if(byKey[k] && !seen.has(k)){ out.push(byKey[k]); seen.add(k); }});
    all.forEach(c => { if(!seen.has(c.key)) out.push(c); }); // append any new cols
    ordered = out;
  } else {
    ordered = all;
  }
  // Filter out hidden columns
  const hidden = (state.hiddenCols?.[tab]) || [];
  ordered = ordered.filter(c => !hidden.includes(c.key));
  return ordered.map(c => ({...c, width: widths[c.key] ?? c.width}));
}

// Hidden-column helpers used by the "+ menu" → "Restore" path
function getHiddenColumns(tab){
  const hidden = (state.hiddenCols?.[tab]) || [];
  if(!hidden.length) return [];
  const allCols = SCHEMAS[tab].columns.map(c => ({...c}));
  return hidden
    .map(key => allCols.find(c => c.key === key))
    .filter(Boolean);
}
function restoreHiddenColumn(tab, colKey){
  if(!state.hiddenCols || !state.hiddenCols[tab]) return;
  state.hiddenCols[tab] = state.hiddenCols[tab].filter(k => k !== colKey);
  save(); render();
}

function todayISO(){
  const d = new Date();
  const yyyy = d.getFullYear();
  const mm = String(d.getMonth()+1).padStart(2,'0');
  const dd = String(d.getDate()).padStart(2,'0');

}
function daysBetween(isoFrom, isoTo){
  if(!isoFrom || !isoTo) return null;
  const a = new Date(isoFrom + 'T00:00:00');
  const b = new Date(isoTo   + 'T00:00:00');
  return Math.round((b - a) / 86400000);
}

const DEFAULT_TILES = [
  { id: 'firm-tracker', kind: 'internal', route: 'tracker', label: 'Firm Tracker', icon: '✓', desc: 'Tasks across client matters, business development, and internal.', color: '#252f7c' },
];

// Fields that vary PER BOARD (swap in/out on board switch)
const PER_BOARD_FIELDS = ['rows','titles','headers','colWidths','userColumns','colOrder','boardOrder','userBoards','activeTab','bgColor','brandImage','hiddenCols'];

function snapshotBoardFields(s){
  const out = {};
  PER_BOARD_FIELDS.forEach(k => { out[k] = s[k]; });
  return out;
}

function restoreBoardFields(s, snap){
  PER_BOARD_FIELDS.forEach(k => {
    s[k] = (snap && snap[k] !== undefined) ? snap[k] : undefined;
  });
}

function runStateMigrations(s){
  // Dashboard tile defaults (legacy)
  s.dashboard = s.dashboard || {};
  if(!Array.isArray(s.dashboard.tiles) || !s.dashboard.tiles.length){
    s.dashboard.tiles = DEFAULT_TILES.map(t => ({...t}));
  }
  if(!s.dashboard.tiles.find(t => t.id === 'firm-tracker')){
    s.dashboard.tiles.unshift({...DEFAULT_TILES[0]});
  }
  // Multi-board: snapshot the existing flat fields into a 'main' board on first load.
  s.boards = s.boards || {};
  if(!s.boards.main){
    s.boards.main = {
      title: 'Firm To-Do Tracker',
      data: snapshotBoardFields(s),
    };
  }
  // Backfill bgColor/brandImage from top-level state to the active board's data
  // (so existing branding moves into the main board and stays there).
  if(s.boards.main && s.boards.main.data){
    if(s.boards.main.data.bgColor === undefined && typeof s.bgColor === 'string') s.boards.main.data.bgColor = s.bgColor;
    if(s.boards.main.data.brandImage === undefined && typeof s.brandImage === 'string') s.boards.main.data.brandImage = s.brandImage;
  }
  if(!s.activeBoardId || !s.boards[s.activeBoardId]) s.activeBoardId = 'main';
  if(!s.matryoshkaHome) s.matryoshkaHome = {};
  if(s.viewingMatryoshkaHome === undefined) s.viewingMatryoshkaHome = false;
  if(!s.matryoshkaHomeMode) s.matryoshkaHomeMode = 'free';
  if(!s.matryoshkaHomeZoom) s.matryoshkaHomeZoom = 1;
  if(!s.skin) s.skin = 'simple';
  s.titles = s.titles || {};
  if(!s.titles.home) s.titles.home = 'Home';
  if(!s.activeTab) s.activeTab = 'home';
  // Rebuild the runtime registries from scratch each migration. Previously this just
  // appended to LIVE_BOARDS / ALL_BOARDS / SCHEMAS, which meant deleted boards (and stale
  // entries from realtime applies of other workspaces) accumulated forever — both a memory
  // leak and a correctness bug for getColumns / archiveSweep.
  // 1. Reset the dynamic portions of the registries to the built-in defaults.
  for (const k of Object.keys(SCHEMAS)) {
    if (!BASE_SCHEMAS[k] && !BASE_SCHEMAS[LIVE_OF[k]]) delete SCHEMAS[k];
  }
  for (const k of Object.keys(ARCHIVE_OF)) {
    if (!BASE_SCHEMAS[k]) delete ARCHIVE_OF[k];
  }
  for (const k of Object.keys(LIVE_OF)) {
    if (!BASE_SCHEMAS[LIVE_OF[k]]) delete LIVE_OF[k];
  }
  LIVE_BOARDS.length = 0;
  for (const k of Object.keys(BASE_SCHEMAS)) LIVE_BOARDS.push(k);
  ALL_BOARDS.length = 0;
  for (const k of Object.keys(SCHEMAS)) ALL_BOARDS.push(k);
  // 2. Re-register every user-created board from state.userBoards.
  s.userBoards = s.userBoards || {};
  Object.keys(s.userBoards).forEach(key => {
    const meta = s.userBoards[key];
    SCHEMAS[key] = { ...meta, isArchive:false, columns: [...(meta.columns || []), ...AUDIT_COLS] };
    if(!LIVE_BOARDS.includes(key)) LIVE_BOARDS.push(key);
    if(!ALL_BOARDS.includes(key)) ALL_BOARDS.push(key);
    if(!s.titles[key]) s.titles[key] = meta.label;
    const archKey = key + 'Archive';
    SCHEMAS[archKey] = { ...meta, label: meta.label + ' — archive', isArchive:true, columns: [...(meta.columns || []), ...AUDIT_COLS] };
    ARCHIVE_OF[key] = archKey;
    LIVE_OF[archKey] = key;
    if(!ALL_BOARDS.includes(archKey)) ALL_BOARDS.push(archKey);
    if(!s.titles[archKey]) s.titles[archKey] = meta.label + ' — archive';
  });
  // Seed the built-in 3 boards only on first-ever load (defaultState handles that path).
  // For migrating state — including snapshots that lost boardOrder during a board switch —
  // default to empty so deleted lists don't keep resurrecting on every reload.
  if(!Array.isArray(s.boardOrder)) s.boardOrder = [];
  // One-time reorder: if user is still on the old default ['internal','client','bd'], promote to new default.
  if(s.boardOrder.length === 3 && s.boardOrder[0]==='internal' && s.boardOrder[1]==='client' && s.boardOrder[2]==='bd' && !s._reorderedV2){
    s.boardOrder = ['client','bd','internal'];
    s._reorderedV2 = true;
  }
  // One-time addition: surface the built-in Financing board for existing users.
  if(!s._seededFinancing && LIVE_BOARDS.includes('financing') && !s.boardOrder.includes('financing')){
    const insertAt = Math.min(1, s.boardOrder.length);
    s.boardOrder.splice(insertAt, 0, 'financing');
    s._seededFinancing = true;
  }
  if(!s.homeViewMode) s.homeViewMode = 'free';
  // Drop any keys that aren't valid live boards anymore (e.g., orphaned user-list keys).
  // We do NOT auto-add the built-in 'internal','client','bd' here — if the user deleted them,
  // they should stay deleted (otherwise they'd resurrect on every reload).
  s.boardOrder = s.boardOrder.filter(k => LIVE_BOARDS.includes(k));
  s.boardPos = s.boardPos || {};
  const posDefaults = { internal:{x:20,y:20}, client:{x:600,y:20}, bd:{x:20,y:520}, financing:{x:600,y:520} };
  LIVE_BOARDS.forEach(k => { if(!s.boardPos[k]) s.boardPos[k] = posDefaults[k] || {x:20,y:20}; });
  s.boardSize = s.boardSize || {};
  LIVE_BOARDS.forEach(k => { s.boardSize[k] = s.boardSize[k] || {w:560,h:0}; });
  s.colWidths   = s.colWidths   || {};
  s.userColumns = s.userColumns || {};
  s.headers     = s.headers     || {};
  s.colOrder    = s.colOrder    || {};
  s.hiddenCols  = s.hiddenCols  || {};
  ALL_BOARDS.forEach(k => {
    s.colWidths[k]   = s.colWidths[k]   || {};
    s.userColumns[k] = s.userColumns[k] || [];
    s.headers[k]     = s.headers[k]     || {};
    s.colOrder[k]    = Array.isArray(s.colOrder[k]) ? s.colOrder[k] : [];
    s.hiddenCols[k]  = Array.isArray(s.hiddenCols[k]) ? s.hiddenCols[k] : [];
  });
  s.rows = s.rows || {};
  ALL_BOARDS.forEach(k => { s.rows[k] = s.rows[k] || []; });
  const today = todayISO();
  ALL_BOARDS.forEach(k => {
    s.rows[k].forEach(r => {
      if(!('dateAdded' in r))    r.dateAdded = today;
      if(!('dateResolved' in r)) r.dateResolved = '';
    });
  });
  const defTitles = { financing:'Financing', internalArchive:'Internal — archive', clientArchive:'Client matters — archive', bdArchive:'Business development — archive', financingArchive:'Financing — archive' };
  Object.keys(defTitles).forEach(k => { if(!s.titles[k]) s.titles[k] = defTitles[k]; });
  return s;
}

let state = load();
function load(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw){
      const s = JSON.parse(raw);
      return runStateMigrations(s);
    }
  }catch(e){}
  return runStateMigrations(defaultState());
}
// ── UNDO STACK ────────────────────────────────────────────────────────────
// Push the previous serialized state on every local mutation so Cmd/Ctrl+Z
// can step backwards. Skip when applying a remote update or running an undo
// itself, so a teammate's edit and the undo's own save() don't poison the stack.
const UNDO_LIMIT = 40;
const undoStack = [];
const redoStack = [];
let suppressUndoPush = false;
function pushUndoSnapshot(){
  if (suppressUndoPush || applyingRemote) return;
  try {
    const prev = localStorage.getItem(STORAGE_KEY);
    if (!prev) return;
    if (undoStack.length && undoStack[undoStack.length - 1] === prev) return;
    undoStack.push(prev);
    if (undoStack.length > UNDO_LIMIT) undoStack.shift();
    // Any fresh edit invalidates the redo history (standard editor behavior).
    redoStack.length = 0;
  } catch(_) {}
}
function performUndo(){
  if (!undoStack.length) return false;
  const prev = undoStack.pop();
  try {
    // Capture the *current* state before reverting so Cmd+Shift+Z can restore it.
    const current = localStorage.getItem(STORAGE_KEY);
    if (current) redoStack.push(current);
    const parsed = JSON.parse(prev);
    state = runStateMigrations(parsed);
    if(state.boards && state.activeBoardId && state.boards[state.activeBoardId]){
      restoreBoardFields(state, state.boards[state.activeBoardId].data || {});
    }
    suppressUndoPush = true;
    save();
    suppressUndoPush = false;
    render();
    return true;
  } catch(e) {
    console.warn('undo failed', e);
    return false;
  }
}
function performRedo(){
  if (!redoStack.length) return false;
  const next = redoStack.pop();
  try {
    const current = localStorage.getItem(STORAGE_KEY);
    if (current) undoStack.push(current);
    const parsed = JSON.parse(next);
    state = runStateMigrations(parsed);
    if(state.boards && state.activeBoardId && state.boards[state.activeBoardId]){
      restoreBoardFields(state, state.boards[state.activeBoardId].data || {});
    }
    suppressUndoPush = true;
    save();
    suppressUndoPush = false;
    render();
    return true;
  } catch(e) {
    console.warn('redo failed', e);
    return false;
  }
}
window.addEventListener('keydown', e => {
  if (!(e.metaKey || e.ctrlKey)) return;
  const k = (e.key || '').toLowerCase();
  const t = e.target;
  const inEditable = t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable);
  // Structural undo (Cmd/Ctrl+Z) / redo (Cmd/Ctrl+Shift+Z or Cmd/Ctrl+Y).
  // Inside text fields we defer to the browser's native text-level undo so the
  // user gets character-by-character undo of their typing.
  if (k === 'z' && !e.shiftKey) {
    if (inEditable) return;
    e.preventDefault();
    performUndo();
    return;
  }
  if ((k === 'z' && e.shiftKey) || k === 'y') {
    if (inEditable) return;
    e.preventDefault();
    performRedo();
    return;
  }
});

// Cmd/Ctrl + B / I / U inside contenteditable cells and the notes editor.
// Modern Chrome is inconsistent about firing these natively, so wire them up
// explicitly via execCommand (still supported in every major browser for these
// three commands as of 2026, despite being formally deprecated). After applying
// the formatting, dispatch an `input` event so the cell's save() handler runs.
(function wireFormattingShortcuts(){
  const FORMAT_KEYS = { b: 'bold', i: 'italic', u: 'underline' };
  document.addEventListener('keydown', e => {
    if (!(e.metaKey || e.ctrlKey)) return;
    const k = (e.key || '').toLowerCase();
    const t = e.target;
    if (!t || !t.isContentEditable) return; // only inside editable cells/notes
    // Strikethrough — Cmd/Ctrl+Shift+X (Notion/Linear standard).
    if (e.shiftKey && k === 'x') {
      e.preventDefault();
      try { document.execCommand('strikeThrough', false, null); } catch(_) {}
      t.dispatchEvent(new Event('input', { bubbles: true }));
      return;
    }
    const cmd = FORMAT_KEYS[k];
    if (!cmd || e.shiftKey) return;
    e.preventDefault();
    try { document.execCommand(cmd, false, null); } catch(_) {}
    // Fire input so the cell's `input` listener picks up the change and saves.
    t.dispatchEvent(new Event('input', { bubbles: true }));
  });
})();

function save(){
  pushUndoSnapshot();
  // Keep the active board's snapshot in sync with the live top-level fields.
  if(state.activeBoardId && state.boards && state.boards[state.activeBoardId]){
    state.boards[state.activeBoardId].data = snapshotBoardFields(state);
  }
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    window.__lgQuotaError = false;
  } catch (e) {
    // Quota exceeded (typically ~5 MB per origin). Cloud push can still succeed but the
    // next reload would read stale state. Surface it so the user knows to clean up.
    if ((e.name && e.name.toLowerCase().includes('quota')) || (e.code === 22) || /quota/i.test(String(e))) {
      window.__lgQuotaError = true;
      window.__lgLastSyncError = 'Browser storage full — large brand image or many boards. Reduce them, or your changes won\'t survive a reload.';
      pendingLocalChanges = true;
      setSyncStatus('error');
      updateSyncBanner();
    } else {
      console.warn('localStorage save failed', e);
    }
  }
  // Mark "local has changes that haven't been confirmed pushed". Cleared on a successful push.
  // Suppressed while we're applying a remote update — those edits aren't user-driven.
  if (!applyingRemote) pendingLocalChanges = true;
  debouncedCloudPush();
}

/* ── BOARD (workspace) management ── */
function bid(){ return 'b_' + Math.random().toString(36).slice(2,9); }

function listBoards(){
  return Object.keys(state.boards || {}).map(id => ({
    id, title: state.boards[id].title || 'Untitled board',
    isActive: id === state.activeBoardId,
  }));
}

function switchBoard(id){
  if(!state.boards || !state.boards[id] || id === state.activeBoardId) return;
  // Snapshot current — guard in case the active board was deleted on another tab via realtime
  // (otherwise this throws on `.data = ...` on undefined).
  if (state.activeBoardId && state.boards[state.activeBoardId]) {
    state.boards[state.activeBoardId].data = snapshotBoardFields(state);
  }
  // Load new
  state.activeBoardId = id;
  restoreBoardFields(state, state.boards[id].data || {});
  // Re-run migrations for the loaded board so any missing defaults fill in
  runStateMigrations(state);
  // Always land on the home canvas when switching workspaces — that's where the
  // Free/Stacked/Auto-fit/Min all/Save layout/Preferred Fit toolbar lives, and
  // it's hidden on single-list views. Otherwise a workspace whose last view was
  // an individual list opens without the toolbar.
  state.activeTab = 'home';
  state.viewingMatryoshkaHome = false;
  save();
  render();
  if (typeof maybeSeedMechanicsListOnce === 'function') maybeSeedMechanicsListOnce();
}

function createBoard(title, templateKey){
  return once('create-board:' + (title || '') + ':' + (templateKey || ''), 600, () => _createBoard(title, templateKey));
}
function _createBoard(title, templateKey){
  templateKey = templateKey || 'blank';
  const id = bid();
  // Empty workspace: no built-in lists, no rows, fresh bg/logo
  const emptyData = {
    rows: {},
    titles: { home: 'Home' },
    headers: {},
    colWidths: {},
    userColumns: {},
    colOrder: {},
    boardOrder: [],
    userBoards: {},
    activeTab: 'home',
    bgColor: '',
    brandImage: '',
    hiddenCols: {},
  };
  state.boards[id] = { title: title || 'New board', data: emptyData };
  // Snapshot current first, then switch
  state.boards[state.activeBoardId].data = snapshotBoardFields(state);
  state.activeBoardId = id;
  restoreBoardFields(state, emptyData);
  runStateMigrations(state);
  // Populate from template if requested. Look in both built-ins AND user-saved customs.
  if(templateKey && templateKey !== 'blank'
     && (BOARD_TEMPLATES[templateKey] || (state.customTemplates && state.customTemplates[templateKey]))){
    applyTemplateToCurrentBoard(templateKey);
  }
  save();
  render();
  return id;
}

function openNewBoardDialog(){

          </select>
          <button id="nbDel" type="button" title="Delete this saved template" style="padding:7px 10px;border:1px solid var(--border-strong);border-radius:7px;background:#fff;color:var(--muted);font-size:12px;font-family:inherit;cursor:pointer;white-space:nowrap" disabled>× Delete template</button>
        </div>
        <div class="tile-dialog-actions">
          <button class="cancel" type="button">Cancel</button>
          <button class="save" type="button">Create board</button>
        </div>
      </div>`;
    const nameIn = bg.querySelector('#nbName');
    const tplSel = bg.querySelector('#nbTpl');
    const delBtn = bg.querySelector('#nbDel');
    setTimeout(() => nameIn.focus(), 30);
    function refreshDelState(){
      const k = tplSel.value;
      const isCustom = !!(state.customTemplates && state.customTemplates[k]);
      delBtn.disabled = !isCustom;
      delBtn.style.opacity = isCustom ? '1' : '0.4';
      delBtn.style.cursor = isCustom ? 'pointer' : 'not-allowed';
      if(isCustom){ delBtn.style.color = 'var(--lg-pink)'; delBtn.style.borderColor = 'var(--lg-pink)'; }
      else { delBtn.style.color = 'var(--muted)'; delBtn.style.borderColor = 'var(--border-strong)'; }
    }
    tplSel.addEventListener('change', refreshDelState);
    refreshDelState();
    delBtn.addEventListener('click', () => {
      const k = tplSel.value;
      if(deleteTemplate(k)) renderDialog();
    });
    bg.querySelector('.cancel').addEventListener('click', () => bg.remove());
    function commit(){
      const name = (nameIn.value || '').trim();
      if(!name){ nameIn.focus(); return; }
      const tpl = tplSel.value || 'blank';
      bg.remove();
      createBoard(name, tpl);
    }
    bg.querySelector('.save').addEventListener('click', commit);
    nameIn.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); commit(); }});
  }
  renderDialog();
  document.body.appendChild(bg);
  bg.addEventListener('click', e => { if(e.target === bg) bg.remove(); });
}

function renameBoard(id, newTitle){
  if(!state.boards[id]) return;
  state.boards[id].title = (newTitle || '').trim() || 'Untitled board';
  save(); render();
}

function deleteBoard(id){
  if(!state.boards[id]) return;
  const remaining = Object.keys(state.boards).filter(k => k !== id);
  if(!remaining.length){
    alert('This is your only board. Create another board before deleting this one.');
    return;
  }
  if(!confirm(`Delete board "${state.boards[id].title}"? This cannot be undone.`)) return;
  delete state.boards[id];
  if(state.activeBoardId === id){
    const fallbackId = remaining[0];
    state.activeBoardId = fallbackId;
    restoreBoardFields(state, state.boards[fallbackId].data || {});
    runStateMigrations(state);
  }
  save(); render();
}

function deleteTemplate(key){
  if(!state.customTemplates || !state.customTemplates[key]) return false;
  const name = state.customTemplates[key].name || 'this template';
  if(!confirm(`Delete saved template "${name}"? Boards already created from it are unaffected.`)) return false;
  delete state.customTemplates[key];
  save();
  return true;
}

function saveBoardAsTemplate(id){
  return once('save-template:' + id, 600, () => _saveBoardAsTemplate(id));
}
function _saveBoardAsTemplate(id){
  const src = state.boards[id];
  if(!src) return;
  // Snapshot active board first if it's the one being saved
  if(state.activeBoardId === id && state.boards[id]){
    state.boards[id].data = snapshotBoardFields(state);
  }
  const data = src.data || {};
  const liveLists = (data.boardOrder || []).filter(k => (data.userBoards || {})[k]);
  if(!liveLists.length){
    alert('This board has no user-created lists to save as a template.');
    return;
  }
  const defaultName = (src.title || 'Custom') + ' template';
  const name = (prompt('Name for this template:', defaultName) || '').trim();
  if(!name) return;
  const tplKey = 'tpl_' + Math.random().toString(36).slice(2,9);
  // Capture each list's FULL structure so the template is an identical clone of the source.
  const lists = liveLists.map(listKey => {
    const meta = (data.userBoards || {})[listKey] || { label: data.titles?.[listKey] || listKey };
    const rows = (data.rows || {})[listKey] || [];
    // Drop transient fields (id, dateAdded, dateResolved) — those get regenerated on apply.
    const cleanRows = rows.map(r => {
      const copy = { ...r };
      delete copy.id;
      delete copy.dateAdded;
      delete copy.dateResolved;
      return copy;
    });
    return {
      name: data.titles?.[listKey] || meta.label,
      // Full column structure
      baseColumns: meta.columns ? JSON.parse(JSON.stringify(meta.columns)) : null,
      userColumns: JSON.parse(JSON.stringify((data.userColumns || {})[listKey] || [])),
      colWidths:   { ...((data.colWidths   || {})[listKey] || {}) },
      colOrder:    [ ...((data.colOrder    || {})[listKey] || []) ],
      hiddenCols:  [ ...((data.hiddenCols  || {})[listKey] || []) ],
      headers:     { ...((data.headers     || {})[listKey] || {}) },
      // Full row payload (preserves indent, formatted task HTML, status, who, due, etc.)
      rows: cleanRows,
    };
  });
  state.customTemplates = state.customTemplates || {};
  state.customTemplates[tplKey] = {
    name,
    description: 'Custom template from "' + (src.title || 'board') + '"',
    lists,
    schemaVersion: 2,
  };
  save();
  alert(`Saved as "${name}". You'll see it in the "Start from" dropdown next time you click + New board.`);
}

function duplicateBoard(id){
  return once('duplicate-board:' + id, 600, () => _duplicateBoard(id));
}
function _duplicateBoard(id){
  const src = state.boards[id];
  if(!src) return;
  // First snapshot the active board so its data is current before we copy it
  if(state.boards[state.activeBoardId]){
    state.boards[state.activeBoardId].data = snapshotBoardFields(state);
  }
  const fresh = src.id === state.activeBoardId
    ? state.boards[state.activeBoardId].data
    : src.data;
  // Deep clone via JSON — fine since data is plain objects
  const cloned = JSON.parse(JSON.stringify(fresh || {}));
  // Remap row IDs so the copy doesn't share keys with the original
  if(cloned.rows && typeof cloned.rows === 'object'){
    Object.keys(cloned.rows).forEach(boardKey => {
      if(Array.isArray(cloned.rows[boardKey])){
        cloned.rows[boardKey] = cloned.rows[boardKey].map(r => ({...r, id: rid()}));
      }
    });
  }
  const newId = bid();
  state.boards[newId] = {
    title: (src.title || 'Untitled board') + ' (copy)',
    data: cloned,
  };
  // Switch to the new copy
  state.activeBoardId = newId;
  restoreBoardFields(state, cloned);
  runStateMigrations(state);
  save();
  render();
  return newId;
}
function rid(){ return 'r'+Math.random().toString(36).slice(2,9); }

      <div class="tile-actions">
        <button class="edit" title="Edit tile">✎</button>
        <button class="delete" title="Delete tile">×</button>
      </div>` : ''}
  `;

  return el;
}

/* Renamed from `render` → `renderTrackerInternal` so the dashboard route can short-circuit it. */
let _lastRenderedTab = null;
// Render the bottom-dock of minimized lists. Called from render(). Per-device:
// `state.boardCollapsed` is now in the local-prefs allow-list so Kate doesn't
// inherit Jess's dock and vice versa.
function renderBoardDock(){
  const dock = document.getElementById('lgBoardDock');
  if (!dock) return;
  dock.innerHTML = '';
  const collapsed = state.boardCollapsed || {};
  // Iterate boardOrder so dock chip order is consistent with the lists' own order.
  const order = state.boardOrder || Object.keys(collapsed);
  // Color dot picks up the schema tone if known, else falls back to brand pink.
  const TONE_TO_COLOR = {
    'tone-pink':   '#ec058c',
    'tone-cyan':   '#2bb1e6',
    'tone-yellow': '#f8ef24',
    'tone-blue':   '#252f7c',
    'tone-green':  '#2a7a3f',
    'tone-white':  'rgba(37,47,124,.4)',
  };
  for (const tab of order){
    if (!collapsed[tab]) continue;
    const title = (state.titles && state.titles[tab])
      || (typeof SCHEMAS !== 'undefined' && SCHEMAS[tab] && SCHEMAS[tab].label)
      || tab;
    const schema = (typeof SCHEMAS !== 'undefined') ? SCHEMAS[tab] : null;
    const toneClass = schema && schema.tone;
    const color = (toneClass && TONE_TO_COLOR[toneClass]) || '#ec058c';
    const chip = document.createElement('button');
    chip.type = 'button';
    chip.className = 'lg-dock-chip';
    chip.title = 'Click to restore "' + title + '"';
    chip.innerHTML = '<span class="lg-dock-dot" style="background:' + color + '"></span>'
                   + '<span class="lg-dock-title"></span>'
                   + '<span class="lg-dock-up">▴</span>';
    chip.querySelector('.lg-dock-title').textContent = title;
    chip.addEventListener('click', e => {
      e.stopPropagation();
      state.boardCollapsed = state.boardCollapsed || {};
      delete state.boardCollapsed[tab];
      save(); render();
    });
    dock.appendChild(chip);
  }
}

function render(){
  // If the user switched to a different single-list view, the prior selection
  // points at rows that are no longer in the DOM. Clear it (and the bar).
  if (_lastRenderedTab !== state.activeTab){
    if (_selection.tab && _selection.tab !== state.activeTab && state.activeTab !== 'home'){
      clearSelection();
    }
    _lastRenderedTab = state.activeTab;
  }
  // Refresh the bottom dock every render so chips appear/disappear as boards are minimized.
  try { renderBoardDock(); } catch(_) {}
  applyRoute();
  // Refresh selection visuals + bar after the DOM is rebuilt.
  if (_selection.ids.size > 0){
    refreshSelectionDom();
    renderSelectionBar();
  }
}
function renderTrackerInternal(){
  // Close any open floating menus/popovers before rebuilding the DOM — otherwise a
  // teammate's realtime push (or any other mid-interaction render) leaves them orphaned.
  try { closeFloatingRowMenu(); } catch(_){}
  try { closePopovers && closePopovers(); } catch(_){}
  archiveSweep();
  reassignBoardColors();
  renderTabs();
  renderSection();
  renderBoardSwitcher();
  renderMatryoshkaHomeButton();
  wireSkinPicker();
  applySkin();
  renderBrandCorner();
  applyBgColor();
  wireSectionMenu();
}

// Copy the list `srcListKey` from the current workspace into another workspace.
// Generates a fresh key if needed so it doesn't collide with anything already
// in the target workspace, and remaps row IDs. Snapshots the current workspace
// first so we're copying from the latest state, not stale data.
function copyListToWorkspace(srcListKey, targetBoardId){
  if (!state.boards || !state.boards[targetBoardId]){ alert('Target workspace not found.'); return; }
  // Snapshot the current workspace first so the source data we read is current.
  if (state.activeBoardId && state.boards[state.activeBoardId]){
    state.boards[state.activeBoardId].data = snapshotBoardFields(state);
  }
  const srcKey = srcListKey;
  const srcLabel = state.titles?.[srcKey] || (SCHEMAS[srcKey] && SCHEMAS[srcKey].label) || srcKey;
  // Read all slots for this list from the live (current workspace) state.
  const sourcePayload = {
    label: srcLabel,
    userBoardMeta: (state.userBoards || {})[srcKey] ? JSON.parse(JSON.stringify(state.userBoards[srcKey])) : null,
    rows:        JSON.parse(JSON.stringify((state.rows        || {})[srcKey] || [])),
    headers:     JSON.parse(JSON.stringify((state.headers     || {})[srcKey] || {})),
    colWidths:   JSON.parse(JSON.stringify((state.colWidths   || {})[srcKey] || {})),
    userColumns: JSON.parse(JSON.stringify((state.userColumns || {})[srcKey] || [])),
    colOrder:    JSON.parse(JSON.stringify((state.colOrder    || {})[srcKey] || [])),
    hiddenCols:  JSON.parse(JSON.stringify((state.hiddenCols  || {})[srcKey] || [])),
  };
  // Read the matching archive companion if there is one.
  const srcArchKey = ARCHIVE_OF[srcKey];
  const archivePayload = srcArchKey ? {
    rows:        JSON.parse(JSON.stringify((state.rows        || {})[srcArchKey] || [])),
    headers:     JSON.parse(JSON.stringify((state.headers     || {})[srcArchKey] || {})),
    colWidths:   JSON.parse(JSON.stringify((state.colWidths   || {})[srcArchKey] || {})),
    userColumns: JSON.parse(JSON.stringify((state.userColumns || {})[srcArchKey] || [])),
    colOrder:    JSON.parse(JSON.stringify((state.colOrder    || {})[srcArchKey] || [])),
    hiddenCols:  JSON.parse(JSON.stringify((state.hiddenCols  || {})[srcArchKey] || [])),
  } : null;
  // Pick a non-colliding key inside the target workspace.
  const target = state.boards[targetBoardId];
  const targetData = target.data = target.data || {};
  ['rows','titles','headers','colWidths','userColumns','colOrder','hiddenCols','boardPos','boardSize','userBoards','boardOrder'].forEach(slot => {
    if (slot === 'boardOrder'){ if (!Array.isArray(targetData.boardOrder)) targetData.boardOrder = []; }
    else if (!targetData[slot]) targetData[slot] = (slot === 'boardOrder') ? [] : {};
  });
  const baseKey = srcKey.replace(/-\d+$/, '');
  let newKey = baseKey;
  let n = 2;
  const taken = new Set([
    ...Object.keys(targetData.userBoards || {}),
    ...Object.keys(targetData.rows || {}),
    ...Object.keys(targetData.titles || {}),
    ...(targetData.boardOrder || []),
  ]);
  while (taken.has(newKey)){ newKey = baseKey + '-' + n++; }
  const newArchKey = newKey + 'Archive';
  // Remap row IDs so we don't share IDs with the source.
  const remap = arr => (arr || []).map(r => ({...r, id: rid()}));
  // Write into target data.
  targetData.titles[newKey] = sourcePayload.label;
  targetData.rows[newKey] = remap(sourcePayload.rows);
  targetData.headers[newKey] = sourcePayload.headers;
  targetData.colWidths[newKey] = sourcePayload.colWidths;
  targetData.userColumns[newKey] = sourcePayload.userColumns;
  targetData.colOrder[newKey] = sourcePayload.colOrder;
  targetData.hiddenCols[newKey] = sourcePayload.hiddenCols;
  if (sourcePayload.userBoardMeta) targetData.userBoards[newKey] = sourcePayload.userBoardMeta;
  if (!targetData.boardOrder.includes(newKey)) targetData.boardOrder.push(newKey);
  // Archive companion (if any).
  if (archivePayload){
    targetData.titles[newArchKey] = sourcePayload.label + ' — archive';
    targetData.rows[newArchKey] = remap(archivePayload.rows);
    targetData.headers[newArchKey] = archivePayload.headers;
    targetData.colWidths[newArchKey] = archivePayload.colWidths;
    targetData.userColumns[newArchKey] = archivePayload.userColumns;
    targetData.colOrder[newArchKey] = archivePayload.colOrder;
    targetData.hiddenCols[newArchKey] = archivePayload.hiddenCols;
  }

  document.body.appendChild(a);
  a.click();
  setTimeout(() => { document.body.removeChild(a); URL.revokeObjectURL(url); }, 0);
}

  // the on-screen collapse is just a UI affordance, not a real filter.
  const rows = applySortForRender(tab, state.rows[tab] || []);

  const cellHtml = (row, col) => {

      // who can be a string or array of strings
      if (Array.isArray(raw)) return raw.map(escapeHtml).join(', ');
      return escapeHtml(String(raw));
    }
    if (col.kind === 'due'){
      return escapeHtml(String(raw));
    }
    if (col.kind === 'status'){
      return escapeHtml(String(raw));

    const s = String(raw);

// Workspace picker for "Copy to workspace…" — lists every workspace other than

function openCopyListToWorkspacePicker(srcListKey, anchor){
