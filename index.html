  const targets = Object.keys(state.boards || {})
    .filter(id => id !== state.activeBoardId)
    .map(id => ({ id, title: state.boards[id].title || 'Untitled board' }));
  const pop = document.createElement('div');
  pop.className = 'row-menu-pop floating-row-menu';
  if (!targets.length){
    pop.innerHTML = `<div style="padding:8px 11px;font-size:12.5px;color:var(--muted)">No other workspaces. Create one with + New board first.</div>`;
  } else {
    pop.innerHTML = `<div style="padding:6px 11px 4px;font-size:10px;letter-spacing:.6px;text-transform:uppercase;color:var(--muted);font-weight:700">Copy to…</div>` +
      targets.map(t => `<button data-tid="${escapeHtml(t.id)}">${escapeHtml(t.title)}</button>`).join('');
  }
  document.body.appendChild(pop);
  const r = (anchor && anchor.getBoundingClientRect) ? anchor.getBoundingClientRect() : { left: 100, right: 100, top: 100, bottom: 100 };
  const popW = pop.offsetWidth, popH = pop.offsetHeight;
  let top = r.bottom + 4;
  if (top + popH > window.innerHeight - 8) top = Math.max(8, r.top - popH - 4);
  let left = r.right - popW;
  if (left < 8) left = 8;
  if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
  pop.querySelectorAll('button[data-tid]').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      const tid = b.dataset.tid;
      closeFloatingRowMenu();
      copyListToWorkspace(srcListKey, tid);

function deleteSubList(key){
  if(!state.boardOrder || !state.boardOrder.includes(key)){
    alert('That list isn\'t deletable from here.');
    return;
  }
  const label = state.titles[key] || key;
  if(!confirm(`Delete the list "${label}" and all its tasks (live + archive)? This cannot be undone.`)) return;
  // Remove from sidebar order + canvas position state
  state.boardOrder = state.boardOrder.filter(k => k !== key);
  ['rows','titles','headers','colWidths','userColumns','colOrder','hiddenCols','boardPos','boardSize'].forEach(slot => {
    if(state[slot] && key in state[slot]) delete state[slot][key];
  });
  if(state.userBoards && key in state.userBoards) delete state.userBoards[key];
  // Archive companion
  const archKey = ARCHIVE_OF[key] || (key + 'Archive');
  ['rows','titles','headers','colWidths','userColumns','colOrder','hiddenCols'].forEach(slot => {
    if(state[slot] && archKey in state[slot]) delete state[slot][archKey];
  });
  // Clean up runtime registries so archiveSweep + render don't crash on the deleted key
  delete SCHEMAS[key];
  delete SCHEMAS[archKey];
  delete ARCHIVE_OF[key];
  delete LIVE_OF[archKey];
  let i = LIVE_BOARDS.indexOf(key); if(i >= 0) LIVE_BOARDS.splice(i, 1);
  i = ALL_BOARDS.indexOf(key);      if(i >= 0) ALL_BOARDS.splice(i, 1);
  i = ALL_BOARDS.indexOf(archKey);  if(i >= 0) ALL_BOARDS.splice(i, 1);
  // Move active tab to next available
  if(state.activeTab === key){
    state.activeTab = state.boardOrder[0] || 'home';
  }
  save(); render();
}

(function wireBrandCorner(){
  const colorBtn = document.getElementById('bgColorBtn');
  const colorIn  = document.getElementById('bgColorInput');
  const fileIn   = document.getElementById('brandImageInput');
  if(!colorBtn || !colorIn || !fileIn) return;
  // Click 🎨 → popover with three mutually-exclusive background modes:
  //   ↺ Default page         → cream + dot pattern, no art, no color
  //   🎨 Pick a color        → solid custom color via native color picker
  //   🖼 Guggenheim artwork  → daily-rotating artwork from the Guggenheim collection
  // The "active" mode gets a check mark. State is per-device (see per-device
  // prefs list — `bgGuggenheim` is stripped from cloud push along with bgColor).
  colorBtn.addEventListener('click', e => {
    e.stopPropagation();
    document.querySelectorAll('.bcb-pop').forEach(p => p.remove());
    const mode = state.bgGuggenheim ? 'gug' : (state.bgColor ? 'color' : 'default');
    const check = m => m === mode ? '✓ ' : '   ';
    const pop = document.createElement('div');
    pop.className = 'bcb-pop';
    pop.innerHTML = `
      <button data-act="default" class="bcb-pop-item">${check('default')}↺ Default page</button>
      <button data-act="pick"    class="bcb-pop-item">${check('color')}🎨 Pick a color</button>
      <button data-act="gug"     class="bcb-pop-item">${check('gug')}🖼 Guggenheim artwork</button>
    `;
    document.body.appendChild(pop);
    const r = colorBtn.getBoundingClientRect();
    const popH = pop.offsetHeight, popW = pop.offsetWidth;
    let top = r.top - popH - 6;
    if(top < 8) top = r.bottom + 6;
    let left = r.right - popW;
    if(left < 8) left = 8;
    pop.style.top = top + 'px';
    pop.style.left = left + 'px';
    pop.querySelector('[data-act="default"]').addEventListener('click', () => {
      state.bgColor = '';
      state.bgGuggenheim = false;
      applyBgColor();
      applyGuggenheim();
      save();
      pop.remove();
    });
    pop.querySelector('[data-act="pick"]').addEventListener('click', () => {
      state.bgGuggenheim = false;
      applyGuggenheim();
      pop.remove();
      colorIn.value = state.bgColor || '#f6f7fb';
      colorIn.click();
    });
    pop.querySelector('[data-act="gug"]').addEventListener('click', () => {
      state.bgColor = '';
      state.bgGuggenheim = true;
      applyBgColor();
      applyGuggenheim();
      save();
      pop.remove();
    });
    setTimeout(() => {
      const close = ev => {
        if(!ev.target.closest('.bcb-pop')){ pop.remove(); document.removeEventListener('click', close); }
      };
      document.addEventListener('click', close);
    }, 0);
  });
  colorIn.addEventListener('input', e => {
    state.bgColor = e.target.value;
    applyBgColor();
  });
  colorIn.addEventListener('change', () => save());
  fileIn.addEventListener('change', e => {
    const f = e.target.files && e.target.files[0];
    if(!f) return;
    fileIn.value = '';
    // Always downscale to <= 240px on the longest side and re-encode to JPEG/WebP at modest quality.
    // The brand image is shared across all firm members and downloaded on every realtime tick;
    // a 1 MB raw photo would balloon every push and chew localStorage quota for everyone.
    const reader = new FileReader();
    reader.onload = () => {
      const img = new Image();
      img.onload = () => {
        const MAX = 240;
        const scale = Math.min(1, MAX / Math.max(img.width, img.height));
        const w = Math.max(1, Math.round(img.width * scale));
        const h = Math.max(1, Math.round(img.height * scale));
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        // Transparent backdrop so PNGs with alpha don't end up with a white box
        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(img, 0, 0, w, h);
        // Try webp first (smaller), fall back to jpeg
        let dataUrl = '';
        try { dataUrl = c.toDataURL('image/webp', 0.82); } catch(_) {}
        if (!dataUrl || dataUrl === 'data:,' || !dataUrl.startsWith('data:image/webp')) {
          dataUrl = c.toDataURL('image/jpeg', 0.82);
        }
        // Hard cap: if the encoded image still exceeds 120 KB, refuse rather than poison
        // the shared cloud row.
        const approxBytes = Math.ceil((dataUrl.length - dataUrl.indexOf(',') - 1) * 3 / 4);
        if (approxBytes > 120 * 1024) {
          alert('That image is still too large after downscaling (' + Math.round(approxBytes/1024) + ' KB). Try a smaller / simpler image.');
          return;
        }
        state.brandImage = dataUrl;
        save();
        renderBrandCorner();
      };
      img.onerror = () => alert('Could not read that image. Try a different file.');
      img.src = reader.result;
    };
    reader.onerror = () => alert('Could not read that file.');
    reader.readAsDataURL(f);
  });
})();

function buildTabBtn(tabKey, isArchive){
  const sch = SCHEMAS[tabKey];
  const btn = document.createElement('button');
  btn.className = 'tab-btn' + (state.activeTab===tabKey ? ' active' : '') + (isArchive ? ' tab-archive' : '');
  btn.dataset.tab = tabKey;
  // Live boards (non-Home, non-archive) are draggable for sidebar reorder
  if(LIVE_BOARDS.includes(tabKey) && !isArchive) btn.dataset.draggableTab = '1';
  const count = (state.rows[tabKey] || []).length;
  const badge = isArchive ? '' : `<span class="tab-badge">${count}</span>`;
  btn.innerHTML = `<span class="tab-icon-wrap"><span class="tab-icon ${sch.color}"></span></span><span class="tab-label" title="Double-click to rename">${escapeHtml(state.titles[tabKey])}</span>${badge}`;
  btn.addEventListener('click', () => {
    if(btn.dataset.suppressClick === '1'){ btn.dataset.suppressClick = ''; return; }
    state.activeTab = tabKey; save(); render();
  });
  // Double-click the label to rename inline
  const lbl = btn.querySelector('.tab-label');
  lbl.addEventListener('dblclick', e => {
    e.stopPropagation();
    const cur = state.titles[tabKey] || sch.label;
    const next = (prompt('Rename list:', cur) || '').trim();
    if(next && next !== cur){
      state.titles[tabKey] = next;
      save(); render();

function renderSection(){
  // Self-heal: if activeTab points to a list that doesn't exist in the current
  // workspace (e.g. a key carried over from another workspace's saved state),
  // fall back to 'home' so we land on the canvas with the layout toolbar
  // instead of rendering an invalid list view.
  if (state.activeTab && state.activeTab !== 'home' && !SCHEMAS[state.activeTab]){
    state.activeTab = 'home';
  }
  const tab = state.activeTab;
  const titleEl = document.getElementById('sectionTitle');
  const iconEl = document.getElementById('sectionIcon');
  const host = document.getElementById('tableHost');
  const addBtn = document.getElementById('addRowBtn');

  // Global cross-board Matryoshka Home view
  if (state.viewingMatryoshkaHome) {
    titleEl.style.display = 'none';
    addBtn.style.display = 'none';
    const _addCol = document.getElementById('addColBtn');
    if (_addCol) _addCol.style.display = 'none';
    if (host) host.innerHTML = '';
    document.body.classList.add('view-home');
    let homeHost = document.getElementById('homeHost');
    if(!homeHost){
      homeHost = document.createElement('div');
      homeHost.id = 'homeHost';
      document.querySelector('.main').appendChild(homeHost);
    }
    const mode = state.matryoshkaHomeMode || 'free';
    const zoom = Math.max(0.4, Math.min(2, +state.matryoshkaHomeZoom || 1));
    const zoomStyle = (mode === 'free' && zoom !== 1)
      ? ` style="transform:scale(${zoom});transform-origin:top left;width:${(100/zoom).toFixed(2)}%"`
      : '';
    homeHost.innerHTML = `<div class="matryoshka-canvas mhome-${mode}" id="matryoshkaHomeCanvas"${zoomStyle}></div>`;
    const toggle = document.getElementById('homeModeToggle');
    if(toggle) toggle.remove();
    renderMatryoshkaHome(document.getElementById('matryoshkaHomeCanvas'));
    ensureMatryoshkaHomeToolbar();
    return;
  }

  if(tab === 'home'){
    titleEl.style.display = 'none';
    addBtn.style.display = 'none';
    const _addCol = document.getElementById('addColBtn');
    if (_addCol) _addCol.style.display = 'none';
    document.body.classList.add('view-home');
    // home renders into the body, not into tableHost — use a separate host
    let homeHost = document.getElementById('homeHost');
    if(!homeHost){
      homeHost = document.createElement('div');
      homeHost.id = 'homeHost';
      document.querySelector('.main').appendChild(homeHost);
    }
    renderHome(homeHost);
    return;
  }
  document.body.classList.remove('view-home');
  // Clean up any home host from a previous render
  const oldHomeHost = document.getElementById('homeHost');
  if(oldHomeHost) oldHomeHost.remove();
  titleEl.style.display = '';

  const sch = SCHEMAS[tab];
  const cols = getColumns(tab);
  titleEl.textContent = state.titles[tab];
  titleEl.oninput = () => { state.titles[tab] = titleEl.textContent.trim() || sch.label; save(); renderTabs(); };
  if(iconEl){ iconEl.className = 'section-icon ' + (sch.color || ''); }
  addBtn.style.display = '';
  const addColBtn = document.getElementById('addColBtn');
  if (addColBtn){
    addColBtn.style.display = '';
    addColBtn.onclick = (e) => { e.stopPropagation(); openAddColumnPicker(tab, addColBtn); };
  }
  // Apply saved per-list width and height (or fall back to defaults)
  const card = document.getElementById('sectionCard');
  if(card){
    const sz = state.sectionSize?.[tab] || {};
    card.style.width  = (sz.w && sz.w > 0) ? (sz.w + 'px') : '600px';
    card.style.height = (sz.h && sz.h > 0) ? (sz.h + 'px') : '';
  }
  // Apply collapse first (operates on natural order), then sort the remainder.
  const visible = visibleRowsAfterCollapse(state.rows[tab]);
  const rows = applySortForRender(tab, visible);

  if(rows.length === 0){
    host.innerHTML = `<div class="list-empty">No tasks here yet.<br><button class="btn-primary" onclick="addRow()">+ Add the first one</button></div>`;
    return;
  }

  const headHtml = cols.map(col => renderColHeader(tab, col)).join('');

  host.innerHTML = `
    <table class="tbl">
      <thead>
        <tr>
          <th class="col-handle col-handle-l"></th>
          ${headHtml}
          <th class="col-actions"></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  `;

  wireHeader(host, tab);

  const tbody = document.getElementById('tbody');
  rows.forEach(row => tbody.appendChild(renderRow(tab, row)));
}

// Build the <th> for one column, with a label span (editable), a tiny × for user cols, and a resize grip.
function renderColHeader(tab, col){
  const label = state.headers[tab][col.key] || col.label;
  const userBadge = `<button class="col-del" data-col="${col.key}" title="Remove column">×</button>`;
  // The first user-facing column (matter/client/prospect) is sortable. Other
  // columns aren't (status/who/due use popovers, sorting them would feel weird).
  const cols = getColumns(tab);
  const isSortable = cols[0] && cols[0].key === col.key && !col.kind;
  const sort = state.sort?.[tab];
  const sortDir = (isSortable && sort && sort.col === col.key) ? sort.dir : '';
  // Dedicated always-visible sort button on sortable columns. The icon shows the
  // current state: ↕ = off (click to enable), ↑ = asc, ↓ = desc. Cycle off→asc→desc→off.
  const sortIcon = sortDir === 'asc' ? '↑' : (sortDir === 'desc' ? '↓' : '↕');
  const sortBtn = isSortable
    ? `<button class="col-sort-btn${sortDir ? ' active' : ''}" data-col="${col.key}" title="Sort by ${escapeHtml(label)}">${sortIcon}</button>`
    : '';
  const sortClass = isSortable ? ' col-sortable' : '';
  return `<th data-col="${col.key}" class="${sortClass.trim()}" style="width:${col.width}px">
    <div class="th-inner">
      <span class="col-drag" data-col="${col.key}" title="Drag to reorder column">⋮⋮</span>
      <span class="th-label" contenteditable="true" spellcheck="false">${escapeHtml(label)}</span>
      ${sortBtn}
      ${userBadge}
      <span class="col-resize" data-col="${col.key}" title="Drag to resize"></span>
    </div>
  </th>`;
}

function wireHeader(scope, tab){
  scope.querySelectorAll('thead th[data-col]').forEach(th => {
    const colKey = th.dataset.col;
    const lbl = th.querySelector('.th-label');
    if(lbl){
      lbl.addEventListener('input', () => {
        const allCols = getColumns(tab);
        const def = allCols.find(c => c.key===colKey);
        state.headers[tab][colKey] = lbl.textContent.trim() || (def ? def.label : colKey);
        save();
      });
      lbl.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); lbl.blur(); }});
    }
    // Sort toggle — the dedicated .col-sort-btn is the primary affordance. Also
    // accept clicks on bare header space (outside label/×/drag/resize/sort button).
    if (th.classList.contains('col-sortable')){
      th.addEventListener('click', e => {
        if (e.target.closest('.th-label, .col-del, .col-drag, .col-resize, .col-sort-btn')) return;
        toggleSort(tab, colKey);
      });
      const sortBtn = th.querySelector('.col-sort-btn');
      if (sortBtn){
        sortBtn.addEventListener('click', e => { e.stopPropagation(); toggleSort(tab, colKey); });
      }
    }
    const del = th.querySelector('.col-del');
    if(del){
      del.addEventListener('click', e => {
        e.stopPropagation();
        const allCols = getColumns(tab);
        const colDef = allCols.find(c => c.key === colKey);
        const isUser = !!(colDef && colDef.isUser);
        if(isUser){
          if(!confirm('Delete this column? Its values on every row will be permanently discarded — this cannot be undone.')) return;
          state.userColumns[tab] = state.userColumns[tab].filter(c => c.key !== colKey);
          delete state.headers[tab][colKey];
          delete state.colWidths[tab][colKey];
          state.rows[tab].forEach(r => delete r[colKey]);
        } else {
          if(!confirm('Remove this column from the list? The data on each row is preserved — you can restore it later from the + button → Restore.')) return;
          state.hiddenCols = state.hiddenCols || {};
          state.hiddenCols[tab] = state.hiddenCols[tab] || [];
          if(!state.hiddenCols[tab].includes(colKey)) state.hiddenCols[tab].push(colKey);
        }
        save(); render();
      });
    }
    // (column resize is wired globally via onColResizeMouseDown — see below)
  });
}

// Commit a new column. `kindChoice` is one of 'text' | 'status' | 'who' | 'due' | 'chip'.
function commitNewColumn(tab, label, kindChoice){
  label = (label || '').trim();
  if (!label) return false;
  const allowed = ['text','status','who','due','chip'];
  const kc = allowed.includes(kindChoice) ? kindChoice : 'text';
  const kind = kc === 'text' ? null : kc;
  const key = 'u_' + Math.random().toString(36).slice(2,8);
  const col = { key, label, width: 140 };
  if (kind) col.kind = kind;
  state.userColumns[tab] = state.userColumns[tab] || [];
  state.userColumns[tab].push(col);
  state.headers[tab] = state.headers[tab] || {};
  state.headers[tab][key] = label;
  (state.rows[tab] || []).forEach(r => { r[key] = (kind === 'status') ? 'Not started' : ''; });
  save(); render();
  return true;
}

    </div>
  `;
  document.body.appendChild(pop);
  let kind = 'text';
  pop.querySelectorAll('.addcol-kind').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      kind = btn.dataset.kind;
      pop.querySelectorAll('.addcol-kind').forEach(b => {
        b.classList.remove('addcol-kind-active');
        b.style.background = '#fff';
        b.style.borderColor = 'var(--border-strong)';
      });
      btn.classList.add('addcol-kind-active');
      btn.style.background = 'rgba(43,177,230,.12)';
      btn.style.borderColor = 'var(--lg-cyan)';
    });
  });
  const nameInput = pop.querySelector('.addcol-name');
  const cancel = () => { closeFloatingRowMenu(); };
  const create = () => {
    if (commitNewColumn(tab, nameInput.value, kind)) closeFloatingRowMenu();
    else nameInput.focus();
  };
  pop.querySelector('.addcol-cancel').addEventListener('click', e => { e.stopPropagation(); cancel(); });
  pop.querySelector('.addcol-create').addEventListener('click', e => { e.stopPropagation(); create(); });
  nameInput.addEventListener('keydown', e => {
    if (e.key === 'Enter'){ e.preventDefault(); create(); }
    else if (e.key === 'Escape'){ e.preventDefault(); cancel(); }
  });
  // Position
  const r = (anchor && anchor.getBoundingClientRect) ? anchor.getBoundingClientRect() : { left: 100, right: 100, bottom: 100, top: 100 };
  const popW = pop.offsetWidth, popH = pop.offsetHeight;
  let top = r.bottom + 4;
  if (top + popH > window.innerHeight - 8) top = Math.max(8, r.top - popH - 4);
  let left = r.right - popW;
  if (left < 8) left = 8;
  if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
  pop.style.top = top + 'px';
  pop.style.left = left + 'px';
  setTimeout(() => nameInput.focus(), 0);
}
// Back-compat: existing callers (board card "+" menus) still call addColumn(tab).
function addColumn(tab){ openAddColumnPicker(tab, document.getElementById('addColBtn') || document.body); }

function ensureHomeModeToggle(){
  let bar = document.getElementById('homeModeToggle');
  const mode = state.homeViewMode || 'free';
  const zoom = Math.max(0.4, Math.min(2, +state.boardZoom || 1));
  const zoomPct = Math.round(zoom * 100);
  const hasPreferred = !!(state.preferredLayout && state.preferredLayout.boardPos && Object.keys(state.preferredLayout.boardPos).length);
  // For the single combined Min/Max toggle button below: if any list is
  // currently minimized, the button restores everything; otherwise it
  // minimizes everything.
  const anyCollapsed = (state.boardOrder || []).some(t => state.boardCollapsed && state.boardCollapsed[t]);
  if(!bar){
    bar = document.createElement('div');
    bar.id = 'homeModeToggle';
    bar.className = 'home-mode-toggle';
    document.body.appendChild(bar);
  }
  bar.innerHTML = `
    <div class="hmt-toggle">
      <button data-mode="free">Free</button>
      <button data-mode="stacked">Stacked</button>
    </div>
    ${mode === 'free' ? `
      <div class="hmt-zoom">
        <button data-act="zoom-out" title="Zoom out">−</button>
        <button data-act="zoom-reset" title="Reset to 100%">${zoomPct}%</button>
        <button data-act="zoom-in" title="Zoom in">+</button>
      </div>
      <button data-act="auto-fit" class="hmt-action" title="Tile every board to fit on one screen">↔ Auto-fit</button>
      <button data-act="toggle-all" class="hmt-action" title="${anyCollapsed ? 'Restore every minimized list back to the canvas' : 'Minimize every list to the dock at the bottom'}">${anyCollapsed ? '▴ Max all' : '▾ Min all'}</button>
      <button data-act="save-layout" class="hmt-action" title="Capture the current arrangement as your preferred default">↥ Save layout</button>
      <button data-act="apply-layout" class="hmt-action" ${hasPreferred?'':'disabled'} title="${hasPreferred ? 'Restore your saved arrangement' : 'No saved layout yet — click Save layout first'}">⌂ Preferred Fit</button>
    ` : ''}
  `;
  bar.querySelectorAll('button[data-mode]').forEach(b =>
    b.classList.toggle('active', b.dataset.mode === mode));
  bar.querySelectorAll('button[data-mode]').forEach(b => b.addEventListener('click', () => {
    state.homeViewMode = b.dataset.mode;
    save(); render();
  }));
  bar.querySelectorAll('button[data-act]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    const act = b.dataset.act;
    if (act === 'zoom-out')    setBoardZoom(zoom - 0.1);
    else if (act === 'zoom-in')  setBoardZoom(zoom + 0.1);
    else if (act === 'zoom-reset') setBoardZoom(1);
    else if (act === 'auto-fit')   autoFitBoards();
    else if (act === 'save-layout')   savePreferredLayout();
    else if (act === 'apply-layout')  applyPreferredLayout();
    else if (act === 'toggle-all'){
      // Single combined button: if anything is currently minimized, restore
      // everything (Max all); otherwise minimize every list (Min all).
      const order = state.boardOrder || [];
      const any = order.some(t => state.boardCollapsed && state.boardCollapsed[t]);
      if (any){
        state.boardCollapsed = {};
      } else {
        state.boardCollapsed = state.boardCollapsed || {};
        order.forEach(tab => { state.boardCollapsed[tab] = true; });
      }
      save(); render();
    }
  }));
}

function setBoardZoom(z){
  state.boardZoom = Math.max(0.4, Math.min(2, +(+z).toFixed(2)));
  save(); render();
}
function savePreferredLayout(){
  state.preferredLayout = {
    boardPos:  JSON.parse(JSON.stringify(state.boardPos  || {})),
    boardSize: JSON.parse(JSON.stringify(state.boardSize || {})),
    boardZoom: state.boardZoom || 1,
    savedAt:   new Date().toISOString(),
  };
  save(); render();
}
function applyPreferredLayout(){
  const pl = state.preferredLayout;
  if (!pl || !pl.boardPos) return;
  state.boardPos  = JSON.parse(JSON.stringify(pl.boardPos));
  state.boardSize = JSON.parse(JSON.stringify(pl.boardSize || {}));
  if (pl.boardZoom) state.boardZoom = pl.boardZoom;
  save(); render();
}
function autoFitBoards(){
  const canvas = document.getElementById('boardCanvas');
  if (!canvas) return;
  const ids = (state.boardOrder || []).slice();
  const n = ids.length;
  if (!n) return;
  const cw = canvas.clientWidth || (window.innerWidth - 40);
  const cols = Math.min(4, Math.max(1, Math.ceil(Math.sqrt(n * (cw / 800)))));
  const rows = Math.ceil(n / cols);
  const gap = 16;
  const cardW = Math.floor((cw - gap * (cols + 1)) / cols);
  // Top buffer clears the sticky header + the fixed home-mode-toggle bar so the
  // top of the first-row card titles isn't tucked behind either.
  const topPad = 56;
  const visibleH = window.innerHeight - 220 - (topPad - gap);
  const cardH = Math.max(200, Math.floor((visibleH - gap * (rows + 1)) / rows));
  state.boardPos  = state.boardPos  || {};
  state.boardSize = state.boardSize || {};
  ids.forEach((id, i) => {
    const col = i % cols;
    const row = Math.floor(i / cols);
    state.boardPos[id]  = { x: gap + col * (cardW + gap), y: topPad + row * (cardH + gap) };
    state.boardSize[id] = { w: cardW, h: cardH };
  });
  save(); render();
}

function renderMatryoshkaHome(canvas){
  canvas.innerHTML = '';
  const homeOpts = state.matryoshkaHome || {};
  const mode = canvas.classList.contains('mhome-free') ? 'free' : 'grid';
  const allBoardIds = Object.keys(state.boards || {});
  const pinnedIds   = allBoardIds.filter(id => homeOpts[id] && homeOpts[id].pinned);
  const unpinnedIds = allBoardIds.filter(id => !(homeOpts[id] && homeOpts[id].pinned));

  if(pinnedIds.length === 0){
    const empty = document.createElement('div');
    empty.className = 'matryoshka-empty';
    empty.innerHTML = `<h2>Your Matryoshka Home is empty</h2><p>Pin boards here for a cross-board overview. Use the board menu (▾ next to a board name) and choose "Pin to Home".</p>`;
    canvas.appendChild(empty);
  }

  // Auto-place new free-mode cards that have no stored position
  if(mode === 'free'){
    const cw = canvas.clientWidth || (window.innerWidth - 140);
    const gap = 16, cardW = 340;
    const cols = Math.max(1, Math.floor((cw + gap) / (cardW + gap)));
    pinnedIds.forEach((id, i) => {
      const opts = homeOpts[id] || {};
      if(!opts.pos){
        const col = i % cols, row = Math.floor(i / cols);
        state.matryoshkaHome[id] = { ...opts, pos: { x: gap + col * (cardW + gap), y: gap + row * (420 + gap) } };
      }
    });
  }

  pinnedIds.forEach(id => {
    const board = state.boards[id];
    if(!board) return;
    const opts = homeOpts[id] || {};
    const collapsed = !!opts.collapsed;

    const isActive = id === state.activeBoardId;
    const bRows   = isActive ? state.rows       : (board.data && board.data.rows       || {});
    const bOrder  = isActive ? state.boardOrder : (board.data && board.data.boardOrder || []);
    const bTitles = isActive ? state.titles     : (board.data && board.data.titles     || {});

    const allTaskRows = bOrder.flatMap(k => bRows[k] || []);
    const doneCount   = allTaskRows.filter(r => r.dateResolved || r.status === 'Done').length;
    const totalCount  = allTaskRows.length;

    const card = document.createElement('div');
    card.className = 'matryoshka-card' + (collapsed ? ' mc-collapsed' : '');
    card.dataset.boardId = id;

    if(mode === 'free'){
      const pos = opts.pos || { x: 16, y: 16 };
      const sz  = opts.size || {};
      card.style.left = pos.x + 'px';
      card.style.top  = pos.y + 'px';
      if(sz.w) card.style.width  = sz.w + 'px';
      if(sz.h) card.style.height = sz.h + 'px';
    }

    const head = document.createElement('div');
    head.className = 'matryoshka-card-head';
    const collapseLabel = collapsed ? '▸' : '▾';
    head.innerHTML = `
      <span class="matryoshka-card-title">${escapeHtml(board.title || 'Untitled')}</span>
      <span class="matryoshka-card-count">${doneCount}/${totalCount}</span>
      <button class="matryoshka-card-collapse" title="${collapsed ? 'Expand' : 'Collapse'}">${collapseLabel}</button>
      <button class="matryoshka-card-open btn-primary">Open →</button>
      <button class="mc-hide-btn" title="Unpin from Home">✕</button>
    `;
    head.querySelector('.matryoshka-card-open').addEventListener('click', e => {
      e.stopPropagation();
      state.viewingMatryoshkaHome = false;
      switchBoard(id);
    });
    head.querySelector('.matryoshka-card-collapse').addEventListener('click', e => {
      e.stopPropagation();
      state.matryoshkaHome[id] = { ...opts, collapsed: !collapsed };
      save(); render();
    });
    head.querySelector('.mc-hide-btn').addEventListener('click', e => {
      e.stopPropagation();
      if(!confirm('Unpin "' + escapeHtml(board.title || id) + '" from Matryoshka Home?')) return;
      state.matryoshkaHome[id] = { ...opts, pinned: false };
      save(); render();
    });
    card.appendChild(head);

    if(!collapsed){
      const body = document.createElement('div');
      body.className = 'matryoshka-card-body';
      const listsWithTasks = bOrder.filter(k => (bRows[k] || []).length > 0);
      if(listsWithTasks.length === 0){
        body.innerHTML = `<div style="padding:12px 14px;font-size:12.5px;color:var(--muted)">No tasks yet.</div>`;
      } else {
        listsWithTasks.forEach(listKey => {
          const rows = visibleRowsAfterCollapse(bRows[listKey] || []);
          const listTitle = bTitles[listKey] || listKey;
          const listHead = document.createElement('div');
          listHead.style.cssText = 'padding:5px 14px 3px;font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;border-top:1px solid var(--border)';
          listHead.textContent = listTitle;
          body.appendChild(listHead);
          rows.forEach(row => {
            const isDone = !!(row.dateResolved || row.status === 'Done');
            const taskDiv = document.createElement('div');
            taskDiv.className = 'mc-task' + (isDone ? ' mc-done' : '');
            taskDiv.style.setProperty('--mc-ind', Math.max(0, row.indent | 0));
            const rawTask = row.task || row.matter || row.client || row.prospect || '';
            const taskHtml = /<\/?[a-z][^>]*>/i.test(rawTask)
              ? sanitizeRowHtml(rawTask) : escapeHtml(rawTask);
            taskDiv.innerHTML = `<input type="checkbox" ${isDone?'checked':''}><span class="mc-task-text">${taskHtml}</span>`;
            body.appendChild(taskDiv);
          });
        });
      }
      card.appendChild(body);

      // Resize handle (free mode only)
      if(mode === 'free'){
        const resize = document.createElement('div');
        resize.className = 'mhome-resize';
        resize.title = 'Drag to resize';
        resize.addEventListener('mousedown', e => {
          e.preventDefault(); e.stopPropagation();
          const startX = e.clientX, startY = e.clientY;
          const startRect = card.getBoundingClientRect();
          const z = Math.max(0.4, Math.min(2, +state.matryoshkaHomeZoom || 1));
          const startW = startRect.width / z, startH = startRect.height / z;
          const onMove = ev => {
            card.style.width  = Math.max(280, Math.round(startW + (ev.clientX - startX) / z)) + 'px';
            card.style.height = Math.max(120, Math.round(startH + (ev.clientY - startY) / z)) + 'px';
          };
          const onUp = () => {
            document.removeEventListener('mousemove', onMove);
            document.removeEventListener('mouseup', onUp);
            const w = parseInt(card.style.width,  10) || startW;
            const h = parseInt(card.style.height, 10) || startH;
            state.matryoshkaHome[id] = { ...(state.matryoshkaHome[id] || {}), size: { w, h } };
            save();
          };
          document.addEventListener('mousemove', onMove);
          document.addEventListener('mouseup', onUp);
        });
        card.appendChild(resize);
      }
    }
    canvas.appendChild(card);
  });

  // Unpinned boards strip
  if(unpinnedIds.length > 0){
    const strip = document.createElement('div');
    const stripClass = mode === 'free' ? 'mhome-unpinned-strip' : 'mhome-unpinned-strip mhome-grid-strip';
    strip.className = stripClass;
    const lbl = document.createElement('span');
    lbl.style.cssText = 'font-size:11px;color:var(--muted);margin-right:4px';
    lbl.textContent = pinnedIds.length === 0 ? 'Add a board:' : 'Other boards:';
    strip.appendChild(lbl);
    unpinnedIds.forEach(id => {
      const board = state.boards[id];
      if(!board) return;
      const btn = document.createElement('button');
      btn.textContent = '+ ' + escapeHtml(board.title || 'Untitled');
      btn.style.cssText = 'font-size:11px;padding:3px 9px;color:var(--muted);border:1px dashed var(--border-strong);background:transparent;border-radius:6px;cursor:pointer';
      btn.addEventListener('click', () => {
        state.matryoshkaHome = state.matryoshkaHome || {};
        state.matryoshkaHome[id] = { ...(state.matryoshkaHome[id] || {}), pinned: true };
        save(); render();
      });
      strip.appendChild(btn);
    });
    canvas.appendChild(strip);
  }
}

// ── Matryoshka Home drag system ─────────────────────────────────────────
let mhomeDragState = null, mhomeDragJustEnded = false, mhomeTopZ = 200;

document.addEventListener('mousedown', e => {
  const card = e.target.closest('.mhome-free .matryoshka-card');
  if(!card) return;
  // head is the drag handle; block if clicking a button or the resize corner
  if(!e.target.closest('.matryoshka-card-head')) return;
  if(e.target.closest('button')) return;
  e.preventDefault();
  mhomeTopZ++;
  card.style.zIndex = mhomeTopZ;
  const canvas = card.closest('.mhome-free');
  const cardRect = card.getBoundingClientRect();
  const z = Math.max(0.4, Math.min(2, +state.matryoshkaHomeZoom || 1));
  mhomeDragState = {
    boardId: card.dataset.boardId, card, canvas,
    offsetX: (e.clientX - cardRect.left) / z,
    offsetY: (e.clientY - cardRect.top)  / z,
    z,
  };
  card.classList.add('mhome-dragging');
});

document.addEventListener('mousemove', e => {
  if(!mhomeDragState) return;
  const cRect = mhomeDragState.canvas.getBoundingClientRect();
  const z = mhomeDragState.z;
  let x = (e.clientX - cRect.left) / z - mhomeDragState.offsetX + mhomeDragState.canvas.scrollLeft;
  let y = (e.clientY - cRect.top)  / z - mhomeDragState.offsetY + mhomeDragState.canvas.scrollTop;
  x = Math.max(0, x); y = Math.max(0, y);
  mhomeDragState.card.style.left = x + 'px';
  mhomeDragState.card.style.top  = y + 'px';
});

document.addEventListener('mouseup', () => {
  if(!mhomeDragState) return;
  const x = parseInt(mhomeDragState.card.style.left, 10) || 0;
  const y = parseInt(mhomeDragState.card.style.top,  10) || 0;
  const id = mhomeDragState.boardId;
  state.matryoshkaHome[id] = { ...(state.matryoshkaHome[id] || {}), pos: { x, y } };
  save();
  mhomeDragState.card.classList.remove('mhome-dragging');
  mhomeDragState = null;
  mhomeDragJustEnded = true;
  setTimeout(() => { mhomeDragJustEnded = false; }, 0);
});

function ensureMatryoshkaHomeToolbar(){
  let bar = document.getElementById('mhomeToolbar');
  if(!bar){
    bar = document.createElement('div');
    bar.id = 'mhomeToolbar';
    bar.className = 'home-mode-toggle';
    document.body.appendChild(bar);
  }
  const mode = state.matryoshkaHomeMode || 'free';
  const zoom = Math.max(0.4, Math.min(2, +state.matryoshkaHomeZoom || 1));
  const zoomPct = Math.round(zoom * 100);
  const homeOpts = state.matryoshkaHome || {};
  const pinnedIds = Object.keys(state.boards || {}).filter(id => homeOpts[id] && homeOpts[id].pinned);
  const anyCollapsed = pinnedIds.some(id => homeOpts[id] && homeOpts[id].collapsed);
  bar.innerHTML = `
    <div class="hmt-toggle">
      <button data-mode="free">Free</button>
      <button data-mode="grid">Grid</button>
    </div>
    ${mode === 'free' ? `
      <div class="hmt-zoom">
        <button data-act="zoom-out" title="Zoom out">−</button>
        <button data-act="zoom-reset" title="Reset to 100%">${zoomPct}%</button>
        <button data-act="zoom-in" title="Zoom in">+</button>
      </div>
      <button data-act="auto-fit" class="hmt-action" title="Tile boards to fit on screen">↔ Auto-fit</button>
    ` : ''}
    <button data-act="toggle-all" class="hmt-action">${anyCollapsed ? '▴ Max all' : '▾ Min all'}</button>
  `;
  bar.querySelectorAll('[data-mode]').forEach(b => {

  });
  bar.querySelectorAll('[data-act]').forEach(b => b.addEventListener('click', e => {
    e.stopPropagation();
    const act = b.dataset.act;
    const z = Math.max(0.4, Math.min(2, +state.matryoshkaHomeZoom || 1));
    if(act === 'zoom-out') { state.matryoshkaHomeZoom = +(Math.max(0.4, z - 0.1)).toFixed(2); save(); render(); }
    else if(act === 'zoom-in')    { state.matryoshkaHomeZoom = +(Math.min(2, z + 0.1)).toFixed(2); save(); render(); }
    else if(act === 'zoom-reset') { state.matryoshkaHomeZoom = 1; save(); render(); }
    else if(act === 'auto-fit')   mhomeAutoFit();
    else if(act === 'toggle-all') {
      const opts = state.matryoshkaHome || {};
      const ids = Object.keys(state.boards || {}).filter(id => opts[id] && opts[id].pinned);
      const any = ids.some(id => opts[id] && opts[id].collapsed);
      ids.forEach(id => { state.matryoshkaHome[id] = { ...(opts[id] || {}), collapsed: !any }; });
      save(); render();
    }
  }));
}

function mhomeAutoFit(){
  const canvas = document.getElementById('matryoshkaHomeCanvas');
  if(!canvas) return;
  const homeOpts = state.matryoshkaHome || {};
  const pinnedIds = Object.keys(state.boards || {}).filter(id => homeOpts[id] && homeOpts[id].pinned);
  const n = pinnedIds.length;
  if(!n) return;
  const cw = canvas.clientWidth || (window.innerWidth - 140);
  const z = Math.max(0.4, Math.min(2, +state.matryoshkaHomeZoom || 1));
  const logicalW = cw / z;
  const cols = Math.min(3, Math.max(1, Math.ceil(Math.sqrt(n))));
  const gap = 16;
  const cardW = Math.floor((logicalW - gap * (cols + 1)) / cols);
  const cardH = 420;
  pinnedIds.forEach((id, i) => {
    const col = i % cols, row = Math.floor(i / cols);
    state.matryoshkaHome[id] = { ...(state.matryoshkaHome[id] || {}),
      pos:  { x: gap + col * (cardW + gap), y: gap + row * (cardH + gap) },
      size: { w: cardW, h: cardH },
    };
  });
  save(); render();
}

function renderHome(host){
  const mode = state.homeViewMode === 'stacked' ? 'stacked' : 'free';

  const zoom = Math.max(0.4, Math.min(2, +state.boardZoom || 1));
  // In free mode at non-100% zoom, scale the whole canvas. Compensate width so the
  // scaled content still fills the wrapper horizontally (otherwise it leaves whitespace).
  const zoomStyle = (mode === 'free' && zoom !== 1)
    ? ` style="transform:scale(${zoom});transform-origin:top left;width:${(100/zoom).toFixed(2)}%"`
    : '';
  host.innerHTML = `<div class="board-canvas ${mode==='stacked'?'stacked':''}" id="boardCanvas"${zoomStyle}></div>`;
  ensureHomeModeToggle();
  const canvas = document.getElementById('boardCanvas');
  state.boardOrder.forEach(tabKey => {
    const sch = SCHEMAS[tabKey];
    const rows = applySortForRender(tabKey, visibleRowsAfterCollapse(state.rows[tabKey]));
    const pos = state.boardPos[tabKey] || {x:20,y:20};

    const card = document.createElement('div');
    // bc-* class drives the left-edge stripe color (color rotates per board)
    const colorCls = (sch.color || '').replace(/^c-/, 'bc-');
    card.className = 'board-card ' + colorCls;
    card.dataset.tab = tabKey;
    if(mode === 'free'){
      card.style.left = pos.x + 'px';
      card.style.top  = pos.y + 'px';
    }
    const sz = state.boardSize?.[tabKey] || {w:560,h:0};
    if(mode === 'free' && sz.w) card.style.width = sz.w + 'px';
    if(mode === 'free' && sz.h) card.style.height = sz.h + 'px';

    const head = document.createElement('div');
    head.className = 'board-card-head';
    head.innerHTML = `
      <span class="tab-icon ${sch.color}"></span>
      <div class="board-card-title" contenteditable="true" spellcheck="false">${escapeHtml(state.titles[tabKey])}</div>
      <div class="board-head-spacer"></div>
      <span class="board-card-count">${rows.length}</span>
      <button class="board-card-add" title="Add row or column">+</button>
      <button class="board-card-open" title="Open this list">Open →</button>
    `;
    head.querySelector('.board-card-title').addEventListener('input', (e) => {
      state.titles[tabKey] = e.target.textContent.trim() || sch.label;
      save(); renderTabs();
    });
    head.querySelector('.board-card-open').addEventListener('click', (e) => {
      e.stopPropagation();
      state.activeTab = tabKey; save(); render();
    });
    head.querySelector('.board-card-add').addEventListener('click', (e) => {
      e.stopPropagation();
      closeFloatingRowMenu();
      const btn = e.currentTarget;
      const pop = document.createElement('div');
      pop.className = 'row-menu-pop floating-row-menu';

      let top = r.bottom + 4;
      if (top + popH > window.innerHeight - 8) top = Math.max(8, r.top - popH - 4);
      let left = r.right - popW;
      if (left < 8) left = 8;
      if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
      pop.style.top = top + 'px';
      pop.style.left = left + 'px';
      pop.querySelectorAll('button').forEach(b => {
