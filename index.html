<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --lg-blue:#252f7c;
  --lg-yellow:#f8ef24;
  --lg-pink:#ec058c;
  --lg-cyan:#2bb1e6;
  --bg:#f6f2eb;
  --card:#ffffff;
  --border:rgba(0,0,0,.10);
  --border-strong:rgba(0,0,0,.18);
  --text:#1a1a1a;
  --muted:#6f6b62;
  --row-hover:rgba(43,177,230,.06);
  --row-drop:rgba(43,177,230,.18);
  --dot:rgba(37,47,124,.16);
  --header-bg:#fefefc;
  --sidebar-bg:var(--bg);
}
/* ── SKINS ── each skin overrides only the variables it changes ── */
/* Simple = defaults above, no overrides needed */

/* ── DARK NEON / 80s SYNTHWAVE ────────────────────────────────────────────── */
body[data-skin="dark-neon"]{
  --bg:transparent;
  --card:rgba(6,16,38,.90);
  --border:rgba(255,75,216,.18);
  --border-strong:rgba(255,75,216,.38);
  --text:#f8fafc;
  --muted:#9ba8bf;
  --row-hover:rgba(255,75,216,.05);
  --row-drop:rgba(0,245,255,.14);
  --dot:rgba(255,75,216,.55);
  --header-bg:rgba(3,8,23,.97);
  --sidebar-bg:rgba(3,8,23,.97);
  --lg-blue:#a855f7;
  --lg-yellow:#ffd21f;
  --lg-pink:#ff4bd8;
  --lg-cyan:#00f5ff;
  background-image:none !important;
}
/* Synthwave background image — full viewport, locked behind all content */
body[data-skin="dark-neon"]::before{
  content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:url('assets/bg-dark-neon.png') center center / cover no-repeat;
  /* Fallback gradient if image hasn't loaded */
  background-color:#020516;
}
/* Darken the top half slightly so header content reads cleanly */
body[data-skin="dark-neon"]::after{
  content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:linear-gradient(180deg, rgba(2,5,22,.45) 0%, rgba(2,5,22,.1) 45%, transparent 65%);
}

/* Hide Guggenheim art in this skin */
body[data-skin="dark-neon"] #lgArtBackground{display:none!important}
body[data-skin="dark-neon"] #lgArtAttribution{display:none!important}
body[data-skin="dark-neon"].lg-art-on{background-image:none!important}

/* ── Header ── */
body[data-skin="dark-neon"] .header{
  background:rgba(3,8,23,.97);
  border-bottom:1px solid rgba(255,75,216,.28);
  box-shadow:0 1px 24px rgba(255,75,216,.10);
}
body[data-skin="dark-neon"] .logo{
  background:url('assets/logo-dark-neon.png') left center / contain no-repeat;
  width:160px;
  height:38px;
  color:transparent;
  text-shadow:none;
  letter-spacing:0;
  flex-shrink:0;
}
body[data-skin="dark-neon"] .logo .dot{display:none}
body[data-skin="dark-neon"] .board-switcher{color:#f8fafc}
body[data-skin="dark-neon"] .board-switcher:hover{background:rgba(255,75,216,.08)}
body[data-skin="dark-neon"] .board-switcher.open{background:rgba(255,75,216,.1)}
body[data-skin="dark-neon"] #matryoshkaHomeBtn{
  color:#00f5ff;border-color:rgba(0,245,255,.45);
  box-shadow:0 0 8px rgba(0,245,255,.25);
}
body[data-skin="dark-neon"] #matryoshkaHomeBtn.active{
  background:rgba(0,245,255,.1);border-color:#00f5ff;
  box-shadow:0 0 14px rgba(0,245,255,.5);
}
body[data-skin="dark-neon"] #skinPickerBtn{color:#9ba8bf}
body[data-skin="dark-neon"] #skinPickerBtn:hover{color:#f8fafc;background:rgba(255,75,216,.08)}
body[data-skin="dark-neon"] .sync-status{color:#9ba8bf}

/* ── Sidebar ── */
body[data-skin="dark-neon"] .sidebar{
  background:rgba(3,8,23,.97);
  border-right:1px solid rgba(255,75,216,.18);
}
body[data-skin="dark-neon"] .sidebar-title{color:#9ba8bf;letter-spacing:.08em}
body[data-skin="dark-neon"] .sidebar-foot{border-top-color:rgba(255,75,216,.15)}
body[data-skin="dark-neon"] .tab-icon-wrap{
  background:rgba(6,16,38,.9);
  border-color:rgba(255,75,216,.22);
  box-shadow:none;
}
body[data-skin="dark-neon"] .tab-btn:hover .tab-icon-wrap{
  box-shadow:0 0 10px rgba(255,75,216,.25);
  border-color:rgba(255,75,216,.45);
  transform:translateY(-1px);
}
body[data-skin="dark-neon"] .tab-btn.active .tab-icon-wrap{
  background:rgba(6,16,38,.95);
  border-color:#ff4bd8;
  box-shadow:0 0 10px rgba(255,75,216,.6),0 0 24px rgba(255,75,216,.3);
}
body[data-skin="dark-neon"] .tab-btn.active .tab-icon{background:#ff4bd8!important;box-shadow:0 0 8px rgba(255,75,216,.9)}
body[data-skin="dark-neon"] .tab-icon{box-shadow:none}
body[data-skin="dark-neon"] .tab-icon.c-internal{background:#ffd21f;box-shadow:0 0 6px rgba(255,210,31,.5)}
body[data-skin="dark-neon"] .tab-icon.c-client{background:#ff4bd8;box-shadow:0 0 6px rgba(255,75,216,.5)}
body[data-skin="dark-neon"] .tab-icon.c-bd{background:#00f5ff;box-shadow:0 0 6px rgba(0,245,255,.5)}
body[data-skin="dark-neon"] .tab-icon.c-navy{background:#a855f7;box-shadow:0 0 6px rgba(168,85,247,.5)}
body[data-skin="dark-neon"] .tab-icon.c-white{background:#f8fafc;box-shadow:none}
body[data-skin="dark-neon"] .tab-label{color:#f8fafc}
body[data-skin="dark-neon"] .tab-btn.tab-archive .tab-label{color:#9ba8bf}
body[data-skin="dark-neon"] .tab-badge{background:#ff4bd8;color:#020516}

/* ── New list button ── */
body[data-skin="dark-neon"] .sidebar-add-list{
  background:rgba(255,75,216,.08)!important;
  border-color:rgba(255,75,216,.35)!important;
  color:#ff4bd8!important;
  border-radius:8px;
}
body[data-skin="dark-neon"] .sidebar-add-list:hover{
  background:rgba(255,75,216,.16)!important;
  box-shadow:0 0 12px rgba(255,75,216,.3);
}

/* ── Section card (list panel) ── */
body[data-skin="dark-neon"] .section-card{
  background:rgba(6,16,38,.90);
  border:1px solid rgba(255,75,216,.28);
  border-radius:14px;
  box-shadow:0 0 0 1px rgba(255,75,216,.08),0 0 28px rgba(255,75,216,.10),0 18px 60px rgba(0,0,0,.45);
}
/* Rotate neon border color per column */
body[data-skin="dark-neon"] .section-card:nth-child(4n+1){border-color:rgba(255,75,216,.32);box-shadow:0 0 0 1px rgba(255,75,216,.1),0 0 28px rgba(255,75,216,.12),0 18px 60px rgba(0,0,0,.45)}
body[data-skin="dark-neon"] .section-card:nth-child(4n+2){border-color:rgba(0,245,255,.32);box-shadow:0 0 0 1px rgba(0,245,255,.1),0 0 28px rgba(0,245,255,.12),0 18px 60px rgba(0,0,0,.45)}
body[data-skin="dark-neon"] .section-card:nth-child(4n+3){border-color:rgba(168,85,247,.32);box-shadow:0 0 0 1px rgba(168,85,247,.1),0 0 28px rgba(168,85,247,.12),0 18px 60px rgba(0,0,0,.45)}
body[data-skin="dark-neon"] .section-card:nth-child(4n+0){border-color:rgba(45,156,255,.32);box-shadow:0 0 0 1px rgba(45,156,255,.1),0 0 28px rgba(45,156,255,.12),0 18px 60px rgba(0,0,0,.45)}

/* Section head */
body[data-skin="dark-neon"] .section-head{border-bottom:1px solid rgba(255,75,216,.12)}
body[data-skin="dark-neon"] .section-title{color:#f8fafc;font-weight:700}
body[data-skin="dark-neon"] .section-icon{box-shadow:0 0 8px currentColor}

/* ── Table ── */
body[data-skin="dark-neon"] .tbl{
  background:transparent;
  border-color:rgba(255,75,216,.12);
}
body[data-skin="dark-neon"] .tbl thead th{
  background:rgba(3,8,23,.5);
  color:#9ba8bf;
  border-bottom-color:rgba(255,75,216,.14);
  letter-spacing:.06em;
}
body[data-skin="dark-neon"] .tbl thead th:hover{background:rgba(255,75,216,.05)}
body[data-skin="dark-neon"] .tbl thead th .th-label{color:#9ba8bf}
body[data-skin="dark-neon"] .tbl tbody tr{border-bottom-color:rgba(255,75,216,.07)}
body[data-skin="dark-neon"] .tbl tbody tr:hover{background:rgba(255,75,216,.04)}
body[data-skin="dark-neon"] .tbl tbody tr.row-drop-above{box-shadow:inset 0 2px 0 #00f5ff}
body[data-skin="dark-neon"] .tbl tbody tr.row-drop-below{box-shadow:inset 0 -2px 0 #00f5ff}
body[data-skin="dark-neon"] .tbl td{color:#f8fafc;border-bottom-color:rgba(255,75,216,.07)}
body[data-skin="dark-neon"] .tbl td.cell-edit{color:#f8fafc}

html,body{height:100%}
/* Guggenheim daily-art background: full-bleed image behind everything, faded
   so it reads as ambient backdrop and doesn't compete with the tracker. */
#lgArtBackground{
  position:fixed;
  inset:0;
  z-index:-1;
  background-position:center;
  background-size:contain;          /* show the WHOLE painting; no cropping */
  background-repeat:no-repeat;
  background-color:var(--bg);       /* fill the surround with cream (matches page bg) */
  opacity:0;
  transition:opacity 1.6s ease-in;
  pointer-events:none;
}
#lgArtBackground.loaded{opacity:1}
/* When art is showing, suppress the page's dot pattern so the painting reads clearly */
body.lg-art-on{background-image:none !important}
#lgArtAttribution{
  position:fixed;
  bottom:10px;
  left:104px;        /* tucked just past the 92px sidebar / "+ New list" button */
  z-index:9997;
  font:400 10px/1.35 'Inter','Calibri',sans-serif;
  color:#6f6b62;
  background:rgba(251,249,243,.8);
  backdrop-filter:blur(3px);
  -webkit-backdrop-filter:blur(3px);
  padding:4px 10px;
  border-radius:6px;
  max-width:360px;
  pointer-events:none;
  opacity:0;
  transition:opacity .6s ease-in;
}
#lgArtAttribution.loaded{opacity:.85}
body{
  font-family:'Calibri','Carlito',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  font-weight:300;
  background-color:var(--bg);
  background-image:radial-gradient(circle, var(--dot) .9px, transparent 1.1px);
  background-size:12px 12px;
  background-attachment:fixed;
  color:var(--text);font-size:14px;letter-spacing:.1px;
}

/* ── HEADER ── */
.header-zone{display:none}
.header{position:sticky;top:0;z-index:100;background:var(--header-bg);border-bottom:1px solid rgba(0,0,0,.04);padding:8px 18px;display:flex;align-items:center;gap:14px}
.logo-img{height:30px;width:auto;display:block}
.brand-icons{display:flex;align-items:center;gap:4px}
.brand-icon{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:8px;cursor:pointer;transition:background .15s,transform .15s;text-decoration:none;background:transparent;border:none;padding:4px}
.brand-icon:hover{background:rgba(0,0,0,.05);transform:translateY(-1px)}
.brand-icon img{width:100%;height:100%;object-fit:contain}
.logo{font-size:13px;font-weight:700;color:var(--lg-blue);letter-spacing:1.2px;text-transform:uppercase;white-space:nowrap}
.logo .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--lg-pink);margin-right:8px;vertical-align:middle}
.title{font-size:14px;font-weight:600;color:var(--text);flex:1}
.sync-status{display:inline-flex;align-items:center;gap:6px;font-size:11px;letter-spacing:.2px;color:var(--muted);background:transparent;border:1px solid transparent;padding:4px 9px;border-radius:7px;cursor:pointer;font-family:inherit;flex-shrink:0;transition:all .12s}
.sync-status:hover{color:var(--text);border-color:var(--border-strong);background:#fff}
.sync-status .sync-dot{width:7px;height:7px;border-radius:50%;background:#bdbab2;flex-shrink:0;transition:background .15s}
.sync-status.synced .sync-dot{background:#7aaa90}
.sync-status.syncing .sync-dot{background:var(--lg-cyan);animation:sync-pulse 1s ease-in-out infinite}
.sync-status.error .sync-dot{background:var(--lg-pink)}
@keyframes sync-pulse{0%,100%{opacity:.3}50%{opacity:1}}
.board-switcher{font-size:14px;font-weight:600;color:var(--text);background:transparent;border:none;cursor:pointer;font-family:inherit;padding:6px 10px;border-radius:7px;display:inline-flex;align-items:center;gap:6px;text-align:left;justify-content:flex-start;max-width:280px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.board-switcher::after{content:'▾';font-size:9px;color:var(--muted);margin-top:1px}
.board-switcher:hover{background:rgba(37,47,124,.05)}
.board-switcher.open{background:rgba(37,47,124,.06)}
#matryoshkaHomeBtn{font-size:12px;font-weight:600;color:var(--muted);background:transparent;border:none;cursor:pointer;font-family:inherit;padding:5px 10px;border-radius:7px;white-space:nowrap;letter-spacing:.01em}
#matryoshkaHomeBtn:hover{background:rgba(37,47,124,.05);color:var(--text)}
#matryoshkaHomeBtn.active{color:var(--lg-blue);background:rgba(37,47,124,.07)}
#skinPickerBtn{font-size:12px;font-weight:500;color:var(--muted);background:transparent;border:none;cursor:pointer;font-family:inherit;padding:5px 10px;border-radius:7px;white-space:nowrap}
#skinPickerBtn:hover{background:rgba(37,47,124,.05);color:var(--text)}
#skinPickerBtn.open{color:var(--text);background:rgba(37,47,124,.06)}
.skin-menu{position:fixed;background:var(--card);border:1px solid var(--border-strong);border-radius:12px;box-shadow:0 10px 32px rgba(37,47,124,.18);padding:10px;z-index:9999;min-width:200px}
.skin-menu-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:2px 8px 8px}
.skin-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;border:none;background:transparent;font-family:inherit;width:100%;text-align:left}
.skin-item:hover{background:rgba(37,47,124,.05)}
.skin-item.active{background:rgba(37,47,124,.07)}
.skin-item-name{font-size:13px;font-weight:500;color:var(--text);flex:1}
.skin-item.active .skin-item-name{font-weight:700;color:var(--lg-blue)}
.skin-swatches{display:flex;gap:3px;flex-shrink:0}
.skin-swatch{width:10px;height:10px;border-radius:50%;border:1px solid rgba(0,0,0,.1)}
.skin-check{font-size:12px;color:var(--lg-blue);width:14px;text-align:center;flex-shrink:0}
.board-menu{position:fixed;background:#fff;border:1px solid var(--border-strong);border-radius:10px;box-shadow:0 10px 28px rgba(37,47,124,.18);padding:6px;z-index:9999;min-width:240px;max-width:340px}
.board-menu-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:14px;color:var(--text)}
.board-menu-item:hover{background:rgba(43,177,230,.10)}
.board-menu-item.active{background:rgba(37,47,124,.06);font-weight:600}
.board-menu-item .check{width:16px;color:var(--lg-blue);font-size:14px}
.board-menu-item .name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.board-menu-item .row-actions{display:none;gap:3px}
.board-menu-item:hover .row-actions{display:flex}
.board-menu-item .row-actions button{width:30px;height:30px;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;font-size:16px;line-height:1;border-radius:6px;font-family:inherit;padding:0;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.board-menu-item .row-actions button:hover{background:rgba(37,47,124,.08);color:var(--text);border-color:rgba(37,47,124,.12)}
.board-menu-item .row-actions button.del:hover{color:var(--lg-pink);border-color:rgba(236,5,140,.3);background:rgba(236,5,140,.08)}
.board-menu-sep{height:1px;background:var(--border);margin:5px 4px}
.board-menu-add{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer;font-size:13px;color:var(--lg-blue);font-weight:600;border:1px dashed var(--border-strong);background:transparent;width:calc(100% - 0px);font-family:inherit}
.board-menu-add:hover{background:rgba(43,177,230,.06);border-style:solid;border-color:var(--lg-blue)}
button{font-size:12px;padding:5px 12px;border-radius:8px;border:1px solid var(--border-strong);background:#fff;color:var(--text);cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
button:hover{border-color:var(--lg-blue)}
.btn-primary{background:var(--lg-blue);color:#fff;border-color:var(--lg-blue)}
.btn-primary:hover{background:#1a2360;border-color:#1a2360}

/* ── LAYOUT ── */
.layout{display:flex;align-items:flex-start;min-height:calc(100vh - 47px)}
.sidebar{position:sticky;top:47px;flex-shrink:0;width:92px;background:var(--sidebar-bg);border-right:1px solid var(--border);padding:14px 0;height:calc(100vh - 47px);overflow-y:auto;z-index:1;display:flex;flex-direction:column}
.sidebar .tab-nav{flex:1;min-height:0;overflow-y:auto}
.sidebar-foot{margin-top:auto;padding:10px 8px 14px;display:flex;flex-direction:column;gap:8px;align-items:stretch;border-top:1px solid var(--border)}
.sidebar-add-list{font-size:11px;padding:7px 8px;border-radius:8px;line-height:1.1;white-space:normal;text-align:center}
.sidebar-title{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:1.2px;text-transform:uppercase;padding:0 6px 10px;text-align:center}
.tab-nav{display:flex;flex-direction:column;gap:0;padding:0 6px}
.tab-btn{padding:8px 4px 7px;font-size:10.5px;font-weight:500;color:var(--muted);background:transparent;border:1px solid transparent;border-radius:8px;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:6px;text-align:center;font-family:inherit;width:100%;transition:all .12s;position:relative;line-height:1.25}
.tab-btn:hover{color:var(--text)}
.tab-btn:hover .tab-icon-wrap{box-shadow:0 2px 4px rgba(37,47,124,.10),0 5px 12px rgba(37,47,124,.10);transform:translateY(-1px)}
.tab-btn.active{color:var(--text);font-weight:600}
.tab-btn.active .tab-icon-wrap{background:#fff;border-color:var(--text);box-shadow:0 0 0 2px var(--text),0 4px 12px rgba(37,47,124,.18)}
.tab-btn.active .tab-icon{background:#fff !important}
.tab-btn.drop-target .tab-icon-wrap{border-color:var(--lg-cyan);border-style:dashed;background:var(--row-drop)}
.tab-icon-wrap{width:36px;height:36px;border-radius:8px;background:#fff;border:1px solid rgba(0,0,0,.07);box-shadow:0 1px 2px rgba(37,47,124,.07),0 2px 6px rgba(37,47,124,.05);display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
.tab-icon{flex-shrink:0;width:10px;height:10px;border-radius:50%;background:var(--text);box-shadow:0 0 0 2px #fff,0 0 0 3px rgba(37,47,124,.25)}
.tab-icon.c-internal{background:var(--lg-yellow)}
.tab-icon.c-client{background:var(--lg-pink)}
.tab-icon.c-bd{background:var(--lg-cyan)}
.tab-icon.c-navy{background:var(--lg-blue)}
.tab-icon.c-white{background:#fff;box-shadow:0 0 0 1.5px var(--lg-blue),0 1px 3px rgba(37,47,124,.25)}
.tab-label{flex:0 0 auto;min-width:0;overflow:hidden;white-space:normal;word-break:break-word;max-width:80px;font-size:10.5px;line-height:1.25}
.tab-badge{position:absolute;top:2px;right:6px;font-size:9px;padding:0 5px;line-height:1.5;border-radius:8px;background:var(--lg-pink);color:#fff;font-weight:700;opacity:0;transition:opacity .12s}
.tab-btn:hover .tab-badge,.tab-btn.active .tab-badge{opacity:.95}
.sidebar-group{font-size:8.5px;font-weight:700;color:var(--muted);letter-spacing:1.4px;text-transform:uppercase;padding:14px 6px 4px;text-align:center}
.tab-btn[data-draggable-tab="1"]{cursor:grab}
.tab-btn[data-draggable-tab="1"]:active{cursor:grabbing}
.tab-btn.tab-dragging{opacity:.5;background:rgba(43,177,230,.18) !important}
.tab-btn.tab-drop-above{box-shadow:inset 0 2px 0 0 var(--lg-cyan)}
.tab-btn.tab-drop-below{box-shadow:inset 0 -2px 0 0 var(--lg-cyan)}
.tab-btn.tab-archive{opacity:.55;font-weight:500}
.tab-btn.tab-archive:hover,.tab-btn.tab-archive.active{opacity:1}
.tab-btn.tab-archive .tab-icon-wrap{box-shadow:none;background:rgba(255,255,255,.5)}
.tab-btn.tab-archive .tab-icon{opacity:.6}

.main{flex:1;min-width:0;padding:24px 28px}
body.view-home .main{padding:0}
body.view-home .section-card{display:none}
body.view-home .board-canvas{min-height:calc(100vh - 47px)}

/* Section card — wraps section-head + table to look like a single board card */
.section-card{position:relative;background:#fff;border:1px solid rgba(0,0,0,.05);border-radius:10px;overflow:hidden;max-width:none;box-shadow:0 1px 2px rgba(37,47,124,.04),0 6px 18px rgba(37,47,124,.06);width:600px;display:flex;flex-direction:column}
.section-card #tableHost{flex:1;min-height:0;overflow:auto}
.section-resize{position:absolute;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize;z-index:6;background:linear-gradient(135deg,transparent 50%,var(--lg-cyan) 50%,var(--lg-cyan) 60%,transparent 60%,transparent 70%,var(--lg-cyan) 70%,var(--lg-cyan) 80%,transparent 80%);opacity:0;border-bottom-right-radius:10px;transition:opacity .15s}
.section-card:hover .section-resize{opacity:.4}
.section-resize:hover{opacity:1}
.section-card .section-head{display:flex;align-items:center;gap:10px;padding:14px 16px 8px;background:transparent;margin-bottom:0}
.section-icon{flex-shrink:0;width:10px;height:10px;border-radius:50%;background:var(--text)}
.section-icon.c-internal{background:var(--lg-yellow)}
.section-icon.c-client{background:var(--lg-pink)}
.section-icon.c-bd{background:var(--lg-cyan)}
.section-icon.c-navy{background:var(--lg-blue)}
.section-icon.c-white{background:#fff;box-shadow:0 0 0 1.5px var(--lg-blue) inset}
.section-title{font-size:18px;font-weight:600;color:var(--text);letter-spacing:.1px;flex:0 1 auto;max-width:60%;outline:none;border-radius:4px;padding:1px 6px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;border-bottom:none}
.section-title:hover{background:rgba(37,47,124,.04)}
.section-title:focus{background:rgba(255,255,255,.9);box-shadow:inset 0 0 0 1px var(--lg-cyan);border-bottom:none}
.section-actions{margin-left:auto;display:flex;gap:8px;opacity:1}
.section-actions button{font-size:11px;padding:3px 9px;color:var(--muted);border:1px dashed var(--border-strong);background:transparent}
.section-actions button:hover{color:var(--text);border-style:solid;border-color:var(--lg-blue)}
/* Table inside section-card flows seamlessly — no card border / shadow / radius */
.section-card .tbl{border:none !important;border-radius:0 !important;box-shadow:none !important;background:transparent !important;width:100%}
.section-card #tableHost{padding:0}

/* ── TABLE ── */
.tbl{width:auto;min-width:100%;background:var(--card);border:1px solid rgba(0,0,0,.05);border-radius:10px;border-collapse:collapse;table-layout:fixed;box-shadow:0 1px 2px rgba(37,47,124,.04),0 6px 18px rgba(37,47,124,.06)}
.board-card-table-wrap{overflow-x:auto;overflow-y:visible}
.board-card-table-wrap .tbl{border-radius:0;border:none}
.tbl thead th{font-size:12.5px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:#1a1a1a;text-align:left;padding:8px 12px;background:rgba(37,47,124,.03);border-bottom:1px solid var(--border);outline:none}
.tbl thead th:hover{background:rgba(37,47,124,.06)}
.tbl thead th[contenteditable]:focus{background:#fff;color:var(--text)}
.tbl thead th.col-handle{width:28px;padding:0}
.tbl thead th.col-sortable{cursor:pointer}
.tbl thead th.col-sortable .th-inner:hover{background:rgba(37,47,124,.04)}
.tbl thead th.col-sortable .th-sort{margin:0 4px;color:var(--lg-cyan);font-weight:700;font-size:11px}
.tbl thead th.col-sortable .col-sort-btn{background:transparent;border:none;cursor:pointer;color:var(--muted);font-size:12px;line-height:1;padding:2px 5px;border-radius:4px;margin:0 2px;flex-shrink:0;font-family:inherit;opacity:.55;transition:opacity .12s,color .12s,background .12s}
.tbl thead th.col-sortable .col-sort-btn:hover{opacity:1;color:var(--lg-blue);background:rgba(37,47,124,.08)}
.tbl thead th.col-sortable .col-sort-btn.active{opacity:1;color:var(--lg-cyan);font-weight:700}
.tbl thead th.col-handle.col-handle-l{width:20px}
/* Collapse arrow next to a parent row's first-cell text. */
.row-collapse-arrow{margin-left:6px;background:#fff;border:1px solid rgba(37,47,124,.25);color:var(--lg-blue);font-size:15px;cursor:pointer;padding:1px 6px;border-radius:5px;line-height:1.1;flex-shrink:0;font-family:inherit;opacity:.85;transition:opacity .12s,color .12s,border-color .12s,background .12s;font-weight:700;display:inline-flex;align-items:center;justify-content:center;min-width:22px;height:22px}
.row-collapse-arrow:hover{opacity:1;color:var(--lg-blue);background:rgba(43,177,230,.12);border-color:var(--lg-cyan)}
.tbl tbody tr.row-parent-expanded .row-collapse-arrow{color:var(--lg-blue);opacity:.85}
.tbl tbody tr.row-parent-collapsed .row-collapse-arrow{color:var(--lg-cyan);opacity:1}
/* Visual cue for sub-rows being dragged along with their parent. */
.tbl tbody tr.row-dragging-child{opacity:.45}
/* Badge showing how many sub-rows are coming along with the drag. */
.row-ghost-badge{position:absolute;top:-10px;right:-12px;background:var(--lg-cyan);color:#fff;font-weight:700;font-size:10.5px;padding:3px 8px;border-radius:11px;box-shadow:0 2px 6px rgba(37,47,124,.20);letter-spacing:.3px;white-space:nowrap}
.tbl td.cell-handle.cell-handle-l{width:20px;padding:0 2px;text-align:center;letter-spacing:-1px}
.tbl thead th.col-check{width:30px;padding:0}
.tbl thead th.col-actions{width:52px;padding:0}
.tbl thead th.col-add{width:30px;padding:0;background:rgba(37,47,124,.03)}
.tbl td.cell-add{padding:0}
.add-col-btn{width:22px;height:22px;border-radius:6px;border:1px dashed var(--border-strong);background:transparent;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:0;font-family:inherit}
.add-col-btn:hover{color:var(--lg-blue);border-color:var(--lg-blue);border-style:solid}

/* header inner: label + delete (user cols) + resize grip */
.tbl thead th .th-inner{position:relative;display:flex;align-items:center;gap:4px;padding-right:8px}
.th-label{outline:none;border-radius:3px;padding:0 3px;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:text}
.th-label:hover{background:rgba(37,47,124,.06)}
.th-label:focus{background:#fff;box-shadow:inset 0 0 0 1px var(--lg-cyan);color:var(--text)}
.col-del{display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:50%;border:1px solid transparent;background:transparent;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;padding:0;opacity:.4;transition:opacity .12s,background .12s,color .12s,border-color .12s;flex-shrink:0}
.tbl thead th:hover .col-del{opacity:.85}
.col-del:hover{background:var(--lg-pink);color:#fff;border-color:var(--lg-pink);opacity:1}
.col-drag{display:inline-flex;align-items:center;justify-content:center;color:rgba(37,47,124,.45);cursor:grab;font-size:14px;font-weight:700;line-height:1;width:14px;height:18px;margin-right:2px;border-radius:3px;user-select:none;flex-shrink:0;letter-spacing:-1px}
.col-drag:hover{color:var(--lg-blue);background:rgba(43,177,230,.14)}
.col-drag:active{cursor:grabbing;background:rgba(43,177,230,.22)}
.tbl thead th.th-dragging{opacity:.4;background:rgba(43,177,230,.10)}
.tbl thead th.col-drop-before{box-shadow:inset 4px 0 0 0 var(--lg-cyan)}
.tbl thead th.col-drop-after{box-shadow:inset -4px 0 0 0 var(--lg-cyan)}
.col-resize{position:absolute;top:-5px;right:0;transform:translateX(50%);width:18px;height:calc(100% + 10px);cursor:col-resize;z-index:50;display:flex;align-items:center;justify-content:center;pointer-events:auto;touch-action:none}
.col-resize::after{content:'';width:4px;height:100%;background:rgba(43,177,230,.55);border-radius:2px;transition:background .12s}
.col-resize:hover::after{background:var(--lg-cyan)}
.col-resize.resizing::after{background:var(--lg-cyan)}
/* don't let table-wrap overflow hide the resize grip */
.board-card-table-wrap{overflow-y:visible}
.tbl td.cell-check{padding:0;text-align:center;vertical-align:middle}
.row-check{cursor:pointer;width:13px;height:13px;accent-color:var(--lg-blue);margin:0;display:block;margin-left:auto;margin-right:auto}

/* done-state row styling — tone matches the board's color */
.tbl tbody tr.row-done .cell-edit,
.tbl tbody tr.row-done .chip,
.tbl tbody tr.row-done .due,
.tbl tbody tr.row-done .who,
.tbl tbody tr.row-done .auto-date{text-decoration:line-through;text-decoration-thickness:1.5px;opacity:.75}
.tbl tbody tr.row-done .status{opacity:.85}

/* Tone shades — done rows get a wash of the board's color */
.tbl tbody tr.row-done.tone-blue{background:repeating-linear-gradient(45deg,rgba(37,47,124,.07) 0 6px,rgba(37,47,124,.13) 6px 12px)}
.tbl tbody tr.row-done.tone-blue:hover{background:repeating-linear-gradient(45deg,rgba(37,47,124,.10) 0 6px,rgba(37,47,124,.18) 6px 12px)}
.tbl tbody tr.row-done.tone-blue td{color:#5b6291}
.tbl tbody tr.row-done.tone-blue .cell-edit,
.tbl tbody tr.row-done.tone-blue .chip,
.tbl tbody tr.row-done.tone-blue .due,
.tbl tbody tr.row-done.tone-blue .who,
.tbl tbody tr.row-done.tone-blue .auto-date{text-decoration-color:rgba(37,47,124,.55)}

.tbl tbody tr.row-done.tone-yellow{background:repeating-linear-gradient(45deg,rgba(248,239,36,.18) 0 6px,rgba(248,239,36,.30) 6px 12px)}
.tbl tbody tr.row-done.tone-yellow:hover{background:repeating-linear-gradient(45deg,rgba(248,239,36,.26) 0 6px,rgba(248,239,36,.40) 6px 12px)}
.tbl tbody tr.row-done.tone-yellow td{color:#7a6a08}
.tbl tbody tr.row-done.tone-yellow .cell-edit,
.tbl tbody tr.row-done.tone-yellow .chip,
.tbl tbody tr.row-done.tone-yellow .due,
.tbl tbody tr.row-done.tone-yellow .who,
.tbl tbody tr.row-done.tone-yellow .auto-date{text-decoration-color:rgba(122,106,8,.7)}

.tbl tbody tr.row-done.tone-pink{background:repeating-linear-gradient(45deg,rgba(236,5,140,.07) 0 6px,rgba(236,5,140,.13) 6px 12px)}
.tbl tbody tr.row-done.tone-pink:hover{background:repeating-linear-gradient(45deg,rgba(236,5,140,.10) 0 6px,rgba(236,5,140,.18) 6px 12px)}
.tbl tbody tr.row-done.tone-pink td{color:#a04275}
.tbl tbody tr.row-done.tone-pink .cell-edit,
.tbl tbody tr.row-done.tone-pink .chip,
.tbl tbody tr.row-done.tone-pink .due,
.tbl tbody tr.row-done.tone-pink .who,
.tbl tbody tr.row-done.tone-pink .auto-date{text-decoration-color:rgba(236,5,140,.55)}

.tbl tbody tr.row-done.tone-cyan{background:repeating-linear-gradient(45deg,rgba(43,177,230,.08) 0 6px,rgba(43,177,230,.16) 6px 12px)}
.tbl tbody tr.row-done.tone-cyan:hover{background:repeating-linear-gradient(45deg,rgba(43,177,230,.13) 0 6px,rgba(43,177,230,.22) 6px 12px)}
.tbl tbody tr.row-done.tone-cyan td{color:#3a7d99}
.tbl tbody tr.row-done.tone-cyan .cell-edit,
.tbl tbody tr.row-done.tone-cyan .chip,
.tbl tbody tr.row-done.tone-cyan .due,
.tbl tbody tr.row-done.tone-cyan .who,
.tbl tbody tr.row-done.tone-cyan .auto-date{text-decoration-color:rgba(43,177,230,.65)}

.auto-date{font-size:12px;color:var(--muted);white-space:nowrap;line-height:1.1;display:inline-block}
.auto-date.empty{color:rgba(37,47,124,.30)}
.tbl tbody tr{border-bottom:1px solid var(--border);transition:background .1s}
.tbl tbody tr:last-child{border-bottom:none}
.tbl tbody tr:hover{background:var(--row-hover)}
/* drag-active row: tinted with the board's own tone */
.tbl tbody tr.dragging,
.tbl tbody tr.row-dragging{opacity:.45}
/* Multi-row selection. Background tint + a left bar in the LG cyan so it's
   visible against every board tone. */
.tbl tbody tr.row-selected td{background:rgba(43,177,230,.14) !important}
.tbl tbody tr.row-selected td:first-child{box-shadow:inset 3px 0 0 var(--lg-cyan)}
.tbl tbody tr.row-selected:hover td{background:rgba(43,177,230,.22) !important}
/* Floating bulk-action bar shown when rows are selected. */
#lgSelBar{position:fixed;left:50%;bottom:18px;transform:translateX(-50%);z-index:9998;display:flex;align-items:center;gap:8px;background:#fefefc;border:1px solid rgba(0,0,0,.12);border-radius:10px;box-shadow:0 8px 24px rgba(37,47,124,.18);padding:8px 12px;font-family:inherit;font-size:12.5px;color:var(--text)}
#lgSelBar .lg-sel-count{font-weight:600;color:var(--lg-blue);margin-right:6px}
#lgSelBar button{font:inherit;font-size:12px;padding:6px 12px;border-radius:7px;border:1px solid rgba(0,0,0,.12);background:#fff;color:var(--text);cursor:pointer}
#lgSelBar button:hover{border-color:var(--lg-blue);color:var(--lg-blue)}
#lgSelBar button.lg-sel-danger{color:var(--lg-pink);border-color:rgba(236,5,140,.30)}
#lgSelBar button.lg-sel-danger:hover{background:rgba(236,5,140,.10);border-color:var(--lg-pink);color:var(--lg-pink)}
#lgSelBar button.lg-sel-ghost{color:var(--muted);border-color:transparent}
#lgSelBar button.lg-sel-ghost:hover{color:var(--text);background:rgba(0,0,0,.04)}
.lg-sel-pop{position:fixed;z-index:9999;background:#fff;border:1px solid rgba(0,0,0,.18);border-radius:8px;box-shadow:0 12px 28px rgba(37,47,124,.18);padding:4px;min-width:200px;max-height:60vh;overflow:auto}
.lg-sel-pop button{display:block;width:100%;text-align:left;padding:7px 11px;border:none;background:transparent;font:inherit;font-size:12.5px;color:var(--text);border-radius:5px;cursor:pointer}
.lg-sel-pop button:hover{background:rgba(43,177,230,.12)}
.lg-sel-pop .lg-sel-empty{padding:10px 12px;color:var(--muted);font-size:12px}
.tbl tbody tr.row-dragging.tone-blue{background:rgba(37,47,124,.18) !important}
.tbl tbody tr.row-dragging.tone-yellow{background:rgba(248,239,36,.32) !important}
.tbl tbody tr.row-dragging.tone-pink{background:rgba(236,5,140,.18) !important}
.tbl tbody tr.row-dragging.tone-cyan{background:rgba(43,177,230,.22) !important}
.tbl tbody tr.row-dragging.tone-white{background:rgba(120,125,150,.18) !important}

/* tone-white: subtle gray stripe for done rows on a "white" board */
.tbl tbody tr.row-done.tone-white{background:repeating-linear-gradient(45deg,rgba(120,125,150,.06) 0 6px,rgba(120,125,150,.12) 6px 12px)}
.tbl tbody tr.row-done.tone-white:hover{background:repeating-linear-gradient(45deg,rgba(120,125,150,.10) 0 6px,rgba(120,125,150,.18) 6px 12px)}
.tbl tbody tr.row-done.tone-white td{color:#6e7290}
.tbl tbody tr.row-done.tone-white .cell-edit,
.tbl tbody tr.row-done.tone-white .chip,
.tbl tbody tr.row-done.tone-white .due,
.tbl tbody tr.row-done.tone-white .who,
.tbl tbody tr.row-done.tone-white .auto-date{text-decoration-color:rgba(110,114,144,.7)}

/* floating ghost row — border + shadow take the board's tone */
.row-ghost-table{background:#fff;border:2px solid var(--lg-cyan);border-radius:8px;box-shadow:0 14px 36px rgba(37,47,124,.22);overflow:hidden;opacity:.97;transform:rotate(-0.5deg)}
.row-ghost-table.tone-blue{border-color:var(--lg-blue);background:rgba(37,47,124,.10)}
.row-ghost-table.tone-pink{border-color:var(--lg-pink);background:rgba(236,5,140,.10)}
.row-ghost-table.tone-cyan{border-color:var(--lg-cyan);background:rgba(43,177,230,.12)}
.row-ghost-table.tone-yellow{border-color:var(--lg-yellow);background:rgba(248,239,36,.18)}
.row-ghost-table .row-ghost{background:transparent}
.row-ghost-table td{padding:0 8px !important;font-size:13px;color:var(--text);line-height:1 !important;border:none;height:18px}
.tbl tbody tr.drop-above,
.tbl tbody tr.row-drop-above{box-shadow:inset 0 2px 0 0 var(--lg-cyan)}
.tbl tbody tr.drop-below,
.tbl tbody tr.row-drop-below{box-shadow:inset 0 -2px 0 0 var(--lg-cyan)}
/* AGGRESSIVE row compaction — force everything tight */
.tbl{line-height:1.15 !important;border-spacing:0}
.tbl thead{display:none}
/* Sub-page tables show the thead, styled subtly so it reads as part of the card header */
.section-card .tbl thead{display:table-header-group;opacity:0;transition:opacity .18s}
.section-card:hover .tbl thead{opacity:1}
.section-card .tbl thead th{font-size:10px;padding:5px 9px;background:transparent;color:#1a1a1a;font-weight:700;letter-spacing:.7px;text-transform:uppercase;border-bottom:none}
.section-card .tbl thead th .th-label{color:#1a1a1a}
.tbl tbody tr{line-height:1.15 !important;height:auto}
.tbl tbody tr:not(:last-child){border-bottom:none}
.tbl tbody tr:hover{background:rgba(37,47,124,.025)}
.tbl td{padding:8px 9px !important;vertical-align:middle;font-size:14px;color:var(--text);line-height:1.3 !important;height:auto}
/* Row indentation — Tab / Shift+Tab inside the task cell adjusts the indent.
   The checkbox sits INSIDE the first data cell (in a flex wrapper) so a single
   padding-left shifts both the checkbox and the text right as one unit. */
/* Left-justify the first column: checkbox at the left edge, text starts at the
   same x on every row regardless of indent. Indent no longer shifts the text — it
   only adds a small left dot indicator (set further below) so hierarchy still reads. */
.tbl tbody tr .cell-first-data{padding-left:9px !important}
/* Indent (--ind is set by the row renderer; 0..8). Visually nests sub-rows. */
.tbl tbody tr .cell-first-data .first-cell-wrap{padding-left:calc(var(--ind, 0) * 22px)}
.tbl tbody tr .cell-first-data .first-cell-wrap{display:flex;align-items:center;gap:8px;width:100%}
.tbl tbody tr .cell-first-data .first-cell-wrap > .row-check{flex-shrink:0;margin-left:0;margin-right:0}
.tbl tbody tr .cell-first-data .first-cell-wrap > .cell-edit{flex:0 1 auto;min-width:0;text-align:left}
.tbl tbody tr .cell-first-data .first-cell-wrap > .row-collapse-arrow{flex:0 0 auto;margin-left:6px}
/* Drag handle and row-actions menu are invisible until you hover the row */
.tbl td.cell-handle{cursor:grab;color:var(--muted);text-align:center;padding:0 4px;user-select:none;font-size:12px;line-height:1;opacity:0;transition:opacity .12s}
.tbl td.cell-handle:hover{color:var(--text);background:rgba(43,177,230,.10)}
.tbl td.cell-handle:active{cursor:grabbing}
.tbl td.cell-actions{padding:0;text-align:center;line-height:1;opacity:0;transition:opacity .12s}
.tbl tbody tr:hover td.cell-handle,
.tbl tbody tr:hover td.cell-actions,
.tbl tbody tr.row-menu-open td.cell-handle,
.tbl tbody tr.row-menu-open td.cell-actions{opacity:1}
.cell-edit{outline:none;border-radius:3px;padding:0 4px;margin:0 -4px;cursor:text;line-height:1.2;word-break:break-word;font-size:14px;display:block;min-height:1.2em;width:auto}
.tbl tbody tr .cell-first-data .first-cell-wrap > .cell-edit{flex:1 1 auto}
.cell-edit ul,.cell-edit ol{margin:2px 0 2px 16px;padding:0}
.cell-edit ul li,.cell-edit ol li{margin:0;padding:0;line-height:1.25}
.cell-edit ul{list-style:disc}
.cell-edit ol{list-style:decimal}
/* row grows naturally when a cell has bullets */
.tbl tbody tr:has(.cell-edit ul,.cell-edit ol),
.tbl tbody tr:has(.cell-edit ul,.cell-edit ol) td{height:auto !important}
.cell-edit:hover{background:rgba(37,47,124,.05)}
.cell-edit:focus{background:#fff;box-shadow:inset 0 0 0 1px var(--lg-cyan);white-space:normal;overflow:visible;text-overflow:clip}
/* placeholders never wrap — truncate with ellipsis */
.cell-edit.placeholder{color:var(--muted);font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}

/* codename chip */
.chip{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 8px;border-radius:5px;background:rgba(236,5,140,.10);color:var(--lg-pink);outline:none;cursor:text;line-height:1.3}
.chip:hover{background:rgba(236,5,140,.18)}
.chip:focus{background:#fff;box-shadow:inset 0 0 0 1px var(--lg-pink)}
.chip.placeholder{background:rgba(37,47,124,.05);color:var(--muted);font-style:italic;font-weight:500;letter-spacing:.4px;text-transform:none}

/* status badge */
.status{display:inline-block;font-size:13px;font-weight:600;padding:3px 11px;border-radius:10px;cursor:pointer;border:none;letter-spacing:.2px;white-space:nowrap;line-height:1.5;vertical-align:middle}
.status.s-todo{background:rgba(37,47,124,.06);color:var(--text)}
.status.s-progress{background:rgba(46,160,87,.16);color:#2a7a3f}
.status.s-blocked{background:rgba(217,48,37,.14);color:#b3261e}
.status.s-done{background:rgba(120,170,144,.18);color:#447a5a}

/* assignee badge */
.who{display:inline-block;font-size:13px;font-weight:600;padding:3px 11px;border-radius:10px;background:rgba(120,125,150,.18);color:#3a3f5f;cursor:pointer;letter-spacing:.3px;border:none;white-space:nowrap;line-height:1.5;vertical-align:middle}
/* Per-owner color chips. Add a new .who-{INITIALS} class here when adding a teammate. */
.who.who-JF { background:rgba(43,177,230,.22); color:#0a6b96 }
.who.who-KVD{ background:rgba(236,5,140,.18); color:#a01266 }
.who.who-HH { background:rgba(37,47,124,.20); color:#252f7c }
.who.who-JL { background:rgba(248,239,36,.38); color:#7a6a08 }
.who.who-KC { background:rgba(122,170,144,.25); color:#3d6b50 }
.who.who-KL { background:rgba(184,137,42,.22); color:#7a5a18 }
.who.who-MW { background:rgba(149,107,184,.18); color:#5d3d7a }
.who.unassigned{ background:transparent;color:var(--muted);border:1px dashed rgba(0,0,0,.18) }
/* Wrapper that lets a who-cell display multiple chips side-by-side. */
.who-wrap{display:inline-flex;flex-wrap:wrap;gap:3px;cursor:pointer;line-height:1.4}
/* Multi-select popover (owners). */
.pop.pop-multi{padding:4px;min-width:160px;max-height:60vh;overflow:auto}
.pop.pop-multi .pop-multi-row{display:flex;align-items:center;gap:8px;width:100%;text-align:left;padding:5px 8px;border:none;background:transparent;font:inherit;font-size:12.5px;color:var(--text);border-radius:5px;cursor:pointer}
.pop.pop-multi .pop-multi-row:hover{background:rgba(43,177,230,.12)}
.pop.pop-multi .pop-check{width:14px;flex-shrink:0;color:var(--lg-cyan);font-weight:700;font-size:13px}
.pop.pop-multi .pop-sep{height:1px;background:rgba(0,0,0,.10);margin:4px 0}
.pop.pop-multi .pop-clear{display:block;width:100%;text-align:left;padding:5px 8px;border:none;background:transparent;font:inherit;font-size:11.5px;color:var(--muted);border-radius:5px;cursor:pointer}
.pop.pop-multi .pop-clear:hover{background:rgba(0,0,0,.04);color:var(--text)}
.who.unassigned{background:rgba(37,47,124,.05);color:var(--muted);border-color:transparent;font-style:italic;font-weight:500}

/* deadline */
.due{font-size:12px;color:var(--text);cursor:pointer;line-height:1.1;display:inline-block}
.due.overdue{color:var(--lg-pink);font-weight:600}
.due.soon{color:#b56e1c;font-weight:600}
.due.empty{color:var(--muted);font-style:italic}
.due input{font:inherit;color:inherit;border:none;background:transparent;outline:none;width:120px;padding:0}

/* row action menu */
.row-menu{position:relative}
.row-menu-btn{background:transparent;border:none;color:var(--muted);font-size:12px;line-height:1;cursor:pointer;padding:0 3px;border-radius:4px;height:14px;vertical-align:middle}
.row-menu-btn:hover{background:rgba(37,47,124,.08);color:var(--text)}
/* Per-row notes (long-form) button — sits next to the row menu. */
.row-notes-btn{background:transparent;border:none;color:var(--muted);font-size:12px;line-height:1;cursor:pointer;padding:0 2px;border-radius:4px;height:14px;vertical-align:middle;opacity:.7;filter:grayscale(1);transition:opacity .12s,filter .12s}
.row-notes-btn:hover{opacity:1;filter:none;background:rgba(43,177,230,.10)}
.row-notes-btn.has-notes{opacity:1;filter:none}
.row-cut-btn{background:transparent;border:none;color:var(--muted);font-size:14px;line-height:1;cursor:pointer;padding:0 4px;border-radius:4px;height:18px;vertical-align:middle;opacity:.55;transition:opacity .12s,color .12s,background .12s;margin-left:2px;font-family:inherit}
.row-cut-btn:hover{opacity:1;color:var(--lg-pink);background:rgba(236,5,140,.10)}
/* When a row has notes, force the actions cell to stay visible so the indicator is always seen. */
.tbl tbody tr td.cell-actions:has(.row-notes-btn.has-notes){opacity:1}
.tbl tbody tr.row-has-notes td:first-child{box-shadow:inset 3px 0 0 var(--lg-cyan)}

/* ── Notes drawer (slides in from right) ───────────────────────────────── */
.notes-backdrop{position:fixed;inset:0;background:rgba(37,47,124,.10);z-index:9990;opacity:0;pointer-events:none;transition:opacity .18s}
.notes-backdrop.open{opacity:1;pointer-events:auto}
.notes-drawer{position:fixed;top:0;right:0;bottom:0;width:44%;min-width:480px;max-width:760px;background:#fefefc;z-index:9991;display:flex;flex-direction:column;box-shadow:-12px 0 32px rgba(37,47,124,.16);transform:translateX(100%);transition:transform .22s cubic-bezier(.2,.6,.2,1)}
.notes-drawer.open{transform:translateX(0)}
.notes-head{padding:18px 22px 12px;border-bottom:1px solid rgba(0,0,0,.08);display:flex;align-items:flex-start;gap:10px}
.notes-head .row-summary{flex:1;min-width:0}
.notes-head .row-context{font-size:10.5px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted);margin-bottom:3px}
.notes-head h3{font-size:15px;font-weight:600;color:var(--text);line-height:1.35;word-wrap:break-word}
.notes-head .close-btn{background:transparent;border:1px solid transparent;font:inherit;font-size:18px;width:30px;height:30px;border-radius:6px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notes-head .close-btn:hover{background:rgba(0,0,0,.05);color:var(--text)}
.notes-toolbar{padding:8px 22px;border-bottom:1px solid rgba(0,0,0,.06);background:#fafaf7;display:flex;gap:4px;flex-wrap:wrap;align-items:center}
.notes-toolbar button{background:transparent;border:1px solid transparent;font:inherit;font-size:12px;padding:4px 8px;border-radius:5px;cursor:pointer;color:var(--muted);min-width:26px}
.notes-toolbar button:hover{background:rgba(37,47,124,.08);color:var(--text)}
.notes-toolbar .sep{width:1px;height:16px;background:rgba(0,0,0,.10);margin:0 4px}
.notes-body{flex:1;overflow:auto;padding:22px 26px 30px}
.notes-body .notes-editor{min-height:100%;font-size:14px;line-height:1.55;color:var(--text);outline:none;font-family:inherit}
.notes-body .notes-editor:empty::before{content:attr(data-placeholder);color:var(--muted);font-style:italic}
.notes-body .notes-editor p{margin-bottom:.8em}
.notes-body .notes-editor ul{margin:.4em 0 .8em 1.2em}
.notes-body .notes-editor ol{margin:.4em 0 .8em 1.5em}
.notes-foot{padding:9px 22px;border-top:1px solid rgba(0,0,0,.06);font-size:11px;color:var(--muted);display:flex;justify-content:space-between;align-items:center}
.notes-foot .saved{display:flex;align-items:center;gap:6px}
.notes-foot .saved::before{content:"";width:6px;height:6px;border-radius:50%;background:#7aaa90}
.notes-foot .saved.saving::before{background:var(--lg-cyan);animation:sync-pulse 1s ease-in-out infinite}
/* Floating popup: position:fixed and appended to body so it can extend past card edges */
.row-menu-pop{position:fixed;background:#fff;border:1px solid var(--border-strong);border-radius:8px;box-shadow:0 12px 28px rgba(37,47,124,.18);padding:4px;z-index:99999;min-width:180px}
.row-menu-pop button{display:block;width:100%;text-align:left;padding:7px 11px;border:none;background:transparent;font-size:12.5px;color:var(--text);border-radius:5px;cursor:pointer;font-family:inherit}
.row-menu-pop button:hover{background:rgba(43,177,230,.12)}
.row-menu-pop .sep{height:1px;background:var(--border);margin:4px 0}
.row-menu-pop button.danger{color:var(--lg-pink)}

/* dropdown popover (status / assignee) */
.pop{position:absolute;background:#fff;border:1px solid var(--border-strong);border-radius:8px;box-shadow:0 6px 20px rgba(37,47,124,.14);padding:4px;z-index:9999;min-width:140px}
.pop button{display:block;width:100%;text-align:left;padding:6px 10px;border:none;background:transparent;font-size:12px;color:var(--text);border-radius:5px;cursor:pointer;font-family:inherit}
.pop button:hover{background:rgba(43,177,230,.10)}

/* empty list state */
.list-empty{padding:40px 20px;text-align:center;color:var(--muted);font-size:13px}
.list-empty button{margin-top:10px}

/* ── HOME (free-form canvas of boards) ── */
.board-canvas{position:relative;width:100%;min-height:calc(100vh - 140px)}
/* Stacked view: boards flow vertically full-width, no drag, no overlap */
.board-canvas.stacked{display:flex;flex-direction:column;gap:16px;padding:16px 20px;min-height:0}
.board-canvas.stacked .board-card{position:relative !important;left:auto !important;top:auto !important;width:auto !important;height:auto !important;z-index:auto !important}
.board-canvas.stacked .board-card .board-card-head{cursor:default}
.board-canvas.stacked .board-card .board-resize{display:none}
.board-canvas.stacked .board-card .board-drag,
.board-canvas.stacked .board-card .board-head-spacer{cursor:default}

/* Home view-mode toggle pill (top-right of the canvas area) */
.home-mode-toggle{position:fixed;top:10px;right:95px;z-index:115;display:flex;align-items:center;gap:6px;font-family:inherit}
.home-mode-toggle .hmt-toggle{display:flex;background:#fff;border:1px solid var(--border-strong,rgba(37,47,124,.22));border-radius:999px;padding:2px;box-shadow:0 2px 8px rgba(37,47,124,.10)}
.home-mode-toggle .hmt-toggle button{border:none;background:transparent;padding:5px 12px;border-radius:999px;font-size:11.5px;font-weight:600;color:var(--muted,#6b6f86);cursor:pointer;letter-spacing:.2px;transition:all .12s}
.home-mode-toggle .hmt-toggle button:hover{color:var(--text,#252f7c)}
.home-mode-toggle .hmt-toggle button.active{background:var(--lg-blue,#252f7c);color:#fff}
.home-mode-toggle .hmt-zoom{display:flex;background:#fff;border:1px dashed rgba(37,47,124,.30);border-radius:8px;overflow:hidden;box-shadow:0 1px 3px rgba(37,47,124,.06)}
.home-mode-toggle .hmt-zoom button{border:none;background:transparent;padding:5px 10px;font-size:11.5px;font-weight:600;color:var(--text,#252f7c);cursor:pointer;font-family:inherit;min-width:36px}
.home-mode-toggle .hmt-zoom button:hover{background:rgba(37,47,124,.06)}
.home-mode-toggle .hmt-zoom button + button{border-left:1px dashed rgba(37,47,124,.20)}
.home-mode-toggle .hmt-action{background:#fff;border:1px dashed rgba(37,47,124,.30);border-radius:8px;padding:5px 10px;font:inherit;font-size:11.5px;font-weight:600;color:var(--text,#252f7c);cursor:pointer;display:inline-flex;align-items:center;gap:4px;box-shadow:0 1px 3px rgba(37,47,124,.06)}
.home-mode-toggle .hmt-action:hover{background:rgba(37,47,124,.04)}
.home-mode-toggle .hmt-action[disabled]{opacity:.45;cursor:not-allowed}
body:not(.view-home) .home-mode-toggle{display:none}
/* Bump cell content one size in board tables. Chips (who/status/due) stay their
   own size so they don't crowd a row. */
.tbl tbody td .cell-edit{font-size:15px}
.tbl tbody td.cell-handle,.tbl tbody td.cell-actions{font-size:13px}
/* Center-align date, status, and owner columns. Target by the renderer output
   so this works regardless of column key (the keys differ across boards). */
.tbl tbody td:has(> .auto-date),
.tbl tbody td:has(> .status),
.tbl tbody td:has(> .who-wrap),
.tbl tbody td:has(> .due){text-align:center}

/* ── BRAND CORNER (bottom-right: BG color picker + uploaded logo) ── */
.brand-corner{position:fixed;bottom:18px;right:18px;z-index:90;display:flex;align-items:flex-end;gap:8px;font-family:inherit}
.brand-corner .bcb{width:30px;height:30px;border-radius:50%;border:1px solid var(--border-strong);background:#fff;cursor:pointer;font-size:14px;line-height:1;padding:0;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(37,47,124,.10)}
.brand-corner .bcb:hover{border-color:var(--lg-blue)}
.brand-image{cursor:pointer;border-radius:8px;background:transparent;display:flex;align-items:center;justify-content:center}
.brand-image img{max-width:140px;max-height:90px;object-fit:contain;display:block}
.brand-image-empty{padding:6px 12px;font-size:11px;color:var(--muted);background:rgba(255,255,255,.85);border:1px dashed var(--border-strong);border-radius:8px;letter-spacing:.3px;cursor:pointer;font-weight:600}
.brand-image-empty:hover{color:var(--lg-blue);border-color:var(--lg-blue)}
/* Background-color picker popover */
.bcb-pop{position:fixed;background:#fff;border:1px solid var(--border-strong);border-radius:9px;box-shadow:0 8px 24px rgba(37,47,124,.16);padding:5px;z-index:90;min-width:160px;font-family:inherit}
.bcb-pop-item{display:block;width:100%;text-align:left;padding:8px 11px;border:none;background:transparent;cursor:pointer;font-family:inherit;font-size:13px;color:var(--text);border-radius:6px}
.bcb-pop-item:hover{background:rgba(43,177,230,.12)}

/* ── DASHBOARD (top-level shell) ── */
body.view-dashboard .header,
body.view-dashboard .layout,
body.view-dashboard .header-zone{display:none !important}
body:not(.view-dashboard) #dashboardView{display:none !important}
#dashboardView{min-height:100vh;background:linear-gradient(180deg,#f8f9fc 0%,#eef0f7 100%);padding:32px 40px 60px;font-family:inherit;color:var(--text)}
.dash-head{display:flex;align-items:center;gap:14px;margin-bottom:30px;flex-wrap:wrap}
.dash-logo{font-size:14px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;color:var(--lg-blue);display:flex;align-items:center;gap:10px}
.dash-logo .dot{width:10px;height:10px;border-radius:50%;background:var(--lg-pink)}
.dash-icons{display:flex;gap:8px;align-items:center}
.dash-icons .brand-icon img{height:26px}
.dash-spacer{flex:1}
.dash-title{font-size:28px;font-weight:700;color:var(--text);margin:18px 0 6px;letter-spacing:-.2px}
.dash-sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.tile-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
.tile{position:relative;background:#fff;border:1px solid var(--border);border-radius:14px;padding:20px;cursor:pointer;transition:all .15s;display:flex;flex-direction:column;gap:8px;min-height:130px;text-decoration:none;color:inherit;box-shadow:0 1px 2px rgba(37,47,124,.04)}
.tile:hover{border-color:var(--lg-blue);transform:translateY(-2px);box-shadow:0 6px 18px rgba(37,47,124,.10)}
.tile-accent{position:absolute;top:0;left:0;right:0;height:4px;border-radius:14px 14px 0 0;background:var(--lg-blue)}
.tile-icon{font-size:24px;line-height:1;margin-top:4px}
.tile-name{font-size:15px;font-weight:700;color:var(--text);letter-spacing:.1px}
.tile-desc{font-size:12px;color:var(--muted);line-height:1.4;flex:1}
.tile-foot{font-size:10.5px;color:var(--muted);letter-spacing:.6px;text-transform:uppercase;font-weight:600}
.tile-foot.external::after{content:' ↗';color:var(--lg-cyan)}
.tile-actions{position:absolute;top:8px;right:8px;display:flex;gap:4px;opacity:0;transition:opacity .15s}
.tile:hover .tile-actions{opacity:1}
.tile-actions button{width:22px;height:22px;border:1px solid var(--border);background:#fff;border-radius:6px;font-size:11px;color:var(--muted);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;padding:0}
.tile-actions button:hover{color:var(--text);border-color:var(--lg-blue)}
.tile.tile-add{border:2px dashed rgba(37,47,124,.20);background:transparent;align-items:center;justify-content:center;text-align:center;color:var(--muted)}
.tile.tile-add:hover{border-color:var(--lg-blue);color:var(--lg-blue);background:rgba(37,47,124,.02)}
.tile.tile-add .tile-icon{font-size:32px;color:inherit;margin:0}
.tile.tile-add .tile-name{color:inherit}

/* "Back to dashboard" link in tracker header */
.back-to-dash{font-size:11px;font-weight:600;color:var(--muted);text-decoration:none;letter-spacing:.4px;padding:4px 8px;border-radius:6px;transition:all .12s;display:inline-flex;align-items:center;gap:4px}
.back-to-dash:hover{color:var(--lg-blue);background:rgba(37,47,124,.04)}
body.view-dashboard .back-to-dash{display:none}

/* Add-tile dialog */
.tile-dialog-bg{position:fixed;inset:0;background:rgba(37,47,124,.35);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.tile-dialog{background:#fff;border-radius:12px;padding:24px;width:380px;box-shadow:0 18px 50px rgba(0,0,0,.25);font-family:inherit}
.tile-dialog h3{font-size:16px;font-weight:700;color:var(--text);margin:0 0 14px}
.tile-dialog label{display:block;font-size:11px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;color:var(--muted);margin:10px 0 4px}
.tile-dialog input[type=text],.tile-dialog input[type=url]{width:100%;padding:8px 10px;border:1px solid var(--border-strong);border-radius:7px;font-size:13px;font-family:inherit;outline:none;color:var(--text);box-sizing:border-box}
.tile-dialog input:focus{border-color:var(--lg-cyan);box-shadow:0 0 0 3px rgba(43,177,230,.15)}
.tile-dialog .colors{display:flex;gap:6px;margin-top:6px}
.tile-dialog .colors button{width:24px;height:24px;border-radius:50%;border:2px solid transparent;cursor:pointer}
.tile-dialog .colors button.sel{border-color:var(--text)}
.tile-dialog-actions{display:flex;justify-content:flex-end;gap:8px;margin-top:18px}
.tile-dialog-actions button{padding:7px 14px;border-radius:7px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;border:1px solid var(--border-strong);background:#fff;color:var(--text)}
.tile-dialog-actions .save{background:var(--lg-blue);color:#fff;border-color:var(--lg-blue)}
.tile-dialog-actions .save:hover{background:#1a2360}
.board-card{position:absolute;box-sizing:border-box;width:560px;background:#fff;border:1px solid rgba(37,47,124,.05);border-radius:10px;overflow:visible;display:flex;flex-direction:column;box-shadow:0 1px 2px rgba(37,47,124,.04),0 6px 20px rgba(37,47,124,.07);min-width:280px;min-height:120px}
.board-card .board-card-table-wrap{border-radius:10px}
.board-card-table-wrap{flex:1;overflow-x:auto;overflow-y:visible;padding-top:2px}
.board-resize{position:absolute;right:0;bottom:0;width:18px;height:18px;cursor:nwse-resize;z-index:6;background:linear-gradient(135deg,transparent 50%,var(--lg-cyan) 50%,var(--lg-cyan) 60%,transparent 60%,transparent 70%,var(--lg-cyan) 70%,var(--lg-cyan) 80%,transparent 80%);opacity:0;border-bottom-right-radius:10px;transition:opacity .15s}
.board-resize:hover{opacity:1}
.board-card.dragging{z-index:50;opacity:.97;box-shadow:0 14px 36px rgba(37,47,124,.20);cursor:grabbing}
/* Title row matches the sublist subpage's section-head: colored dot + bold title, padded. */
.board-card-head{display:flex;align-items:center;gap:10px;padding:14px 16px 8px;background:transparent;margin-bottom:0}
/* Collapsed/minimized board: removed from the canvas entirely; lives in #lgBoardDock at
   the bottom of the viewport as a clickable chip. Click the chip to restore. */
.board-card.board-collapsed{display:none !important}

/* Dock for minimized lists. Bottom-center, floats above everything except modals. */
#lgBoardDock{
  position:fixed;
  bottom:14px;
  left:50%;
  transform:translateX(-50%);
  z-index:9996;
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  justify-content:center;
  max-width:calc(100vw - 280px);
  background:rgba(251,249,243,.92);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border:1px solid rgba(37,47,124,.10);
  border-radius:14px;
  padding:6px 8px;
  box-shadow:0 6px 18px rgba(37,47,124,.10);
}
#lgBoardDock:empty{display:none}
.lg-dock-chip{
  display:inline-flex;
  align-items:center;
  gap:8px;
  padding:6px 12px 6px 10px;
  border-radius:9px;
  background:rgba(37,47,124,.07);
  border:1px solid transparent;
  font:600 11.5px/1 'Inter','Calibri',sans-serif;
  color:#252f7c;
  cursor:pointer;
  max-width:240px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.lg-dock-chip:hover{background:rgba(37,47,124,.13);border-color:rgba(37,47,124,.18)}
.lg-dock-chip .lg-dock-dot{
  width:8px;height:8px;border-radius:50%;flex-shrink:0;
}
.lg-dock-chip .lg-dock-up{
  font-size:10px;color:rgba(37,47,124,.55);margin-left:2px;
}
/* Hide the redundant in-head buttons — the floating controls strip handles add/open/close. */
.board-card-head .board-card-count,
.board-card-head .board-card-add,
.board-card-head .board-card-open{display:none}
/* Colored stripe on the left edge of each card */
.board-card{border-left:3px solid var(--border)}
.board-card.bc-internal{border-left-color:var(--lg-yellow)}
.board-card.bc-client{border-left-color:var(--lg-pink)}
.board-card.bc-bd{border-left-color:var(--lg-cyan)}
.board-card.bc-navy{border-left-color:var(--lg-blue)}
.board-card.bc-white{border-left-color:#fff;box-shadow:inset 3px 0 0 0 var(--lg-blue),0 1px 3px rgba(37,47,124,.06),0 4px 14px rgba(37,47,124,.04)}
/* Board-name tab sitting flush at the top of the card (fully inside, not clipped) */
/* Manila-folder tab: title sits ABOVE the card top edge with rounded top corners and a
   flat bottom that visually merges into the card. The card's overflow is `visible`, and
   the tab is at a negative `top` so it sticks up. A subtle `inset bottom` shadow plus
   the card's own border give the seamless folder-tab look. */
.board-card-tab{display:none}
/* Give the canvas enough top padding so tabs on top-row cards aren't clipped */
.board-canvas:not(.stacked){padding-top:28px;margin-top:-28px}
.board-card-grip{position:absolute;top:0;left:0;right:0;height:30px;cursor:grab;z-index:1;background:transparent}
.board-card.dragging .board-card-grip{cursor:grabbing}
.board-card-tab:focus{box-shadow:0 0 0 2px rgba(43,177,230,.35)}
.board-card-tab.c-internal{background:var(--lg-yellow);color:#6b5800}
.board-card-tab.c-client{background:var(--lg-pink);color:#fff}
.board-card-tab.c-bd{background:var(--lg-cyan);color:#fff}
.board-card-tab.c-navy{background:var(--lg-blue);color:#fff}
.board-card-tab.c-white{background:#fff;color:var(--lg-blue);box-shadow:inset 0 0 0 1.5px var(--lg-blue),0 1px 3px rgba(37,47,124,.10)}
/* canvas needs a touch of top padding so tabs aren't clipped */
.board-canvas{padding-top:14px}
/* Floating control strip in the top-right of each card (drag, +, open) */
.board-card-controls{position:absolute;top:4px;right:6px;display:flex;gap:3px;align-items:center;z-index:10;opacity:0;transition:opacity .15s;background:transparent;border:1px solid transparent;border-radius:8px;padding:2px;box-shadow:none}
.board-card:hover .board-card-controls{opacity:1}
.board-card-controls .ctl{width:30px;height:30px;border:none;background:transparent;border-radius:6px;font-size:16px;line-height:1;color:var(--muted);cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;padding:0;flex-shrink:0;font-weight:500}
.board-card-controls .ctl:hover{color:var(--text);background:rgba(37,47,124,.08)}
.board-card-controls .ctl.drag{cursor:grab;font-size:14px}
.board-card-controls .ctl.drag:active{cursor:grabbing}
.board-card-controls .ctl.add{font-size:18px}
.board-card-controls .ctl.del{font-size:18px}
.board-card-controls .ctl.del:hover{color:var(--lg-pink);background:rgba(236,5,140,.10)}
.board-card-controls .ctl.open{font-size:15px}
/* Tint the controls strip to match the parent card's color. */
.board-card.bc-internal .board-card-controls{background:rgba(248,239,36,.55);border-color:rgba(180,165,0,.45);box-shadow:0 2px 8px rgba(218,200,0,.18)}
.board-card.bc-internal .board-card-controls .ctl:hover{color:#3a3500;background:rgba(248,239,36,.85)}
.board-card.bc-client .board-card-controls{background:rgba(236,5,140,.14);border-color:rgba(236,5,140,.30);box-shadow:0 2px 8px rgba(236,5,140,.12)}
.board-card.bc-client .board-card-controls .ctl{color:#9e1469}
.board-card.bc-client .board-card-controls .ctl:hover{color:var(--lg-pink);background:rgba(236,5,140,.22)}

<!-- Daily-rotating Guggenheim art background. The image is selected
     deterministically by date (same artwork all day across all devices) and
     fades in once loaded. Hidden via opacity:0 by default; the script flips
     the `loaded` class only after the image successfully decodes. -->
<div id="lgArtBackground" aria-hidden="true"></div>
<div id="lgArtAttribution" aria-hidden="true"></div>
<!-- Minimized lists dock to here. Per-device — Kate's dock is separate from Jess's. -->
<div id="lgBoardDock" aria-label="Minimized lists"></div>
<script>
(function dailyGuggenheim(){
  // Curated set of famous works in the Solomon R. Guggenheim Museum's collection.
  // Images load from Wikimedia Commons via Special:FilePath (resolves filename → image).
  // If a URL ever 404s, the loader falls through to the next entry — never shows broken.
  // Filenames verified against Wikimedia Commons search API 2026-05-21.
  // Most are confirmed Guggenheim collection works; a few (Mondrian, the second
  // Modigliani) are spirit-aligned modernist works from sister museums.
  const ART = [
    { artist: 'Wassily Kandinsky',     title: 'Composition 8',                  year: 1923, file: 'Kandinsky_-_Composition_8,_July_1923.jpg' },
    { artist: 'Wassily Kandinsky',     title: 'Several Circles',                year: 1926, file: 'Vassily_Kandinsky,_1926_-_Several_Circles,_Gugg_0910_25.jpg' },
    { artist: 'Wassily Kandinsky',     title: 'Yellow-Red-Blue',                year: 1925, file: 'Kandinsky_-_Jaune_Rouge_Bleu.jpg' },
    { artist: 'Wassily Kandinsky',     title: 'Black Lines',                    year: 1913, file: 'Black_Lines_by_Vasily_Kandinsky,_1913.JPG' },
    { artist: 'Franz Marc',            title: 'The Yellow Cow',                 year: 1911, file: 'Franz_Marc-The_Yellow_Cow-1911.jpg' },
    { artist: 'Camille Pissarro',      title: 'The Hermitage at Pontoise',      year: 1867, file: 'Camille_Pissarro_-_L%C2%B4Hermitage_%C3%A0_Pontoise_-_1867.jpg' },
    { artist: 'Édouard Manet',         title: 'Before the Mirror',              year: 1876, file: 'Manet-Frau-vor-dem-Spiegel.jpg' },
    { artist: 'Pierre-Auguste Renoir', title: 'Woman with a Parrot',            year: 1871, file: 'Renoir_woman_with_a_parrot_1871.jpg' },
    { artist: 'Amedeo Modigliani',     title: 'Nude',                           year: 1917, file: 'Amedeo_Modigliani_-_Nude_-_Google_Art_Project.jpg' },
    { artist: 'Amedeo Modigliani',     title: 'Reclining Nude',                 year: 1917, file: '1917_Modigliani_Reclining_nude_anagoria.JPG' },
    { artist: 'Constantin Brâncuși',   title: 'Bird in Space',                  year: 1932, file: 'Bird_in_Space.jpg' },
    { artist: 'Piet Mondrian',         title: 'Composition with Red, Yellow & Blue', year: 1930, file: 'Composition-with-red-yellow-and-blue.jpg' },
  ];

  // Deterministic pick: same artwork all day, swaps at midnight, identical across
  // all devices on the same date. Seed combines year + day-of-year so it doesn't
  // collide year-to-year.
  function pickIndex(){
    const now = new Date();
    const start = new Date(now.getFullYear(), 0, 0);
    const dayOfYear = Math.floor((now - start) / 86400000);
    return (now.getFullYear() * 366 + dayOfYear) % ART.length;
  }

  function urlFor(art){
    return 'https://commons.wikimedia.org/wiki/Special:FilePath/' + art.file + '?width=1600';
  }

  function tryLoad(art){
    return new Promise(resolve => {
      const img = new Image();
      // No crossOrigin — we display it as a CSS background, not read pixels.
      // Setting crossOrigin forces strict CORS on Wikimedia's redirect chain,
      // which fails because Special:FilePath redirects don't send ACAO headers.
      img.onload = () => { console.log('[Guggenheim] loaded:', art.artist, art.title); resolve(true); };
      img.onerror = () => { console.warn('[Guggenheim] failed:', art.artist, art.title, urlFor(art)); resolve(false); };
      img.src = urlFor(art);
    });
  }

  // Toggle the artwork on/off based on state.bgGuggenheim. Called both at boot
  // and whenever the user changes the background mode via the 🎨 popover.
  // Exposed on window so the popover handlers can fire it without scope wrangling.
  function applyGuggenheimMode(){
    const on = (typeof state !== 'undefined') && state && state.bgGuggenheim !== false;
    const bg = document.getElementById('lgArtBackground');
    const attr = document.getElementById('lgArtAttribution');
    if (!on){
      if (bg){ bg.classList.remove('loaded'); bg.style.backgroundImage = ''; }
      if (attr) attr.classList.remove('loaded');
      document.body.classList.remove('lg-art-on');
      return false;
    }
    return true;
  }
  // Exposed so popover toggles can switch modes without scope wrangling.
  // When turning ON, also re-trigger the image load (if not already shown).
  window.applyGuggenheim = function(){
    const on = applyGuggenheimMode();
    if (on){
      const bg = document.getElementById('lgArtBackground');
      if (bg && !bg.classList.contains('loaded')) applyDailyArt();
    }
  };

  async function applyDailyArt(){
    if (!applyGuggenheimMode()) return;
    const startIdx = pickIndex();
    // Try today's pick first; if it 404s, fall through to other entries until one loads.
    for (let i = 0; i < ART.length; i++){
      const art = ART[(startIdx + i) % ART.length];
      const ok = await tryLoad(art);
      if (!ok) continue;
      const bg = document.getElementById('lgArtBackground');
      const attr = document.getElementById('lgArtAttribution');
      if (bg){
        bg.style.backgroundImage = "url('" + urlFor(art) + "')";
        bg.classList.add('loaded');
      }
      if (attr){
        attr.textContent = 'Today’s art: ' + art.artist + ', “' + art.title + '” (' + art.year + ') · Solomon R. Guggenheim Museum';
        attr.classList.add('loaded');
      }
      // Suppress the dot pattern so the painting reads as the dominant background
      document.body.classList.add('lg-art-on');
      return;
    }
  }

  // Run once on load. If everything 404s, no background appears — graceful no-op.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', applyDailyArt);
  } else {
    applyDailyArt();
  }
})();
</script>

<script>
/* ── DATA ── */
const STORAGE_KEY = 'lg-firm-todo-v1';

/* ── APPS SCRIPT + GOOGLE SHEETS BACKEND (experimental fork) ──────────────
   This fork replaces Supabase with a Google Sheets / Apps Script backend.
   Setup steps live in firm-todo-tracker-sheets.gs. Paste your deployed Web app
   /exec URL into APPS_SCRIPT_URL below.

   What's swapped vs. the original:
     - Persistence:    Supabase Postgres → one cell in a Google Sheet (full JSON blob)
     - Audit log:      Supabase table     → second sheet, one row per push
     - Auth:           Google OAuth + RLS → fake "always-signed-in" session
                       (Tracker is gated by being on tracker.lawgorithm.xyz; the
                       Apps Script URL is unguessable. Add a shared-secret prompt
                       later if you want more.)
     - Realtime:       Postgres CDC      → 5s polling for updated_at changes
   ────────────────────────────────────────────────────────────────────────── */
const APPS_SCRIPT_URL = ''; // Paste your own Apps Script /exec URL here
const SHEETS_POLL_INTERVAL_MS = 5000;
// Bump this integer whenever the push/merge/migration logic changes in a breaking way.
// Old clients that pull a blob with a higher version will be shown a hard reload gate.
const SCHEMA_VERSION = 1;

// Audit-log identity — prompt once, persist locally. (No real auth in this fork.)
let LG_SHEETS_USER_EMAIL = (function(){
  try {
    let v = localStorage.getItem('lg-sheets-user-email');
    if (!v) {
      v = (prompt('Your email (used for the tracker audit log):') || 'anonymous').trim();
      localStorage.setItem('lg-sheets-user-email', v);
    }
    return v;
  } catch(_) { return 'anonymous'; }
})();

async function _appsScriptCall(method, params, body){
  if (!APPS_SCRIPT_URL) throw new Error('APPS_SCRIPT_URL is empty — paste your /exec URL into firm-todo-tracker-sheets.html');
  let url = APPS_SCRIPT_URL;
  if (params){
    const qp = new URLSearchParams(params);
    url += (url.includes('?') ? '&' : '?') + qp.toString();
  }
  const opts = { method: method, redirect: 'follow' };
  if (body != null){
    // text/plain Content-Type avoids the CORS preflight that Apps Script can't satisfy.
    opts.headers = { 'Content-Type': 'text/plain;charset=utf-8' };
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(url, opts);
  if (!r.ok) throw new Error('Apps Script HTTP ' + r.status);
  return r.json();
}

// Minimal Supabase-API-shaped shim: implements only the call patterns this file uses.
//   supa.from('app_state').select('data, updated_at').eq('id','main').maybeSingle()
//   supa.from('app_state').select('id').eq('id','main').limit(1)             // RLS probe
//   supa.from('app_state').upsert({ id, data, updated_at })
//   supa.from('app_state_log').select('*').order('at',{ascending:false}).limit(500)
//   supa.from('app_state_log').insert({ user_id, user_email, rev, prev_rev, byte_size, diff })
class _SupaQuery {
  constructor(table){ this.table = table; this._terminal = null; this._payload = null; this._limit = null; }
  select(_cols){ return this; }
  eq(_col, _val){ return this; }
  order(_col, _opts){ return this; }
  limit(n){ this._terminal = this._terminal || 'limit'; this._limit = n; return this; }
  maybeSingle(){ this._terminal = 'maybeSingle'; return this; }
  insert(row){ this._terminal = 'insert'; this._payload = row; return this._dispatch(); }
  upsert(row){ this._terminal = 'upsert'; this._payload = row; return this._dispatch(); }
  // Thenable so `await chain.eq(...).limit(1)` works without an explicit terminal.
  then(resolve, reject){ return this._dispatch().then(resolve, reject); }
  async _dispatch(){
    try {
      if (this.table === 'app_state' && this._terminal === 'maybeSingle'){
        const j = await _appsScriptCall('GET', { op: 'pull' });
        if (j && j.error) return { data: null, error: { message: j.error } };
        return { data: (j && j.data) ? { data: j.data, updated_at: j.updated_at } : null, error: null };
      }
      if (this.table === 'app_state' && this._terminal === 'limit'){
        // RLS-style reachability probe — used to gate the boot. For the Apps Script
        // backend there's no per-user RLS to check (auth is via Drive ACL on the
        // HTML file, not per-call), and the boot's 6s timeout was occasionally
        // tripping on Apps Script cold-start latency or transient throttling.
        // Always pass instantly; if the actual pull/push fails later, the existing
        // sync-error banner surfaces it.
        return { data: [{ id: 'main' }], error: null };
      }
      if (this.table === 'app_state' && this._terminal === 'upsert'){
        const j = await _appsScriptCall('POST', null, { op: 'push', data: this._payload.data, expected_rev: this._payload.expected_rev || null });
        if (j && j.error) return { data: null, error: { message: j.error } };
        if (j && j.conflict) return { data: { conflict: true, cloudData: j.data, cloudUpdatedAt: j.updated_at }, error: null };
        return { data: { updated_at: (j && j.updated_at) || null }, error: null };
      }
      if (this.table === 'app_state_log' && this._terminal === 'insert'){
        const j = await _appsScriptCall('POST', null, Object.assign({ op: 'log' }, this._payload));
        if (j && j.error) return { data: null, error: { message: j.error } };
        return { data: null, error: null };
      }
      if (this.table === 'app_state_log' && this._terminal === 'limit'){
        const j = await _appsScriptCall('GET', { op: 'log', limit: String(this._limit || 500) });
        if (j && j.error) return { data: null, error: { message: j.error } };
        return { data: (j && j.data) || [], error: null };
      }
      return { data: null, error: { message: 'sheets-shim: unsupported call ' + this.table + '/' + this._terminal } };
    } catch (e){
      return { data: null, error: { message: (e && e.message) || String(e) } };
    }
  }
}

// Polling-based realtime channel. Polls every SHEETS_POLL_INTERVAL_MS; fires the
// registered callback whenever updated_at advances vs. the last value we saw.
//
// IMPORTANT: the first poll after subscribe just snapshots the current cloud
// version — it does NOT fire the callback. This avoids the bug where a poll
// fires before the user's first push completes, fetches stale cloud, and
// clobbers in-flight local edits. We only fire on a SECOND, NEWER version.
let _sheetsLastPolledUpdatedAt = null;
function _makeSheetsChannel(){
  let callback = null;
  let pollId = null;
  let isFirstPoll = true;
  let inFlight = false;
  const c = {
    on(_event, _filter, cb){ callback = cb; return c; },
    subscribe(){
      pollId = setInterval(async () => {
        if (inFlight) return;       // skip overlapping polls if the prior one is still running
        if (pendingLocalChanges) return; // never overwrite local while a push is queued/pending
        inFlight = true;
        try {
          const j = await _appsScriptCall('GET', { op: 'pull' });
          if (j && j.updated_at){
            if (isFirstPoll){
              _sheetsLastPolledUpdatedAt = j.updated_at;
              isFirstPoll = false;
            } else if (j.updated_at !== _sheetsLastPolledUpdatedAt){
              _sheetsLastPolledUpdatedAt = j.updated_at;
              if (callback && j.data) callback({ new: { data: j.data } });
            }
          }
        } catch (_) { /* swallow blip; try again next tick */ }
        finally { inFlight = false; }
      }, SHEETS_POLL_INTERVAL_MS);
      return c;
    },
    unsubscribe(){ if (pollId) clearInterval(pollId); pollId = null; return c; },
  };
  return c;
}

const supa = {
  from(table){ return new _SupaQuery(table); },
  channel(_name){ return _makeSheetsChannel(); },
  auth: {
    onAuthStateChange(cb){
      // Synthesize an immediate INITIAL_SESSION so the boot flow proceeds.
      setTimeout(() => cb('INITIAL_SESSION', {
        user: { id: 'sheets-fork', email: LG_SHEETS_USER_EMAIL },
        access_token: 'sheets-fork',
      }), 0);
      return { data: { subscription: { unsubscribe(){} } } };
    },
    signOut(){ return Promise.resolve({ error: null }); },
    signInWithOAuth(){ return Promise.resolve({ error: null }); },
  },
};
window.__lgAuth.client = supa;
window.__lgAuth.ready = true;

// Auth gate: returns true if we should proceed with the rest of the app.
// Hides the tracker UI until a valid (allowlisted) session exists.
function withTimeout(promise, ms, label){
  return Promise.race([
    promise,
    new Promise((_, reject) => setTimeout(() => reject(new Error(`${label} timed out after ${ms}ms`)), ms))
  ]);
}

async function validateSessionAndReveal(session){
  if (!session) return false;
  window.__lgAuth.user = session.user;
  return true;
}

// React to auth state changes. Supabase fires INITIAL_SESSION on init with the current
// session (or null), then SIGNED_IN/SIGNED_OUT/TOKEN_REFRESHED as they happen.
let appBooted = false;
async function bootAppForSession(session){
  if (!await validateSessionAndReveal(session)) return;
  if (appBooted) return;
  appBooted = true;
  // If the URL says ?log=1, hijack the boot and render the audit log instead.
  if (new URLSearchParams(location.search).get('log') === '1'){
    renderAuditLog();
    return;
  }
  render();

  if (found) render(); else pushStateToCloud();
  subscribeRealtime();
  if (typeof maybeSeedMechanicsListOnce === 'function') maybeSeedMechanicsListOnce();
}

function escapeHTML(s){

}

let applyingRemote = false;
let pushDebounceId = null;

// Sync status tracking — drives the indicator in the top bar
let lastSyncedAt = null;
let syncStatus = 'idle'; // 'idle' | 'syncing' | 'synced' | 'error'
function setSyncStatus(s){
  syncStatus = s;
  if(s === 'synced') lastSyncedAt = Date.now();
  updateSyncStatusUI();
}
function formatSyncAgo(){
  if(!lastSyncedAt) return 'never synced';
  const sec = Math.floor((Date.now() - lastSyncedAt) / 1000);
  if(sec < 5) return 'synced just now';
  if(sec < 60) return `synced ${sec}s ago`;
  const min = Math.floor(sec / 60);
  if(min < 60) return `synced ${min}m ago`;
  const hr = Math.floor(min / 60);
  return `synced ${hr}h ago`;
}
function updateSyncStatusUI(){
  const el = document.getElementById('syncStatus');

  el.classList.remove('synced','syncing','error');

  else if(syncStatus === 'synced') el.classList.add('synced');
  else if(syncStatus === 'error') el.classList.add('error');
  const lbl = el.querySelector('.sync-label');
  if(lbl) lbl.textContent = (syncStatus === 'syncing') ? 'syncing…' : (syncStatus === 'error' ? 'sync error' : formatSyncAgo());

function _showVersionReloadGate(remoteVersion) {
