          else if (act && act.startsWith('restore:')) restoreHiddenColumn(tabKey, act.slice('restore:'.length));
        });
      });
    });

    // accept ROW drops from a different tab to recategorize
    card.addEventListener('dragover', e => {
      if(dragData && dragData.fromTab !== tabKey){ e.preventDefault(); card.style.outline='2px dashed var(--lg-cyan)'; }
    });
    card.addEventListener('dragleave', () => { card.style.outline=''; });
    card.addEventListener('drop', e => {
      card.style.outline='';
      if(dragData && dragData.fromTab !== tabKey){ e.preventDefault(); moveRowToTab(dragData.rowId, dragData.fromTab, tabKey); }
    });

    card.appendChild(head);

    // Transparent strip across the top of the card — drag the card from anywhere on it
    const grip = document.createElement('div');
    grip.className = 'board-card-grip';
    grip.title = 'Drag to move';
    card.appendChild(grip);

    // Board name "tab" sitting on the top edge of the card
    const nameTab = document.createElement('div');
    nameTab.className = 'board-card-tab ' + (sch.color || '');
    nameTab.contentEditable = 'true';
    nameTab.spellcheck = false;
    nameTab.title = 'Click to rename';
    nameTab.textContent = state.titles[tabKey] || sch.label;
    nameTab.addEventListener('input', () => {
      state.titles[tabKey] = nameTab.textContent.trim() || sch.label;
      save(); renderTabs();
    });
    nameTab.addEventListener('keydown', e => { if(e.key === 'Enter'){ e.preventDefault(); nameTab.blur(); }});
    // Allow the title bar to act as a drag handle (via threshold, see onBoardMouseDown)
    card.appendChild(nameTab);

    const collapsed = !!(state.boardCollapsed && state.boardCollapsed[tabKey]);
    if (collapsed) card.classList.add('board-collapsed');
    // Floating controls strip in the top-right of the card (drag handle, +, minimize, ×, open)
    const ctrls = document.createElement('div');
    ctrls.className = 'board-card-controls';
    ctrls.innerHTML = `
      <button class="ctl drag" title="Drag to move">⋮⋮</button>
      <button class="ctl add" title="Add row or column">+</button>
      <button class="ctl min" title="${collapsed ? 'Expand list' : 'Minimize list'}">${collapsed ? '▸' : '▾'}</button>
      <button class="ctl del" title="Delete this list">×</button>
      <button class="ctl open" title="Open this list">↗</button>
    `;
    ctrls.querySelector('.open').addEventListener('click', e => {
      e.stopPropagation();
      state.activeTab = tabKey; save(); render();
    });
    ctrls.querySelector('.min').addEventListener('click', e => {
      e.stopPropagation();
      state.boardCollapsed = state.boardCollapsed || {};
      state.boardCollapsed[tabKey] = !state.boardCollapsed[tabKey];
      save(); render();
    });
    ctrls.querySelector('.del').addEventListener('click', e => {
      e.stopPropagation();
      deleteSubList(tabKey);
    });
    ctrls.querySelector('.add').addEventListener('click', e => {
      e.stopPropagation();
      closeFloatingRowMenu();
      const btn = e.currentTarget;
      const pop = document.createElement('div');
      pop.className = 'row-menu-pop floating-row-menu';
      const hiddenList = getHiddenColumns(tabKey);
      const restoreHtml = hiddenList.length
        ? '<div class="sep"></div>' + hiddenList.map(c => `<button data-act="restore:${c.key}">↶ Restore "${escapeHtml(c.label)}"</button>`).join('')
        : '';
      pop.innerHTML = `<button data-act="addrow">+ Add row</button><button data-act="addcol">+ Add column</button>${restoreHtml}`;
      document.body.appendChild(pop);
      const r = btn.getBoundingClientRect();
      const popW = pop.offsetWidth, popH = pop.offsetHeight;
      let top = r.bottom + 4;
      if (top + popH > window.innerHeight - 8) top = Math.max(8, r.top - popH - 4);
      let left = r.right - popW;
      if (left < 8) left = 8;
      if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
      pop.style.top = top + 'px';
      pop.style.left = left + 'px';
      pop.querySelectorAll('button').forEach(b => {
        b.addEventListener('click', ev => {
          ev.stopPropagation();
          const act = b.dataset.act;
          closeFloatingRowMenu();
          if (act === 'addrow') addRowTo(tabKey);
          else if (act === 'addcol') addColumn(tabKey);
          else if (act && act.startsWith('restore:')) restoreHiddenColumn(tabKey, act.slice('restore:'.length));
        });
      });
    });
    card.appendChild(ctrls);

    if(rows.length === 0){
      const empty = document.createElement('div');
      empty.className = 'board-card-empty';
      empty.textContent = 'No tasks yet';
      card.appendChild(empty);
    } else {
      const cols = getColumns(tabKey);
      const headHtml = cols.map(col => renderColHeader(tabKey, col)).join('');
      const wrap = document.createElement('div');
      wrap.className = 'board-card-table-wrap';
      wrap.innerHTML = `
        <table class="tbl">
          <thead><tr><th class="col-handle col-handle-l"></th>${headHtml}<th class="col-actions"></th></tr></thead>
          <tbody></tbody>
        </table>`;
      const tbody = wrap.querySelector('tbody');
      rows.forEach(row => tbody.appendChild(renderRow(tabKey, row)));
      card.appendChild(wrap);
      wireHeader(wrap, tabKey);
    }

    // resize handle (bottom-right corner)
    const resize = document.createElement('div');
    resize.className = 'board-resize';
    resize.title = 'Drag to resize';
    resize.addEventListener('mousedown', e => {
      e.preventDefault(); e.stopPropagation();
      const startX = e.clientX, startY = e.clientY;
      const startRect = card.getBoundingClientRect();
      // Canvas may be transform:scale(zoom). Convert viewport deltas → logical pixels
      // so the card resizes in step with the cursor at any zoom level.
      const z = Math.max(0.4, Math.min(2, +state.boardZoom || 1));
      const startW = startRect.width  / z;
      const startH = startRect.height / z;
      const onMove = ev => {
        const w = Math.max(280, Math.round(startW + (ev.clientX - startX) / z));
        const h = Math.max(120, Math.round(startH + (ev.clientY - startY) / z));
        card.style.width  = w + 'px';
        card.style.height = h + 'px';
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        const w = parseInt(card.style.width, 10) || startRect.width;
        const h = parseInt(card.style.height, 10) || startRect.height;
        state.boardSize[tabKey] = { w, h };
        save();
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
    card.appendChild(resize);

    canvas.appendChild(card);
  });
}

function renderRow(tab, row){
  const cols = getColumns(tab);
  const tr = document.createElement('tr');
  tr.dataset.rowId = row.id;
  tr.dataset.tab = tab;
  // tone class for done-state coloring (matches the board's color)
  const liveKey = LIVE_OF[tab] || tab;
  const tone = (BASE_SCHEMAS[liveKey] && BASE_SCHEMAS[liveKey].tone) || 'tone-blue';
  tr.classList.add(tone);
  if (_selection.tab === tab && _selection.ids.has(row.id)) tr.classList.add('row-selected');
  // Cmd/Ctrl+click toggles selection; Shift+click ranges. Capture phase so we
  // intercept before cell click-to-edit handlers fire.
  tr.addEventListener('click', e => {
    if (!(e.metaKey || e.ctrlKey || e.shiftKey)) return;
    // Don't hijack clicks inside an actively-editing cell or on the checkbox.
    if (e.target.closest('input, textarea, [contenteditable="true"]')) return;
    e.preventDefault();
    e.stopPropagation();
    toggleRowSelection(tab, row.id, e.shiftKey ? 'range' : 'toggle');
  }, true);
  // Apply indent
  const indent = Math.max(0, Math.min(8, row.indent | 0));
  tr.style.setProperty('--ind', indent);
  // Tab / Shift+Tab moves to next / previous editable cell (Excel-style).
  // Bullet-list nesting (Tab inside <ul>/<ol>) defers to the document-level handler.
  // Row indent is now controlled via right-click → "Make sub-row" / "Make parent row".
  tr.addEventListener('keydown', e => {
    if (e.key !== 'Tab') return;
    if (!e.target.classList || !e.target.classList.contains('cell-edit')) return;
    const sel = window.getSelection();
    const anchor = sel && sel.anchorNode;
    const anchorEl = anchor && (anchor.nodeType === 1 ? anchor : anchor.parentElement);
    if (anchorEl && anchorEl.closest && anchorEl.closest('ul, ol')) return; // bullet indent — let doc handler run
    e.preventDefault();
    e.stopPropagation();
    focusAdjacentCell(e.target, e.shiftKey ? 'prev' : 'next');
  });

  // Build the checkbox once — it'll be slotted into the first data cell so it indents with the text
  const cb = document.createElement('input');
  cb.type = 'checkbox';
  cb.className = 'row-check';
  const statusCol = cols.find(c => c.kind === 'status');
  const statusKey = statusCol ? statusCol.key : null;
  cb.checked = statusKey ? (row[statusKey] === 'Done') : !!row.__done;
  if(cb.checked) tr.classList.add('row-done');
  cb.addEventListener('click', e => e.stopPropagation());
  cb.addEventListener('change', () => {
    if(statusKey){
      row[statusKey] = cb.checked ? 'Done' : 'Not started';
    } else {
      row.__done = cb.checked;
    }
    row.dateResolved = cb.checked ? todayISO() : '';
    save(); render();
  });

  // Left-side drag handle — sits before the first data cell (i.e., left of the checkbox).
  // Same .cell-handle class as the right one so the existing drag-source matcher
  // (`closest('.cell-handle')`) picks it up automatically.
  const leftHandleTd = document.createElement('td');
  leftHandleTd.className = 'cell-handle cell-handle-l';
  leftHandleTd.textContent = '⋮⋮';
  leftHandleTd.title = 'Drag to reorder';
  tr.appendChild(leftHandleTd);

  // Data cells — first data cell wraps checkbox + content together so they indent as one unit
  let firstDataDone = false;
  cols.forEach(col => {
    const td = document.createElement('td');
    td.dataset.col = col.key;
    const val = row[col.key] ?? '';

    let inner;
    if(col.kind === 'autoDate'){
      inner = renderAutoDate(val);
    } else if(col.kind === 'status'){
      inner = renderStatus(tab, row, col.key, val);
    } else if(col.kind === 'who'){
      inner = renderWho(tab, row, col.key, val);
    } else if(col.kind === 'due'){
      inner = renderDue(tab, row, col.key, val);
    } else if(col.kind === 'chip'){
      inner = renderChip(tab, row, col.key, val, col.placeholder);
    } else {
      inner = renderText(tab, row, col.key, val, col.placeholder);
    }

    if (!firstDataDone) {
      td.classList.add('cell-first-data');
      firstDataDone = true;
      const wrap = document.createElement('div');
      wrap.className = 'first-cell-wrap';
      wrap.appendChild(cb);
      wrap.appendChild(inner);
      // Collapse arrow — only shown when this row has children below it (in the
      // natural state.rows order, not the sorted view).
      const isParent = rowHasChildren(tab, row.id);
      if (isParent){
        const arrow = document.createElement('button');
        arrow.type = 'button';
        arrow.className = 'row-collapse-arrow';
        const collapsed = isCollapsedRow(row.id);
        arrow.textContent = collapsed ? '▸' : '▾';
        arrow.title = collapsed ? 'Show child rows' : 'Hide child rows';
        arrow.addEventListener('click', ev => { ev.stopPropagation(); toggleRowCollapsed(row.id); });
        wrap.appendChild(arrow);
        tr.classList.add(collapsed ? 'row-parent-collapsed' : 'row-parent-expanded');
      }
      td.appendChild(wrap);
    } else {
      td.appendChild(inner);
    }
    tr.appendChild(td);
  });

  // Right-side row-end: slim cell-actions column with the notes 📝 button only.
  // Drag still works from the left handle; row menu is right-click.
  const hasNotes = !!(row.notes && String(row.notes).trim());
  if (hasNotes) tr.classList.add('row-has-notes');
  const actTd = document.createElement('td');
  actTd.className = 'cell-actions';
  // Only show the 📝 icon on rows that actually have a note. Rows without notes
  // get a blank actions cell (still kept so columns stay aligned). To add a note
  // to an empty row, right-click → Add notes.
  if (hasNotes){
    const notesBtn = document.createElement('button');
    notesBtn.className = 'row-notes-btn has-notes';
    notesBtn.title = 'Open notes';
    notesBtn.textContent = '📝';
    notesBtn.addEventListener('click', e => {
      e.stopPropagation();
      closeFloatingRowMenu();
      openNotesDrawer(tab, row);
    });
    actTd.appendChild(notesBtn);
  }
  const cutBtn = document.createElement('button');
  cutBtn.className = 'row-cut-btn';
  cutBtn.title = 'Cut row';
  cutBtn.textContent = '✕';
  cutBtn.addEventListener('click', e => {
    e.stopPropagation();
    closeFloatingRowMenu();
    deleteRow(tab, row.id);
  });
  actTd.appendChild(cutBtn);
  tr.appendChild(actTd);
  const archiveKey = ARCHIVE_OF[tab];
  const liveTarget = LIVE_OF[tab];
  const archiveBtn   = archiveKey ? `<button data-act="archive">Archive</button>` : '';
  const unarchiveBtn = liveTarget ? `<button data-act="unarchive">Restore from archive</button>` : '';
  const archiveSection = (archiveBtn || unarchiveBtn) ? `${archiveBtn}${unarchiveBtn}<div class="sep"></div>` : '';
  const moveButtons = state.boardOrder
    .filter(k => k !== tab && k !== liveTarget)
    .map(k => `<button data-act="move-${k}">Move to ${escapeHtml(state.titles[k] || (SCHEMAS[k] && SCHEMAS[k].label) || k)}</button>`)
    .join('');
  const curIndent = row.indent | 0;
  const indentButtons = `<button data-act="indent">Make sub-row</button>${curIndent > 0 ? '<button data-act="outdent">Make parent row</button>' : ''}<div class="sep"></div>`;
  const notesButton = `<button data-act="notes">${hasNotes ? 'Open notes' : 'Add notes'}</button><div class="sep"></div>`;
  const insertButton = `<button data-act="insert-below">+ Insert row below</button><div class="sep"></div>`;
  const popContent = `${notesButton}${insertButton}${moveButtons}${moveButtons ? '<div class="sep"></div>' : ''}${indentButtons}${archiveSection}<button data-act="duplicate">Duplicate</button><button data-act="delete" class="danger">Delete</button>`;
  function runRowAction(act){
    if(act === 'delete'){ deleteRow(tab, row.id); }
    else if(act === 'duplicate'){ duplicateRow(tab, row.id); }
    else if(act === 'archive' && archiveKey){ moveRowToTab(row.id, tab, archiveKey); }
    else if(act === 'unarchive' && liveTarget){ moveRowToTab(row.id, tab, liveTarget); }
    else if(act && act.startsWith('move-')){ moveRowToTab(row.id, tab, act.slice(5)); }
    else if(act === 'notes'){ openNotesDrawer(tab, row); }
    else if(act === 'insert-below'){ insertRowAfter(tab, row.id); }
    else if(act === 'indent'){
      row.indent = Math.min(8, (row.indent | 0) + 1);
      tr.style.setProperty('--ind', row.indent);
      save();
      render();
    } else if(act === 'outdent'){
      row.indent = Math.max(0, (row.indent | 0) - 1);
      tr.style.setProperty('--ind', row.indent);
      save();
      render();
    }
  }
  function openRowMenuAt(x, y){
    closeFloatingRowMenu();
    const pop = document.createElement('div');
    pop.className = 'row-menu-pop floating-row-menu';
    pop.innerHTML = popContent;
    document.body.appendChild(pop);
    const popW = pop.offsetWidth, popH = pop.offsetHeight;
    let top = y;
    if (top + popH > window.innerHeight - 8) top = Math.max(8, top - popH);
    let left = x;
    if (left + popW > window.innerWidth - 8) left = window.innerWidth - popW - 8;
    if (left < 8) left = 8;
    pop.style.top = top + 'px';
    pop.style.left = left + 'px';
    pop.querySelectorAll('button').forEach(b => {
      b.addEventListener('click', ev => {
        ev.stopPropagation();
        const act = b.dataset.act;
        closeFloatingRowMenu();
        runRowAction(act);
      });
    });
  }
  // Right-click anywhere on the row outside an editable cell opens the row menu.
  // If the right-clicked row is part of a 2+ row selection, show the bulk menu instead.
  tr.addEventListener('contextmenu', e => {
    if (e.target.closest('.cell-edit, input, textarea, .pop, .row-menu-pop')) return;
    e.preventDefault();
    if (_selection.tab === tab && _selection.ids.has(row.id) && _selection.ids.size >= 2){
      openSelectionContextMenu(e.clientX, e.clientY, tab);
    } else {
      openRowMenuAt(e.clientX, e.clientY);
    }
  });

  // Clicking dead space inside a cell focuses its editable child — so newly-added
  // (empty) rows are clickable across the whole cell, not just the tiny cursor caret.
  tr.addEventListener('click', e => {
    if (e.metaKey || e.ctrlKey || e.shiftKey) return;
    const td = e.target.closest('td');
    if (!td || !tr.contains(td)) return;
    if (td.classList.contains('cell-handle') || td.classList.contains('cell-actions') || td.classList.contains('cell-add')) return;
    // Click already landed on an interactive child — let the default handler run.
    if (e.target.closest('[contenteditable="true"], input, textarea, button, a, select, label, .status, .who, .who-wrap, .due, .chip, .row-collapse-arrow, .row-check')) return;
    const editable = td.querySelector('[contenteditable="true"]');
    if (!editable) return;
    e.preventDefault();
    editable.focus();
    try {
      const range = document.createRange();
      range.selectNodeContents(editable);
      range.collapse(false);
      const sel = window.getSelection();
      sel.removeAllRanges();
      sel.addRange(range);
    } catch(_){}
  });

  // (row drag is wired globally via mouse events — see onRowMouseDown below)

  return tr;
}

/* ── CELL RENDERERS ── */

// Sanitize HTML allowed in row text cells (used for highlights / inline color).
// Only allows a small set of safe inline tags + sanitized style attributes.
// Blocks XSS via <script>, <iframe>, on*= handlers, javascript: URLs, etc.
const _SANITIZE_ALLOWED_TAGS = new Set(['B','I','U','EM','STRONG','SPAN','BR','S','STRIKE','MARK','SUB','SUP','FONT']);
// Notes are multi-paragraph rich text, so they need a broader allow-list than
// row cells. Adds block elements (P, DIV, UL, OL, LI, BLOCKQUOTE, headings, HR)
// so the formatting toolbar (bullets, indent, paragraphs) actually round-trips.
const _SANITIZE_NOTES_ALLOWED_TAGS = new Set([
  ...['B','I','U','EM','STRONG','SPAN','BR','S','STRIKE','MARK','SUB','SUP','FONT'],
  'P','DIV','UL','OL','LI','BLOCKQUOTE','PRE','CODE','HR',
  'H1','H2','H3','H4','H5','H6',
]);
const _SANITIZE_ALLOWED_STYLE = /^(background-color|background|color|font-weight|font-style|text-decoration)$/i;
const _SANITIZE_HEX_OR_NAMED = /^[#a-z0-9 ,()%.\-]+$/i; // covers #abc, rgb(…), named colors
function _sanitizeWithAllowedTags(raw, allowedSet){
  if (raw == null) return '';
  const str = String(raw);
  if (!/<\/?[a-z]/i.test(str)) return str; // pure text — caller handles via textContent
  const tmp = document.createElement('div');
  tmp.innerHTML = str;
  const walk = (node) => {
    if (node.nodeType !== 1) return;
    const tag = node.tagName;
    if (!allowedSet.has(tag)) {
      // Replace disallowed element with its text content (strips scripts/iframes/etc entirely)
      node.replaceWith(document.createTextNode(node.textContent || ''));
      return;
    }
    // Strip every attribute except a sanitized `style`
    [...node.attributes].forEach(attr => {
      if (attr.name.toLowerCase() !== 'style'){ node.removeAttribute(attr.name); return; }
      const cleaned = (attr.value || '').split(';').map(d => d.trim()).filter(Boolean).filter(decl => {
        const idx = decl.indexOf(':');
        if (idx < 0) return false;
        const prop = decl.slice(0, idx).trim();
        const val = decl.slice(idx + 1).trim();
        return _SANITIZE_ALLOWED_STYLE.test(prop) && _SANITIZE_HEX_OR_NAMED.test(val);
      }).join(';');
      if (cleaned) node.setAttribute('style', cleaned);
      else node.removeAttribute('style');
    });
    [...node.childNodes].forEach(walk);
  };
  [...tmp.childNodes].forEach(walk);
  return tmp.innerHTML;
}
function sanitizeRowHtml(raw){ return _sanitizeWithAllowedTags(raw, _SANITIZE_ALLOWED_TAGS); }
function sanitizeNotesHtml(raw){ return _sanitizeWithAllowedTags(raw, _SANITIZE_NOTES_ALLOWED_TAGS); }

function renderText(tab, row, key, val, placeholder){
  const div = document.createElement('div');
  div.className = 'cell-edit' + (val ? '' : ' placeholder');
  div.contentEditable = 'true';
  div.spellcheck = true;
  if (val) {
    if (/<\/?[a-z][^>]*>/i.test(val)) {
      div.innerHTML = sanitizeRowHtml(val);
    } else if (/&(amp|lt|gt|quot|#\d+|#x[0-9a-f]+);/i.test(val)) {
      // Legacy data: value was stored already HTML-encoded (e.g., "Smith &amp; Jones")
      // because an earlier code path read innerHTML instead of textContent. Decode by
      // letting the DOM parse it as HTML, then read back textContent.
      const tmp = document.createElement('div');
      tmp.innerHTML = val;
      div.textContent = tmp.textContent;
    } else {
      div.textContent = val;
    }
  } else {
    // Empty cells stay blank — no italic placeholder hint text.
    div.textContent = '';
  }
  // Snapshot of the most-recent non-empty value the user typed in this session.
  // If blur somehow reads back empty (e.g., a browser quirk on Enter), we
  // restore from here instead of letting their text disappear.
  let lastTypedNonEmpty = val || '';
  let hasFocused = false;
  div.addEventListener('focus', () => {
    hasFocused = true;
    if(div.classList.contains('placeholder')){ div.innerHTML=''; div.classList.remove('placeholder'); }
  });
  div.addEventListener('input', () => {
    const stored = readCellValue(div);
    if (stored.trim()) {
      lastTypedNonEmpty = stored;
      row[key] = stored;
      div.classList.remove('placeholder');
    } else {
      row[key] = '';
    }
    save();
  });
  div.addEventListener('blur', () => {
    const stored = readCellValue(div);
    if (stored.trim()) {
      row[key] = stored;
      div.classList.remove('placeholder');
    } else if (hasFocused && lastTypedNonEmpty && lastTypedNonEmpty.trim()) {
      // Defensive: the user typed something this session and the cell read back
      // empty at blur — restore from the last good input snapshot so their text
      // isn't lost. Fixes intermittent "press Enter and the content disappears"
      // from quirky contenteditable + Enter behavior.
      row[key] = lastTypedNonEmpty;
      if (/<\/?[a-z][^>]*>/i.test(lastTypedNonEmpty)) div.innerHTML = sanitizeRowHtml(lastTypedNonEmpty);
      else div.textContent = lastTypedNonEmpty;
      div.classList.remove('placeholder');
    } else {
      // Cleared / blurred-empty cell — leave it blank, no placeholder text.
      row[key] = '';
      div.textContent = '';
      div.classList.remove('placeholder');
    }
    save();
  });
  div.addEventListener('keydown', e => {
    if (e.key !== 'Enter' || e.shiftKey) return;
    // Inside a bullet/numbered list, let Enter break to the next list item.
    const sel = window.getSelection();
    const anchor = sel && sel.anchorNode;
    const anchorEl = anchor && (anchor.nodeType === 1 ? anchor : anchor.parentElement);
    if (anchorEl && anchorEl.closest && anchorEl.closest('li')) return;
    e.preventDefault();
    const tr = div.closest('tr');
    if (tr && !tr.nextElementSibling) {
      // Bottom of the table — create a fresh row and land in the same column.
      addRowTo(tab);
      setTimeout(() => focusCellInLastRow(tab, key), 0);
    } else {
      focusCellBelow(div);
    }
  });
  return div;
}

// After addRowTo + render, find the freshly-added row's cell for `colKey` and focus it.
function focusCellInLastRow(tab, colKey){
  const rows = state.rows[tab];
  if (!Array.isArray(rows) || !rows.length) return;
  const lastId = rows[rows.length - 1].id;
  const tr = document.querySelector(`tr[data-row-id="${lastId}"]`);
  if (!tr) return;
  const td = tr.querySelector(`td[data-col="${colKey}"]`);
  const editable = (td && td.querySelector('.cell-edit, [contenteditable="true"]'))
    || tr.querySelector('.cell-edit, [contenteditable="true"]');
  if (!editable) return;
  editable.focus();
  try {
    const range = document.createRange();
    range.selectNodeContents(editable);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  } catch(_){}
}

// Read a cell's value the right way. If the contenteditable has structural HTML
// (lists, styled spans, line breaks from Shift+Enter), keep it as HTML through
// the sanitizer. Otherwise return textContent so characters like & survive a
// round-trip without becoming &amp; on every edit.
function readCellValue(div){
  // Any element children beyond plain text? <br> counts as structural (line breaks).
  const hasStructure = Array.from(div.childNodes).some(n => n.nodeType === 1);
  if (!hasStructure) return div.textContent;
  return sanitizeRowHtml(div.innerHTML);
}

function renderChip(tab, row, key, val, placeholder){
  const div = document.createElement('div');
  div.className = 'chip' + (val ? '' : ' placeholder');
  div.contentEditable = 'true';
  div.spellcheck = false;
  div.textContent = val || (placeholder || 'CODENAME');
  div.addEventListener('focus', () => { if(div.classList.contains('placeholder')){ div.textContent=''; div.classList.remove('placeholder'); }});
  div.addEventListener('blur', () => {
    const v = div.textContent.trim();
    row[key] = v;
    save();
    if(!v){ div.textContent = placeholder || 'CODENAME'; div.classList.add('placeholder'); }
  });
  div.addEventListener('keydown', e => { if(e.key==='Enter'){ e.preventDefault(); div.blur(); }});
  return div;
}

function renderStatus(tab, row, key, val){
  const cur = val || 'Not started';
  const div = document.createElement('span');
  div.className = 'status ' + (STATUS_CLASS[cur] || 's-todo');
  div.textContent = cur;
  div.addEventListener('click', e => {
    // Stop the click from bubbling to the row's capture handler, the document-level
    // popover-closer, or any ancestor that might rip the popover back down before
    // it's even visible. (Symptom this fixes: "click status, takes several tries.")
    e.preventDefault();
    e.stopPropagation();
    openPopover(e.currentTarget, STATUS_OPTIONS, choice => {
      row[key] = choice; save(); render();
    });
  });
  return div;
}

// Parse a who-cell value into an array of owner initials. Stored as a comma-
// separated string for back-compat with single-owner data.
function parseOwners(val){
  if (val == null) return [];
  if (Array.isArray(val)) return val.map(v => String(v).trim()).filter(Boolean);
  return String(val).split(',').map(s => s.trim()).filter(Boolean);
}
function serializeOwners(arr){
  return (arr || []).filter(Boolean).join(', ');
}
function renderWho(tab, row, key, val){
  const wrap = document.createElement('span');
  wrap.className = 'who-wrap';
  const owners = parseOwners(val);
  if (owners.length === 0){
    const chip = document.createElement('span');
    chip.className = 'who unassigned';
    chip.textContent = 'X';
    wrap.appendChild(chip);
  } else {
    owners.forEach(o => {
      const chip = document.createElement('span');
      chip.className = 'who who-' + o.replace(/[^A-Za-z0-9]/g, '');
      chip.textContent = o;
      wrap.appendChild(chip);
    });
  }
  wrap.addEventListener('click', e => {
    e.stopPropagation();
    openMultiOwnerPopover(wrap, owners, next => {
      row[key] = serializeOwners(next);
      save(); render();
    });
  });
  return wrap;
}
// Multi-select popover for the who cell. Toggles owners on/off, batch-saves
// when the popover closes (click-outside or Esc).
function openMultiOwnerPopover(anchor, currentOwners, onClose){
  closePopovers();
  const selected = new Set(currentOwners);
  const pop = document.createElement('div');
  pop.className = 'pop pop-multi';
  // "All people" list — built-in roster plus anyone already on the row whose
  // initials aren't in the roster (e.g., legacy entries).
  const all = Array.from(new Set([...ASSIGNEE_OPTIONS, ...currentOwners])).filter(Boolean);
  all.forEach(name => {
    const row = document.createElement('button');
    row.type = 'button';
    row.className = 'pop-multi-row';
    const check = document.createElement('span');
    check.className = 'pop-check';
    check.textContent = selected.has(name) ? '✓' : '';
    const chip = document.createElement('span');
    chip.className = 'who who-' + name.replace(/[^A-Za-z0-9]/g, '');
    chip.textContent = name;
    row.appendChild(check);
    row.appendChild(chip);
    row.addEventListener('click', ev => {
      ev.stopPropagation();
      if (selected.has(name)) selected.delete(name);
      else selected.add(name);
      check.textContent = selected.has(name) ? '✓' : '';
    });
    pop.appendChild(row);
  });
  const sep = document.createElement('div');
  sep.className = 'pop-sep';
  pop.appendChild(sep);
  const clearBtn = document.createElement('button');
  clearBtn.type = 'button';
  clearBtn.className = 'pop-clear';
  clearBtn.textContent = 'Clear all';
  clearBtn.addEventListener('click', ev => {
    ev.stopPropagation();
    selected.clear();
    pop.querySelectorAll('.pop-check').forEach(c => c.textContent = '');
  });
  pop.appendChild(clearBtn);
  document.body.appendChild(pop);
  const r = anchor.getBoundingClientRect();
  pop.style.left = (r.left + window.scrollX) + 'px';
  pop.style.top  = (r.bottom + window.scrollY + 4) + 'px';
  // Clamp horizontally
  const pw = pop.offsetWidth;
  if (r.left + pw > window.innerWidth - 8) pop.style.left = Math.max(8, window.innerWidth - pw - 8) + 'px';
  const closeAndSave = () => {
    document.removeEventListener('click', onDocClick, true);
    document.removeEventListener('keydown', onKey, true);
    pop.remove();
    const finalArr = [...selected];
    // Only fire if the selection actually changed
    if (JSON.stringify(finalArr.sort()) !== JSON.stringify([...currentOwners].sort())){
      onClose(finalArr);
    }
  };
  const onDocClick = ev => { if (!pop.contains(ev.target)) closeAndSave(); };
  const onKey = ev => { if (ev.key === 'Escape') closeAndSave(); };
  setTimeout(() => {
    document.addEventListener('click', onDocClick, true);
    document.addEventListener('keydown', onKey, true);
  }, 0);
}

function renderDue(tab, row, key, val){
  const div = document.createElement('div');
  div.className = 'due';
  applyDueClass(div, val);
  div.textContent = val ? formatDue(val) : 'No date';
  if(!val) div.classList.add('empty');
  div.addEventListener('click', () => {
    const input = document.createElement('input');
    input.type = 'date';
    input.value = isISO(val) ? val : '';
    div.textContent = '';
    div.appendChild(input);
    input.focus();
    input.addEventListener('change', () => {
      row[key] = input.value || '';
      save(); render();
    });
    input.addEventListener('blur', () => render());
  });
  return div;
}

function renderAutoDate(val){
  const div = document.createElement('div');
  div.className = 'auto-date';
  div.textContent = isISO(val) ? formatDue(val) : '—';
  if(!isISO(val)) div.classList.add('empty');
  return div;
}

function applyDueClass(el, val){
  el.classList.remove('overdue','soon','empty');
  if(!isISO(val)) return;
  const d = new Date(val + 'T00:00:00');
  const today = new Date(); today.setHours(0,0,0,0);
  const diffDays = Math.round((d - today) / 86400000);
  if(diffDays < 0) el.classList.add('overdue');
  else if(diffDays <= 3) el.classList.add('soon');
}
function isISO(s){ return /^\d{4}-\d{2}-\d{2}$/.test(s||''); }
function formatDue(s){
  if(!isISO(s)) return s;
  const d = new Date(s + 'T00:00:00');
  return d.toLocaleDateString(undefined, {month:'short', day:'numeric'});
}

/* ── POPOVER ── */
function openPopover(anchor, options, onPick){
  closePopovers();
  const pop = document.createElement('div');
  pop.className = 'pop';
  options.forEach(opt => {
    const b = document.createElement('button');
    b.textContent = opt;
    b.addEventListener('click', () => { onPick(opt); closePopovers(); });
    pop.appendChild(b);
  });
  document.body.appendChild(pop);
  const r = anchor.getBoundingClientRect();
  pop.style.left = (r.left + window.scrollX) + 'px';
  pop.style.top  = (r.bottom + window.scrollY + 4) + 'px';
  setTimeout(() => document.addEventListener('click', closePopovers, {once:true}), 0);
}
function closePopovers(){
  document.querySelectorAll('.pop').forEach(p => p.remove());
  document.querySelectorAll('.row-menu.open').forEach(m => m.classList.remove('open'));
}

/* ── MUTATIONS ── */
let dragData = null;

/* ── BOARD CANVAS DRAG (mouse-event based, free-form positioning) ── */
let boardDragState = null;

// monotonically-increasing z-index so the most recently-clicked card sits on top
let topZ = 100;
function bringCardToFront(card){
  topZ += 1;
  card.style.zIndex = topZ;
}

let pendingBoardDrag = null;
let boardDragJustEnded = false;

function onBoardMouseDown(e){
  // First, raise any clicked board to the top of the stack
  const anyCard = e.target.closest('.board-card');
  if(anyCard && anyCard.parentElement && anyCard.parentElement.classList.contains('board-canvas')){
    bringCardToFront(anyCard);
  }
  // Drag may start from the explicit ⋮⋮ handle, the (hidden) card head, the editable name tab, or the wide grip strip across the top
  const dragHandle = e.target.closest('.board-card-controls .ctl.drag, .board-card-head, .board-card-tab, .board-card-grip');
  if(!dragHandle) return;
  // Block dragging when starting on a different button/input — but always allow .ctl.drag
  if(e.target.closest('button, input, textarea, select') && !e.target.closest('.ctl.drag')) return;
  const card = dragHandle.closest('.board-card');
  if(!card) return;
  const canvas = card.parentElement;
  if(!canvas || !canvas.classList.contains('board-canvas')) return;
  if(canvas.classList.contains('stacked')) return;
  const onTab = !!e.target.closest('.board-card-tab');
  const onHandle = !!e.target.closest('.ctl.drag');
  const onGrip = !!e.target.closest('.board-card-grip');
  const cardRect = card.getBoundingClientRect();
  // Canvas is transform:scale(zoom) when zoom != 1. getBoundingClientRect returns
  // post-transform (visual) pixels, but card.style.left/top live in pre-transform
  // (logical) pixels — so cursor offsets within the card must be divided by zoom.
  const zoom = Math.max(0.4, Math.min(2, +state.boardZoom || 1));
  // Explicit ⋮⋮ drag handle and the wide top-grip strip: start drag immediately.
  // Title bar (.board-card-tab): stash a pending drag and only commit once the mouse moves >4px,
  // so a stationary click still focuses the editable title for inline rename.
  if(onHandle || onGrip){
    e.preventDefault();
    boardDragState = {
      tabKey: card.dataset.tab, card, canvas,
      offsetX: (e.clientX - cardRect.left) / zoom,
      offsetY: (e.clientY - cardRect.top)  / zoom,
      zoom,
    };
    card.classList.add('dragging');
  } else {
    pendingBoardDrag = {
      tabKey: card.dataset.tab, card, canvas,
      offsetX: (e.clientX - cardRect.left) / zoom,
      offsetY: (e.clientY - cardRect.top)  / zoom,
      startX: e.clientX, startY: e.clientY,
      onTab,
      zoom,
    };
    if(!onTab) e.preventDefault();
  }
}

function onBoardMouseMove(e){
  // Promote a pending drag once we cross a 4px movement threshold
  if(pendingBoardDrag){
    const dx = e.clientX - pendingBoardDrag.startX;
    const dy = e.clientY - pendingBoardDrag.startY;
    if(Math.abs(dx) > 4 || Math.abs(dy) > 4){
      const p = pendingBoardDrag;
      pendingBoardDrag = null;
      boardDragState = { tabKey:p.tabKey, card:p.card, canvas:p.canvas, offsetX:p.offsetX, offsetY:p.offsetY, zoom:p.zoom };
      boardDragState.card.classList.add('dragging');
      // Drag started on the editable title — clear any incidental selection / blur
      if(p.onTab){
        if(document.activeElement && document.activeElement.blur) document.activeElement.blur();
        const sel = window.getSelection();
        if(sel && sel.removeAllRanges) sel.removeAllRanges();
      }
    }
  }
  if(!boardDragState) return;
  const cRect = boardDragState.canvas.getBoundingClientRect();
  const z = boardDragState.zoom || 1;
  // cRect is in viewport (scaled) pixels; offsetX/Y are already logical (pre-transform).
  // Divide the viewport delta by zoom to convert to logical pixels before subtracting offset.
  let x = (e.clientX - cRect.left) / z - boardDragState.offsetX + boardDragState.canvas.scrollLeft;
  let y = (e.clientY - cRect.top)  / z - boardDragState.offsetY + boardDragState.canvas.scrollTop;
  x = Math.max(0, x);
  y = Math.max(0, y);
  boardDragState.card.style.left = x + 'px';
  boardDragState.card.style.top  = y + 'px';
}

function onBoardMouseUp(){
  pendingBoardDrag = null;
  if(!boardDragState) return;
  const x = parseInt(boardDragState.card.style.left, 10) || 0;
  const y = parseInt(boardDragState.card.style.top,  10) || 0;
  state.boardPos[boardDragState.tabKey] = { x, y };
  // Re-sort boardOrder by visual position (top→bottom, left→right) so the sidebar
  // order matches the canvas, and reassign colors so no two adjacent lists share one.
  const before = state.boardOrder.slice();
  state.boardOrder = state.boardOrder.slice().sort((a, b) => {
    const pa = state.boardPos[a] || {x:0,y:0};
    const pb = state.boardPos[b] || {x:0,y:0};
    if(Math.abs((pa.y || 0) - (pb.y || 0)) > 80) return (pa.y || 0) - (pb.y || 0);
    return (pa.x || 0) - (pb.x || 0);
  });
  const orderChanged = state.boardOrder.some((k, i) => k !== before[i]);
  if(orderChanged) reassignBoardColors();
  save();
  boardDragState.card.classList.remove('dragging');
  boardDragState = null;
  boardDragJustEnded = true;
  setTimeout(() => { boardDragJustEnded = false; }, 0);
  if(orderChanged) render();
}

document.addEventListener('mousedown', onBoardMouseDown);
document.addEventListener('mousemove', onBoardMouseMove);
document.addEventListener('mouseup',   onBoardMouseUp);
// Swallow the click that follows a board drag, so the title doesn't refocus accidentally
document.addEventListener('click', e => {
  if(boardDragJustEnded){ e.stopPropagation(); e.preventDefault(); }
}, true);

/* ── ROW DRAG (mouse-event based; HTML5 drag on <tr> is unreliable) ── */
let rowDragState = null;

function onRowMouseDown(e){
  if (e.button !== 0) return; // left-click only
  // Drag-source: the dedicated .cell-handle (always), OR any non-interactive space
  // on the row. Skip clicks on editable text, status/who/due chips, buttons, links,
  // popovers, the row-collapse arrow, and the row checkbox — those have their own behavior.
  const isInteractive = e.target.closest(
    '.cell-edit, .status, .who, .who-wrap, .due, .chip, input, textarea, select, button, a, label, ' +
    '.row-collapse-arrow, .cell-actions, .row-menu-pop, .pop, .floating-row-menu, [contenteditable="true"]'
  );
  const handle = e.target.closest('.cell-handle');
  if (isInteractive && !handle) return;
  const tr = (handle || e.target).closest('tr');
  if(!tr || !tr.dataset.rowId) return;
  const tbody = tr.parentElement;
  if(!tbody || tbody.tagName !== 'TBODY') return;
  e.preventDefault();
  tr.classList.add('row-dragging');
  // Drag group: this row + any contiguous deeper-indent children below it in the
  // natural state.rows order. Mark them all as dragging so the user sees what moves.
  const groupIds = getDragGroupIds(tr.dataset.tab, tr.dataset.rowId);
  if (groupIds.length > 1){
    groupIds.slice(1).forEach(id => {
      const cr = tbody.querySelector(`tr[data-row-id="${id}"]`);
      if (cr) cr.classList.add('row-dragging','row-dragging-child');
    });
  }
  // build a floating ghost that follows the cursor
  const trRect = tr.getBoundingClientRect();
  const ghost = tr.cloneNode(true);
  ghost.classList.add('row-ghost');
  ghost.classList.remove('row-dragging');
  ghost.style.width  = trRect.width + 'px';
  ghost.style.height = trRect.height + 'px';
  // wrap in a table+tbody so the cells render correctly
  const ghostTable = document.createElement('table');
  // inherit the tone-* class from the source row so the ghost matches its board's color
  const toneCls = [...tr.classList].find(c => c.startsWith('tone-')) || '';
  ghostTable.className = 'tbl row-ghost-table ' + toneCls;
  ghostTable.style.width = trRect.width + 'px';
  ghostTable.style.tableLayout = 'fixed';
  // copy column widths from the source thead so cells line up
  const srcTable = tbody.closest('table');
  if(srcTable){
    const srcCols = [...srcTable.querySelectorAll('thead th')].map(th => th.getBoundingClientRect().width);
    const cg = document.createElement('colgroup');
    srcCols.forEach(w => { const col = document.createElement('col'); col.style.width = w + 'px'; cg.appendChild(col); });
    ghostTable.appendChild(cg);
  }
  const gtb = document.createElement('tbody');
  gtb.appendChild(ghost);
  ghostTable.appendChild(gtb);
  document.body.appendChild(ghostTable);
  ghostTable.style.position = 'fixed';
  ghostTable.style.left = trRect.left + 'px';
  ghostTable.style.top  = trRect.top  + 'px';
  ghostTable.style.pointerEvents = 'none';
  ghostTable.style.zIndex = 9999;
  rowDragState = {
    srcId:    tr.dataset.rowId,
    srcTab:   tr.dataset.tab,
    groupIds, // ids that move together (parent + child sub-rows)
    tbody,
    tr,
    target: null,
    before: false,
    ghost: ghostTable,
    offsetX: e.clientX - trRect.left,
    offsetY: e.clientY - trRect.top,
  };
  // Update the ghost with a count badge when more than one row is moving.
  if (groupIds.length > 1){
    const badge = document.createElement('div');
    badge.className = 'row-ghost-badge';
    badge.textContent = '+' + (groupIds.length - 1) + ' sub-row' + (groupIds.length - 1 === 1 ? '' : 's');
    ghostTable.appendChild(badge);
  }
}

function onRowMouseMove(e){
  if(!rowDragState) return;
  // move the ghost
  if(rowDragState.ghost){
    rowDragState.ghost.style.left = (e.clientX - rowDragState.offsetX) + 'px';
    rowDragState.ghost.style.top  = (e.clientY - rowDragState.offsetY) + 'px';
  }
  // clear any prior indicator
  rowDragState.tbody.querySelectorAll('tr.row-drop-above, tr.row-drop-below')
    .forEach(n => n.classList.remove('row-drop-above','row-drop-below'));
  rowDragState.target = null;
  // find the row under the cursor (in the same tbody)
  const rows = [...rowDragState.tbody.querySelectorAll('tr')];
  for(const r of rows){
    if(r === rowDragState.tr) continue;
    const rect = r.getBoundingClientRect();
    if(e.clientY >= rect.top && e.clientY <= rect.bottom){
      const above = (e.clientY - rect.top) < rect.height/2;
      r.classList.add(above ? 'row-drop-above' : 'row-drop-below');
      rowDragState.target = r;
      rowDragState.before = above;
      return;
    }
  }
  if(rows.length){
    const last = rows[rows.length-1];
    const lastRect = last.getBoundingClientRect();
    if(e.clientY > lastRect.bottom && last !== rowDragState.tr){
      last.classList.add('row-drop-below');
      rowDragState.target = last;
      rowDragState.before = false;
    }
  }
}

function onRowMouseUp(){
  if(!rowDragState) return;
  rowDragState.tr.classList.remove('row-dragging');
  rowDragState.tbody.querySelectorAll('tr.row-dragging-child')
    .forEach(n => n.classList.remove('row-dragging','row-dragging-child'));
  rowDragState.tbody.querySelectorAll('tr.row-drop-above, tr.row-drop-below')
    .forEach(n => n.classList.remove('row-drop-above','row-drop-below'));
  if(rowDragState.ghost) rowDragState.ghost.remove();
  if(rowDragState.target && rowDragState.target.dataset.rowId){
    // Block dropping inside the group's own range (would be a no-op or break the order).
    const groupIds = rowDragState.groupIds || [rowDragState.srcId];
    if (!groupIds.includes(rowDragState.target.dataset.rowId)){
      reorderRowGroup(rowDragState.srcTab, groupIds, rowDragState.target.dataset.rowId, rowDragState.before);
    }
  }
  rowDragState = null;
}

document.addEventListener('mousedown', onRowMouseDown);
document.addEventListener('mousemove', onRowMouseMove);
document.addEventListener('mouseup',   onRowMouseUp);

/* ── COLUMN RESIZE (global; works in every table including Home cards) ── */
let colResizeState = null;

function onColResizeMouseDown(e){
  const grip = e.target.closest('.col-resize');
  if(!grip) return;
  const th = grip.closest('th');
  if(!th) return;
  const colKey = th.dataset.col || grip.dataset.col;
  if(!colKey) return;
  // figure out which tab this table belongs to
  const tabFromTr = th.closest('tr')?.parentElement?.parentElement?.querySelector('tr')?.parentElement?.previousElementSibling;
  const card = th.closest('.board-card');
  const tab = card ? card.dataset.tab : state.activeTab;
  if(!tab) return;
  e.preventDefault();
  e.stopPropagation();
  grip.classList.add('resizing');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  colResizeState = {
    th, grip, tab, colKey,
    startX: e.clientX,
    startW: th.getBoundingClientRect().width,
  };
}

function onColResizeMouseMove(e){
  if(!colResizeState) return;
  const w = Math.max(50, Math.round(colResizeState.startW + (e.clientX - colResizeState.startX)));
  colResizeState.th.style.width = w + 'px';
  state.colWidths[colResizeState.tab][colResizeState.colKey] = w;
}

function onColResizeMouseUp(){
  if(!colResizeState) return;
  colResizeState.grip.classList.remove('resizing');
  document.body.style.cursor = '';
  document.body.style.userSelect = '';
  // Persist (and push to cloud) but DON'T re-render — the live DOM is already
  // in the right state, and render() causes a brief jump as the table rebuilds.
  save();
  colResizeState = null;
}

// Use capture phase so this fires before the row/board mousedown handlers
document.addEventListener('mousedown', onColResizeMouseDown, true);
document.addEventListener('mousemove', onColResizeMouseMove);
document.addEventListener('mouseup',   onColResizeMouseUp);

/* ── COLUMN REORDER (drag column header to a new position) ── */
let colDragState = null;

function onColDragMouseDown(e){
  const handle = e.target.closest('.col-drag');
  if(!handle) return;
  const th = handle.closest('th');
  if(!th) return;
  const colKey = th.dataset.col;
  if(!colKey) return;
  const card = th.closest('.board-card');
  const tab = card ? card.dataset.tab : state.activeTab;
  if(!tab) return;
  e.preventDefault(); e.stopPropagation();
  th.classList.add('th-dragging');
  document.body.style.cursor = 'grabbing';
  colDragState = { th, tab, colKey, target:null, before:false, headerRow: th.parentElement };
}

function onColDragMouseMove(e){
  if(!colDragState) return;
  // clear previous indicators
  colDragState.headerRow.querySelectorAll('th.col-drop-before, th.col-drop-after')
    .forEach(n => n.classList.remove('col-drop-before','col-drop-after'));
  colDragState.target = null;
  // find header under cursor (data-col only — skip helper columns)
  const ths = [...colDragState.headerRow.querySelectorAll('th[data-col]')];
  for(const t of ths){
    if(t === colDragState.th) continue;
    const r = t.getBoundingClientRect();
    if(e.clientX >= r.left && e.clientX <= r.right){
      const before = (e.clientX - r.left) < r.width/2;
      t.classList.add(before ? 'col-drop-before' : 'col-drop-after');
      colDragState.target = t;
      colDragState.before = before;
      return;
    }
  }
}

function onColDragMouseUp(){
  if(!colDragState) return;
  const { th, tab, colKey, target, before, headerRow } = colDragState;
  th.classList.remove('th-dragging');
  headerRow.querySelectorAll('th.col-drop-before, th.col-drop-after')
    .forEach(n => n.classList.remove('col-drop-before','col-drop-after'));
  document.body.style.cursor = '';
  if(target && target.dataset.col){
    reorderColumn(tab, colKey, target.dataset.col, before);
  }
  colDragState = null;
}

function reorderColumn(tab, srcKey, targetKey, before){
  if(srcKey === targetKey) return;
  // Build the current full ordered key list, then move srcKey
  const cur = getColumns(tab).map(c => c.key);
  const srcIdx = cur.indexOf(srcKey);
  if(srcIdx < 0) return;
  cur.splice(srcIdx, 1);
  let tgtIdx = cur.indexOf(targetKey);
  if(tgtIdx < 0) tgtIdx = cur.length;
  cur.splice(before ? tgtIdx : tgtIdx+1, 0, srcKey);
  state.colOrder[tab] = cur;
  save(); render();
}

document.addEventListener('mousedown', onColDragMouseDown, true);
document.addEventListener('mousemove', onColDragMouseMove);
document.addEventListener('mouseup',   onColDragMouseUp);

/* ── SIDEBAR TAB REORDER (drag a live board's tab to reorder it in the sidebar) ── */
let tabDragState = null;
const TAB_DRAG_THRESHOLD = 5;

function onTabMouseDown(e){
  const btn = e.target.closest('[data-draggable-tab="1"]');
  if(!btn) return;
  // Don't preventDefault — we want clicks to still work if no drag occurs.
  tabDragState = {
    btn,
    tabKey: btn.dataset.tab,
    startX: e.clientX,
    startY: e.clientY,
    dragging: false,
    target: null,
    before: false,
  };
}

function onTabMouseMove(e){
  if(!tabDragState) return;
  const dx = e.clientX - tabDragState.startX;
  const dy = e.clientY - tabDragState.startY;
  if(!tabDragState.dragging){
    if(Math.hypot(dx, dy) < TAB_DRAG_THRESHOLD) return;
    tabDragState.dragging = true;
    tabDragState.btn.classList.add('tab-dragging');
    document.body.style.cursor = 'grabbing';
  }
  // clear prior indicators
  document.querySelectorAll('.tab-btn.tab-drop-above, .tab-btn.tab-drop-below')
    .forEach(n => n.classList.remove('tab-drop-above','tab-drop-below'));
  tabDragState.target = null;
  // find the live tab under cursor
  const candidates = [...document.querySelectorAll('.tab-btn[data-draggable-tab="1"]')];
  for(const c of candidates){
    if(c === tabDragState.btn) continue;
    const r = c.getBoundingClientRect();
    if(e.clientY >= r.top && e.clientY <= r.bottom){
      const above = (e.clientY - r.top) < r.height/2;
      c.classList.add(above ? 'tab-drop-above' : 'tab-drop-below');
      tabDragState.target = c;
      tabDragState.before = above;
      return;
    }
  }
}

function onTabMouseUp(){
  if(!tabDragState) return;
  document.querySelectorAll('.tab-btn.tab-drop-above, .tab-btn.tab-drop-below')
    .forEach(n => n.classList.remove('tab-drop-above','tab-drop-below'));
  document.body.style.cursor = '';
  if(tabDragState.dragging){
    tabDragState.btn.classList.remove('tab-dragging');
    // suppress the click that would otherwise fire on mouseup
    tabDragState.btn.dataset.suppressClick = '1';
    if(tabDragState.target && tabDragState.target.dataset.tab){
      reorderSidebarTab(tabDragState.tabKey, tabDragState.target.dataset.tab, tabDragState.before);
    }
  }
  tabDragState = null;
}

function reorderSidebarTab(srcKey, targetKey, before){
  if(srcKey === targetKey) return;
  const arr = state.boardOrder.slice();
  const srcIdx = arr.indexOf(srcKey);
  if(srcIdx < 0) return;
  arr.splice(srcIdx, 1);
  let tgtIdx = arr.indexOf(targetKey);
  if(tgtIdx < 0) tgtIdx = arr.length;
  arr.splice(before ? tgtIdx : tgtIdx+1, 0, srcKey);
  state.boardOrder = arr;
  reassignBoardColors();
  save(); render();
}

// Walk boardOrder; reassign user-board colors so no two adjacent boards share a color.
// Built-in boards (internal/client/bd) keep their fixed colors; user boards rotate around them.
// 5-color palette: pink, cyan, yellow, navy, white. Rotates so adjacent boards never share a color.
const COLOR_PALETTE = [
  { color: 'c-client',   tone: 'tone-pink'   },  // pink
  { color: 'c-bd',       tone: 'tone-cyan'   },  // light blue
  { color: 'c-internal', tone: 'tone-yellow' },  // yellow
  { color: 'c-navy',     tone: 'tone-blue'   },  // navy
  { color: 'c-white',    tone: 'tone-white'  },  // white
];

function reassignBoardColors(){
  // Walk boardOrder, cycling through the 5-color palette by USER-BOARD index.
  // Built-in boards (internal/client/bd) keep their fixed colors; user boards rotate.
  let lastColor = null;
  let userIdx = 0;
  (state.boardOrder || []).forEach(key => {
    const isUser = !!(state.userBoards && state.userBoards[key]);
    if(isUser){
      // Take the next color in the cycle. If it would match the previous board, skip ahead one.
      let p = COLOR_PALETTE[userIdx % COLOR_PALETTE.length];
      if(p.color === lastColor){
        p = COLOR_PALETTE[(userIdx + 1) % COLOR_PALETTE.length];
      }
      state.userBoards[key].color = p.color;
      state.userBoards[key].tone  = p.tone;
      if(SCHEMAS[key]){ SCHEMAS[key].color = p.color; SCHEMAS[key].tone = p.tone; }
      const archKey = ARCHIVE_OF[key];
      if(archKey && SCHEMAS[archKey]){ SCHEMAS[archKey].color = p.color; SCHEMAS[archKey].tone = p.tone; }
      lastColor = p.color;
      userIdx++;
    } else if(SCHEMAS[key]){
      lastColor = SCHEMAS[key].color;
    }
  });
}

}

// Extract list-creation logic so it can be reused for templates.
// Optional `customColumns` lets the caller (template apply path) pass in the exact column
// definitions captured from the source board, bypassing the default 1-column setup.
function makeUserList(name, customColumns){
  const baseKey = (name.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-+|-+$/g,'') || 'list').slice(0,40);
  let key = baseKey, n = 2;
  while(SCHEMAS[key] || state.rows[key]){ key = baseKey + '-' + n++; }
  // Use the 5-color palette so the initial color matches reassignBoardColors output.
  const userCount = Object.keys(state.userBoards || {}).length;
  const slot = COLOR_PALETTE[userCount % COLOR_PALETTE.length];
  const baseColumns = (Array.isArray(customColumns) && customColumns.length)
    ? JSON.parse(JSON.stringify(customColumns))
    : [
        {key:'task',   label:'Task',     width:380, placeholder:'What needs doing'},
      ];
  const meta = { label:name, color:slot.color, tone:slot.tone, columns:baseColumns };
  state.userBoards = state.userBoards || {};
  state.userBoards[key] = meta;
  SCHEMAS[key] = { ...meta, isArchive:false, columns: [...baseColumns, ...AUDIT_COLS] };
  LIVE_BOARDS.push(key);
  ALL_BOARDS.push(key);
  const archKey = key + 'Archive';
  ARCHIVE_OF[key] = archKey;
  LIVE_OF[archKey] = key;
  SCHEMAS[archKey] = { ...meta, label: name + ' — archive', isArchive:true, columns: [...baseColumns, ...AUDIT_COLS] };
  ALL_BOARDS.push(archKey);
  state.rows[key] = [];
  state.rows[archKey] = [];
  state.titles[key] = name;
  state.titles[archKey] = name + ' — archive';
  state.headers[key] = {};
  state.headers[archKey] = {};
  state.colWidths[key] = {};
  state.colWidths[archKey] = {};
  state.userColumns[key] = [];
  state.userColumns[archKey] = [];
  state.colOrder[key] = [];
  state.colOrder[archKey] = [];
  state.boardOrder.push(key);
  const positions = state.boardPos || {};
  const sizes = state.boardSize || {};
  let maxBottom = 20;
  Object.keys(positions).forEach(k => {
    const p = positions[k] || {x:0,y:0};
    const s = sizes[k] || {h:520};
    const bottom = (p.y || 0) + (s.h || 520);
    if(bottom > maxBottom) maxBottom = bottom;
  });
  state.boardPos[key] = {x:20, y:maxBottom + 20};
  state.boardSize[key] = {w:560, h:0};
  return key;
}

function applyTemplateToCurrentBoard(templateKey){
  const tpl = (state.customTemplates && state.customTemplates[templateKey]) || BOARD_TEMPLATES[templateKey];
  if(!tpl || !tpl.lists || !tpl.lists.length) return;
  const today = todayISO();
  const createdKeys = [];
  tpl.lists.forEach(listDef => {
    // Schema v2 templates (saved by saveBoardAsTemplate) carry full column structure + row objects.
    // Schema v1 (built-in templates and very old custom saves) carry just `tasks: [string,...]`.
    const isV2 = Array.isArray(listDef.rows);
    const customCols = isV2 ? listDef.baseColumns : null;
    const key = makeUserList(listDef.name, customCols);
    createdKeys.push(key);

    if(isV2){
      // Restore the captured column-level state on the new list
      if(listDef.userColumns) state.userColumns[key] = JSON.parse(JSON.stringify(listDef.userColumns));
      if(listDef.colWidths)   state.colWidths[key]   = { ...listDef.colWidths };
      if(listDef.colOrder)    state.colOrder[key]    = [ ...listDef.colOrder ];
      if(listDef.hiddenCols){
        state.hiddenCols = state.hiddenCols || {};
        state.hiddenCols[key] = [ ...listDef.hiddenCols ];
      }
      if(listDef.headers)     state.headers[key]     = { ...listDef.headers };
      // Push rows preserving every field (indent, formatted task HTML, status, who, due, etc.).
      // Stamp fresh ids and a fresh dateAdded; carry dateResolved through if the row was Done.
      (listDef.rows || []).forEach(r => {
        const copy = { ...r };
        copy.id = rid();
        copy.dateAdded = today;
        // If the source row was checked off, keep it checked and re-stamp dateResolved.
        const isDone = (copy.status === 'Done') || !!copy.__done;
        copy.dateResolved = isDone ? today : '';
        state.rows[key].push(copy);
      });
    } else {
      // Legacy template format
      (listDef.tasks || []).forEach(t => {
        state.rows[key].push({
          id: rid(),
          task: typeof t === 'string' ? t : (t.task || ''),
          dateAdded: today,
          dateResolved: '',
        });
      });
    }
  });
  // Arrange the newly-created cards in a 3-column grid so they don't stack on top of each other.
  const COL_W = 580;
  const ROW_H = 460;
  createdKeys.forEach((key, i) => {
    const col = i % 3;
    const row = Math.floor(i / 3);
    state.boardPos[key]  = { x: 20 + col * COL_W, y: 20 + row * ROW_H };
    state.boardSize[key] = { w: 560, h: 440 };
  });
  // Force free-mode view so the cards are draggable
  state.homeViewMode = 'free';
  reassignBoardColors();
}

function addNewList(){
  const name = (prompt('Name your new list:', '') || '').trim();
  if(!name) return;
  const key = makeUserList(name);
  reassignBoardColors();
  state.activeTab = key;
  save(); render();
}

function addRowTo(tab){
  return once('add-row:' + tab, 400, () => {
    const r = { id: rid() };
    getColumns(tab).forEach(c => {
      if(c.kind === 'status') r[c.key] = 'Not started';
      else r[c.key] = '';
    });
    r.dateAdded = todayISO();
    r.dateResolved = '';
    state.rows[tab].push(r);
    save(); render();
  });
}
// Insert a fresh, empty row immediately after `afterRowId` in `tab`, inheriting
// that row's indent so it lands as a sibling at the same nesting level.
function insertRowAfter(tab, afterRowId){
  const arr = state.rows[tab] || [];
  const idx = arr.findIndex(r => r.id === afterRowId);
  if (idx < 0) return;
  const anchor = arr[idx];
  const r = { id: rid() };
  getColumns(tab).forEach(c => {
    if (c.kind === 'status') r[c.key] = 'Not started';
    else r[c.key] = '';
  });
  r.dateAdded = todayISO();
  r.dateResolved = '';
  r.indent = anchor.indent | 0;
  arr.splice(idx + 1, 0, r);
  save(); render();
}

/* ── ARCHIVE SWEEP ── done rows older than 5 days move into the matching archive board.
   Runs on render() and also on demand. We track whether anything moved so we can persist
   the change — without this, the sweep mutates state but never saves, and reload reverses it. */
const ARCHIVE_AFTER_DAYS = 5;
function archiveSweep(){
  const today = todayISO();
  let moved = 0;
  Object.keys(ARCHIVE_OF).forEach(liveKey => {
    const archKey = ARCHIVE_OF[liveKey];
    const live = state.rows[liveKey];
    if(!Array.isArray(live)) return; // list was deleted; skip
    if(!Array.isArray(state.rows[archKey])) state.rows[archKey] = [];
    const remain = [];
    live.forEach(r => {
      const age = daysBetween(r.dateResolved, today);
      if(age != null && age >= ARCHIVE_AFTER_DAYS){
        state.rows[archKey].unshift(r);
        moved++;
      } else {
        remain.push(r);
      }
    });
    if (moved) state.rows[liveKey] = remain;
  });
  // Only persist if the sweep actually changed anything — and only if we're not in the
  // middle of applying a remote update (otherwise we'd push the merged remote back as ours).
  if (moved && !applyingRemote) {
    try { save(); } catch(_) {}
  }
}

function deleteRow(tab, id){
  if (!state.rows || !Array.isArray(state.rows[tab])) return;
  state.rows[tab] = state.rows[tab].filter(r => r.id !== id);
  // Optimistic DOM yank — render() rebuilds from state, but if a concurrent
  // cloud pull / realtime echo lands before save+render commits, the visible
  // row can briefly stay put until the next refresh. Pulling it from the DOM
  // up front guarantees the click feels instantaneous.
  document.querySelectorAll(`tr[data-row-id="${id}"]`).forEach(tr => tr.remove());
  save(); render();
}

function duplicateRow(tab, id){
  const idx = state.rows[tab].findIndex(r => r.id === id);
  if(idx < 0) return;
  const copy = { ...state.rows[tab][idx], id: rid() };
  state.rows[tab].splice(idx+1, 0, copy);
  save(); render();
}

function reorderRow(tab, srcId, targetId, above){
  if(srcId === targetId) return;
  const arr = state.rows[tab];
  const srcIdx = arr.findIndex(r => r.id === srcId);
  if(srcIdx < 0) return;
  const [moved] = arr.splice(srcIdx, 1);
  let tgtIdx = arr.findIndex(r => r.id === targetId);
  if(tgtIdx < 0) tgtIdx = arr.length;
  arr.splice(above ? tgtIdx : tgtIdx+1, 0, moved);
  save(); render();
}

// Identify the parent + contiguous deeper-indent children for a drag group.
// Operates on the natural state.rows order — that's where indent hierarchy lives.
function getDragGroupIds(tab, srcId){
  const arr = state.rows[tab] || [];
  const idx = arr.findIndex(r => r.id === srcId);
  if (idx < 0) return [srcId];
  const myIndent = arr[idx].indent | 0;
  const ids = [srcId];
  for (let i = idx + 1; i < arr.length; i++){
    if ((arr[i].indent | 0) > myIndent) ids.push(arr[i].id);
    else break;
  }
  return ids;
}

// Move a contiguous group of rows (parent + children) to a new position.
// Preserves the group's internal order; never lands the group inside itself.
function reorderRowGroup(tab, srcIds, targetId, above){
  if (!srcIds || !srcIds.length) return;
  if (srcIds.includes(targetId)) return; // can't drop within the moving group
  const arr = state.rows[tab];
  const srcIdSet = new Set(srcIds);
  // Extract the group in its current order
  const moved = arr.filter(r => srcIdSet.has(r.id));
  const remaining = arr.filter(r => !srcIdSet.has(r.id));
  let tgtIdx = remaining.findIndex(r => r.id === targetId);
  if (tgtIdx < 0) tgtIdx = remaining.length;
  remaining.splice(above ? tgtIdx : tgtIdx + 1, 0, ...moved);
  state.rows[tab] = remaining;
  save(); render();
}

function moveRowToTab(rowId, fromTab, toTab){
  if(fromTab === toTab) return;
  const arr = state.rows[fromTab];
  const idx = arr.findIndex(r => r.id === rowId);
  if(idx < 0) return;
  const [moved] = arr.splice(idx, 1);

  // remap fields by best-effort: keep matching keys, drop the rest
  const toCols = getColumns(toTab);
  const remapped = { id: moved.id };
  toCols.forEach(c => { remapped[c.key] = moved[c.key] ?? ''; });
  // status default
  const statusCol = toCols.find(c => c.kind === 'status');
  if(statusCol && !remapped[statusCol.key]) remapped[statusCol.key] = 'Not started';

  state.rows[toTab].unshift(remapped);
  state.activeTab = toTab;
  save(); render();
}

/* ── UTILS ── */
function escapeHtml(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }

function closeFloatingRowMenu(){
  document.querySelectorAll('.floating-row-menu').forEach(p => p.remove());
}

document.addEventListener('keydown', e => {
  if(e.key === 'Escape'){
    closePopovers();
    closeFloatingRowMenu();
  }
});
// Click anywhere outside the floating menu closes it
document.addEventListener('click', e => {
  if(!e.target.closest('.floating-row-menu') && !e.target.closest('.row-menu-btn')){
    closeFloatingRowMenu();
  }
});
// Close on scroll/resize so it doesn't drift away from its anchor
window.addEventListener('scroll', closeFloatingRowMenu, true);
window.addEventListener('resize', closeFloatingRowMenu);

// Boot: gate behind SSO. The auth state listener (above) drives everything —
// it fires INITIAL_SESSION on init with the current session (or null) within ms,
// not the ~indefinite wait that getSession() can take. We don't await anything here.
(function boot(){
  document.body.classList.add('lg-gated');
  if (!supa) {
    // No Supabase available — local-only fallback (offline)
    document.body.classList.remove('lg-gated');
    document.body.classList.add('lg-authed');
    render();
    return;
  }
  // Show the login screen now. If a session exists, INITIAL_SESSION will fire
  // shortly and bootAppForSession() will hide the overlay and reveal the app.
  // If no session, the overlay stays. Either way, no hang.
  window.__lgAuth.showLogin();
  // Safety net: if INITIAL_SESSION never fires (rare), keep the login screen up.
  // The user can click Sign in with Google to recover.
})();

/* Close any open row-action menu when clicking outside it.
   The .row-menu-btn and inner-button handlers use stopPropagation,
   so this only fires for clicks elsewhere on the page. */
document.addEventListener('click', e => {
  if (!e.target.closest('.row-menu')){
    document.querySelectorAll('.row-menu.open').forEach(m => m.classList.remove('open'));
  }
});

/* ── SECTION CARD RESIZE (sub-page width AND height) ── */
(function(){
  const handle = document.getElementById('sectionResize');
  const card = document.getElementById('sectionCard');
  if (!handle || !card) return;
  let drag = null;
  handle.addEventListener('mousedown', e => {
    if (state.activeTab === 'home') return;
    e.preventDefault();
    drag = {
      startX: e.clientX, startY: e.clientY,
      startW: card.offsetWidth, startH: card.offsetHeight,
    };
    document.body.style.userSelect = 'none';
    document.body.style.cursor = 'nwse-resize';
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    const w = Math.max(360, Math.min(1600, drag.startW + (e.clientX - drag.startX)));
    const h = Math.max(180, Math.min(window.innerHeight - 80, drag.startH + (e.clientY - drag.startY)));
    card.style.width  = w + 'px';
    card.style.height = h + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!drag) return;
    document.body.style.userSelect = '';
    document.body.style.cursor = '';
    if (state.activeTab !== 'home'){
      state.sectionSize = state.sectionSize || {};
      state.sectionSize[state.activeTab] = { w: card.offsetWidth, h: card.offsetHeight };
      save();
    }
    drag = null;
  });
})();

/* ── RIGHT-CLICK CONTEXT MENU INSIDE CELLS ── */
(function(){
  const FORMATTABLE = '.cell-edit, .section-title, .board-card-title';
  function closeCellCtx(){ document.querySelectorAll('.cell-ctx').forEach(n => n.remove()); }
  function applyCmd(editable, fn){
    editable.focus();
    document.execCommand('styleWithCSS', false, true);
    fn();
    editable.dispatchEvent(new Event('input', {bubbles:true}));
  }
  document.addEventListener('contextmenu', e => {
    const editable = e.target.closest(FORMATTABLE);
    if(!editable) return;
    e.preventDefault();
    closeCellCtx();
    // Save current selection so commands apply to the right text after we click in the menu
    const sel = window.getSelection();
    let savedRange = null;
    if(sel && sel.rangeCount > 0) savedRange = sel.getRangeAt(0).cloneRange();
    const restoreSel = () => {
      if(!savedRange) return;
      const s = window.getSelection();
      s.removeAllRanges();
      s.addRange(savedRange);
    };
    const menu = document.createElement('div');
    menu.className = 'cell-ctx';
    menu.innerHTML = `
      <button class="cmd" data-cmd="bold"><span class="ico" style="font-weight:800">B</span> Bold</button>
      <button class="cmd" data-cmd="italic"><span class="ico" style="font-style:italic">I</span> Italic</button>
      <button class="cmd" data-cmd="underline"><span class="ico" style="text-decoration:underline">U</span> Underline</button>
      <button class="cmd" data-cmd="strikethrough"><span class="ico" style="text-decoration:line-through">S</span> Strikethrough</button>
      <div class="sep"></div>
      <button class="cmd" data-cmd="insertUnorderedList"><span class="ico">•</span> Bulleted list</button>
      <button class="cmd" data-cmd="insertOrderedList"><span class="ico">1.</span> Numbered list</button>
      <button class="cmd" data-cmd="indent"><span class="ico">→</span> Indent (Tab)</button>
      <button class="cmd" data-cmd="outdent"><span class="ico">←</span> Outdent (Shift+Tab)</button>
      <div class="sep"></div>
      <div class="ccm-row">
        <span class="ccm-label">Color</span>
        <button data-fore="#1a1a1a" style="background:#1a1a1a" title="Black"></button>
        <button data-fore="#252f7c" style="background:#252f7c" title="Blue"></button>
        <button data-fore="#ec058c" style="background:#ec058c" title="Pink"></button>
        <button data-fore="#2bb1e6" style="background:#2bb1e6" title="Cyan"></button>
        <button data-fore="#7aaa90" style="background:#7aaa90" title="Green"></button>
        <button data-fore="#b8892a" style="background:#b8892a" title="Amber"></button>
      </div>
      <div class="ccm-row">
        <span class="ccm-label">Highlight</span>
        <button data-hi="transparent" title="Clear">⌀</button>
        <button data-hi="#fbd6e9" style="background:#fbd6e9" title="Pink"></button>
        <button data-hi="#fdf5a8" style="background:#fdf5a8" title="Yellow"></button>
        <button data-hi="#cfeefa" style="background:#cfeefa" title="Cyan"></button>
        <button data-hi="#d4ecdc" style="background:#d4ecdc" title="Green"></button>
      </div>
      <div class="sep"></div>
      <button class="cmd" data-cmd="removeFormat"><span class="ico">↺</span> Clear formatting</button>
    `;
    document.body.appendChild(menu);
    // Position, clamping to viewport
    let left = e.clientX, top = e.clientY;
    const mw = menu.offsetWidth, mh = menu.offsetHeight;
    if(left + mw > window.innerWidth - 8) left = window.innerWidth - mw - 8;
    if(top  + mh > window.innerHeight - 8) top  = window.innerHeight - mh - 8;
    menu.style.left = Math.max(8, left) + 'px';
    menu.style.top  = Math.max(8, top)  + 'px';
    // Wire buttons
    menu.querySelectorAll('button').forEach(b => {
      b.addEventListener('mousedown', ev => {
        ev.preventDefault();
        ev.stopPropagation();
        applyCmd(editable, () => {
          restoreSel();
          if(b.dataset.cmd) document.execCommand(b.dataset.cmd, false, null);
          if(b.dataset.fore) document.execCommand('foreColor', false, b.dataset.fore);
          if(b.dataset.hi)   document.execCommand('hiliteColor', false, b.dataset.hi === 'transparent' ? 'transparent' : b.dataset.hi);
        });
        closeCellCtx();
      });
    });
  });
  // Close on outside click / scroll / Escape
  document.addEventListener('mousedown', e => {
    if(!e.target.closest('.cell-ctx')) closeCellCtx();
  });
  document.addEventListener('keydown', e => { if(e.key === 'Escape') closeCellCtx(); });
  window.addEventListener('scroll', closeCellCtx, true);
  // Tab / Shift+Tab inside any editable cell → indent / outdent (handy for nested bullets)
  document.addEventListener('keydown', e => {
    if(e.key !== 'Tab') return;
    const editable = e.target.closest && e.target.closest(FORMATTABLE);
    if(!editable) return;
    e.preventDefault();
    document.execCommand('styleWithCSS', false, true);
    document.execCommand(e.shiftKey ? 'outdent' : 'indent', false, null);
    editable.dispatchEvent(new Event('input', {bubbles:true}));
  });
})();

/* ── TEXT FORMATTING TOOLBAR ── */
(function(){
  const FORMATTABLE = '.cell-edit, .section-title, .board-card-title';
  const tb = document.createElement('div');
  tb.id = 'textToolbar';
  tb.className = 'text-toolbar';
  tb.innerHTML = `
    <span class="tt-sec">
      <button data-cmd="bold"   title="Bold (Cmd+B)"   style="font-weight:800">B</button>
      <button data-cmd="italic" title="Italic (Cmd+I)" style="font-style:italic">I</button>
      <button data-cmd="underline" title="Underline (Cmd+U)" style="text-decoration:underline">U</button>
      <button data-cmd="insertUnorderedList" title="Bulleted list">•</button>
    </span>
    <span class="tt-sep"></span>
    <span class="tt-sec">
      <span class="tt-label">A</span>
      <button data-fore="#1a1a1a" style="color:#1a1a1a" title="Black">A</button>
      <button data-fore="#252f7c" style="color:#252f7c" title="Blue">A</button>
      <button data-fore="#ec058c" style="color:#ec058c" title="Pink">A</button>
      <button data-fore="#2bb1e6" style="color:#2bb1e6" title="Cyan">A</button>
      <button data-fore="#7aaa90" style="color:#7aaa90" title="Green">A</button>
      <button data-fore="#b8892a" style="color:#b8892a" title="Amber">A</button>
    </span>
    <span class="tt-sep"></span>
    <span class="tt-sec">
      <button class="tt-hi tt-hi-clear" data-hi="transparent" title="Clear highlight">⌀</button>
      <button class="tt-hi tt-hi-pink" data-hi="#fbd6e9" title="Pink"></button>
      <button class="tt-hi tt-hi-yellow" data-hi="#fdf5a8" title="Yellow"></button>
      <button class="tt-hi tt-hi-cyan" data-hi="#cfeefa" title="Cyan"></button>
      <button class="tt-hi tt-hi-green" data-hi="#d4ecdc" title="Green"></button>
    </span>`;
  document.body.appendChild(tb);

  function getActiveEditable(){
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0) return null;
    const range = sel.getRangeAt(0);
    let node = range.commonAncestorContainer;
    if (node.nodeType !== 1) node = node.parentElement;
    return node ? node.closest(FORMATTABLE) : null;
  }

  function updateToolbar(){
    const sel = window.getSelection();
    if (!sel || sel.rangeCount === 0 || sel.isCollapsed) { tb.classList.remove('open'); return; }
    const editable = getActiveEditable();
    if (!editable) { tb.classList.remove('open'); return; }
    const rect = sel.getRangeAt(0).getBoundingClientRect();
    if (rect.width < 1 && rect.height < 1) { tb.classList.remove('open'); return; }
    tb.classList.add('open');
    const tbW = tb.offsetWidth, tbH = tb.offsetHeight;
    let left = rect.left + (rect.width / 2) - (tbW / 2) + window.scrollX;
    left = Math.max(8, Math.min(left, window.innerWidth - tbW - 8 + window.scrollX));
    let top = rect.top + window.scrollY - tbH - 8;
    if (top < window.scrollY + 8) top = rect.bottom + window.scrollY + 8;
    tb.style.left = left + 'px';
    tb.style.top = top + 'px';
  }

  document.addEventListener('selectionchange', () => setTimeout(updateToolbar, 0));
  window.addEventListener('scroll', () => { if (tb.classList.contains('open')) updateToolbar(); }, true);
  document.addEventListener('mousedown', e => {
    if (!e.target.closest('#textToolbar') && !e.target.closest(FORMATTABLE)) {
      tb.classList.remove('open');
    }
  });

  tb.addEventListener('mousedown', e => {
    const btn = e.target.closest('button');
    if (!btn) return;
    e.preventDefault();
    const editable = getActiveEditable();
    if (!editable) return;
    document.execCommand('styleWithCSS', false, true);
    if (btn.dataset.cmd) {
      document.execCommand(btn.dataset.cmd, false, null);
    }
    if (btn.dataset.fore !== undefined) {
      document.execCommand('foreColor', false, btn.dataset.fore);
    }
    if (btn.dataset.hi !== undefined) {
      const v = btn.dataset.hi;
      document.execCommand('hiliteColor', false, v === 'transparent' ? 'transparent' : v);
    }
    editable.dispatchEvent(new Event('input', {bubbles: true}));
  });
})();
</script>
